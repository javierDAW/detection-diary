<!-- FOOTER -->
<rect class="footer" x="20" y="1175" width="840" height="95"/>
<text class="footerH" x="35" y="1200">Detection anchors (behaviour, not just the CVE)</text>
<text class="footerT" x="35" y="1222">1) DICOM receiver writes a non-.dcm or dot-segment file (file_event)   2) receiver spawns a shell (process_creation, RCE)</text>
<text class="footerT" x="35" y="1240">3) inbound association to a DIMSE port from outside the imaging VLAN (network)   4) WerFault / restart-loop on a DCMTK binary (DoS)</text>
<text class="footerT" x="35" y="1258">Advisory-stage: no confirmed in-the-wild IOCs. DCMTK 3.7.0 and older; fix 3.7.1 or newer. Author: Jarmi</text>
