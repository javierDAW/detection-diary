<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">DCMTK DICOM toolkit CVE-2026-50003 kill chain</title>
<desc id="d">Two-lane kill chain. Left lane: the victim medical-imaging stack from an exposed DICOM SCP (tcp/104, 11112, 2762) through association, a crafted C-STORE object, the CVE-2026-50003 path-traversal arbitrary file write, code execution, the memory-exhaustion denial-of-service, and PACS/PHI impact. Right lane: attacker operations from scanning DICOM ports, opening an association, crafting a DICOM object with a traversal filename, sending a C-STORE that writes outside the store, triggering RCE or DoS, and pivoting or denying imaging. Detection anchors: a DICOM receiver writing a non-dcm or dot-segment file, a receiver spawning a shell, inbound association from outside the imaging VLAN, and WerFault or restart loops on a DCMTK binary.</desc>
<defs>
