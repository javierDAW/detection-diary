<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Phantom Squatting kill chain - Montana Empire AI-hallucinated-domain phishing kit</title>
<desc id="d">Two-lane kill chain. Left lane is the victim / AI-user path: a model hallucinates a domain, a developer or agent follows the trusted link, the phantom domain resolves with zero reputation, a brand-clone storefront renders, the victim submits card, bank, IBAN and national ID data, and the operator relays the OTP by hand to defeat MFA. Right lane is the adversary / infrastructure path: map the same hallucination, register the phantom domain first inside an 18 to 51 day exploitation window (T1583.001), build the kit with an AI assistant (T1608.001), stage it, run a Telegram bot C2 for OTP relay and IBAN rotation (T1567), and monetise via financial theft (T1657). Detection anchors are the kit URI paths, the kit and APK hashes, and any AI-agent process resolving a newly-registered or watchlisted domain.</desc>
