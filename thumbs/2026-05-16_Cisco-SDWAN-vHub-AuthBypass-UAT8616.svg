<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" role="img" aria-labelledby="t d">
  <title id="t">Cisco Catalyst SD-WAN CVE-2026-20182 kill chain — UAT-8616 and post-compromise clusters</title>
  <desc id="d">Eight numbered stages on the victim Catalyst SD-WAN Controller lane on the left, from reconnaissance and DTLS handshake on UDP/12346 through CHALLENGE_ACK with device_type=2 (vHub) and authenticated-flag set, SSH key injection into the vmanage-admin authorized_keys file, NETCONF SSH login on TCP/830, and post-compromise activity using AdaptixC2, Sliver, NimPlant-variant, gsocket, XMRig, and webshells. The attacker C2 lane on the right shows the AdaptixC2 shadowcore C2, Sliver mTLS C2, the NimPlant-variant agent1 C2, the Talos-tracked cluster operator IPs and the Replit-hosted dropper. The bottom detection-anchors box maps every Sigma, KQL, YARA, Suricata, and hunt deliverable.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title-fg { fill: #0d1117; }
      .subtitle-fg { fill: #57606a; }
      .lane-fg { fill: #57606a; }
      .lane-bg { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
      .stage { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1.5; }
      .stage-text { fill: #0d1117; }
      .stage-sub { fill: #57606a; }
      .stage-mitre { fill: #0969da; font-family: ui-monospace,"SFMono-Regular",Consolas,monospace; }
      .stage-ioc { fill: #1f883d; font-family: ui-monospace,"SFMono-Regular",Consolas,monospace; }
      .badge { fill: #0969da; }
      .badge-text { fill: #ffffff; font-weight: 700; }
      .c2-bg { fill: #fff8c5; stroke: #d4a72c; stroke-width: 1.5; }
      .c2-title { fill: #7d4e00; font-weight: 700; }
      .c2-text { fill: #4d2d00; font-family: ui-monospace,"SFMono-Regular",Consolas,monospace; }
      .detect-bg { fill: #dafbe1; stroke: #4ac26b; stroke-width: 1.5; }
      .detect-title { fill: #1a7f37; font-weight: 700; }
      .detect-text { fill: #14532d; }
      .arrow { stroke: #57606a; stroke-width: 1.6; fill: none; }
      .arrow-bi { stroke: #d4a72c; stroke-width: 2; fill: none; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
        .title-fg { fill: #e6edf3; }
        .subtitle-fg { fill: #8b949e; }
        .lane-fg { fill: #8b949e; }
        .lane-bg { fill: #161b22; stroke: #30363d; }
        .stage { fill: #0c2d6b; stroke: #58a6ff; }
        .stage-text { fill: #e6edf3; }
        .stage-sub { fill: #8b949e; }
        .stage-mitre { fill: #58a6ff; }
        .stage-ioc { fill: #3fb950; }
        .badge { fill: #1f6feb; }
        .c2-bg { fill: #2e1e00; stroke: #d4a72c; }
        .c2-title { fill: #f0b400; }
        .c2-text { fill: #e6c266; }
        .detect-bg { fill: #033a16; stroke: #3fb950; }
        .detect-title { fill: #3fb950; }
        .detect-text { fill: #aff5b4; }
        .arrow { stroke: #8b949e; }
      }
    
.acc-ransomware { fill: #b03030; }
.acc-espionage { fill: #2a4a6a; }
.acc-supply-chain { fill: #b07a3a; }
.acc-identity-cloud { fill: #6a4ca6; }
.acc-ot-ics { fill: #2f8f4e; }
.acc-edge-network { fill: #1d7a8c; }
.acc-mobile { fill: #c2569a; }
.acc-crypto-defi { fill: #d08a1f; }
.acc-malware-re { fill: #556070; }
.acc-other { fill: #6a6a6a; }
.accLabel { font: 700 11px sans-serif; fill: #ffffff; }
</style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#57606a"/>
    </marker>
    <marker id="arr-bi" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4a72c"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1100"/>
  <rect class="acc-edge-network" x="0" y="0" width="880" height="8"/>

  <!-- Header -->
  <text x="20" y="34" class="title-fg" font-family="sans-serif" font-size="20" font-weight="700">Cisco Catalyst SD-WAN — CVE-2026-20182 vHub auth bypass</text>
  <text x="20" y="56" class="subtitle-fg" font-family="sans-serif" font-size="13">UAT-8616 targeted exploitation + 10 post-compromise clusters — Rapid7 + Talos, 14-May-2026</text>

  <!-- Lane labels -->
  <text x="40" y="92" class="lane-fg" font-family="sans-serif" font-size="11" font-weight="700" letter-spacing="2">VICTIM HOST — Catalyst SD-WAN Controller / Manager</text>
  <text x="810" y="92" class="lane-fg" font-family="sans-serif" font-size="11" font-weight="700" letter-spacing="2">ATTACKER C2 + INFRASTRUCTURE</text>

  <!-- Victim lane background -->
  <rect x="20" y="100" width="760" height="870" class="lane-bg" rx="8"/>
  <!-- C2 lane background -->
  <rect x="795" y="100" width="385" height="660" class="lane-bg" rx="8"/>

  <!-- Stage 1: Reconnaissance -->
  <g transform="translate(40,115)">
    <rect width="720" height="78" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">1</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Reconnaissance</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">Identify Catalyst SD-WAN Controllers with DTLS UDP/12346 exposed (Shodan, Censys, internal scan)</text>
    <text x="48" y="58" class="stage-mitre" font-size="11">MITRE: T1595.002</text>
    <text x="48" y="72" class="stage-ioc" font-size="11">UDP/12346 vdaemon control plane reachable from EXTERNAL_NET</text>
  </g>

  <!-- Stage 2: Initial Access -->
  <g transform="translate(40,205)">
    <rect width="720" height="92" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">2</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Initial Access — vHub authentication bypass</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">DTLS handshake (any client cert) -&gt; CHALLENGE -&gt; CHALLENGE_ACK with device_type=2 (vHub)</text>
    <text x="48" y="56" class="stage-sub" font-family="sans-serif" font-size="11">vbond_proc_challenge_ack() has NO branch for device_type==2 -&gt; fallthrough to peer-&gt;authenticated=1</text>
    <text x="48" y="72" class="stage-mitre" font-size="11">MITRE: T1190 — Exploit Public-Facing Application</text>
    <text x="48" y="86" class="stage-ioc" font-size="11">peer-type:vhub + new-state:up in VDAEMON_0 syslog</text>
  </g>

  <!-- Stage 3: Privilege Escalation via SSH key injection -->
  <g transform="translate(40,310)">
    <rect width="720" height="92" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">3</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Privilege Escalation — SSH key injection</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">MSG_VMANAGE_TO_PEER (msg_type=14) -&gt; fopen("authorized_keys","a+") + fputs(attacker_key)</text>
    <text x="48" y="56" class="stage-sub" font-family="sans-serif" font-size="11">769-byte message body: 768-byte key buffer + 1-byte TLV count = 0</text>
    <text x="48" y="72" class="stage-mitre" font-size="11">MITRE: T1098.004 — Account Manipulation: SSH Authorized Keys</text>
    <text x="48" y="86" class="stage-ioc" font-size="11">/home/vmanage-admin/.ssh/authorized_keys (append-mode)</text>
  </g>

  <!-- Stage 4: Persistence via NETCONF SSH login -->
  <g transform="translate(40,415)">
    <rect width="720" height="92" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">4</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Persistence — NETCONF SSH login as vmanage-admin</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">ssh -i attacker.pem vmanage-admin@target -p 830 -&gt; arbitrary NETCONF commands</text>
    <text x="48" y="56" class="stage-sub" font-family="sans-serif" font-size="11">Internal high-privileged service account; controls SD-WAN fabric configuration</text>
    <text x="48" y="72" class="stage-mitre" font-size="11">MITRE: T1133 + T1078.003 (valid local accounts)</text>
    <text x="48" y="86" class="stage-ioc" font-size="11">"Accepted publickey for vmanage-admin port 830" in auth.log</text>
  </g>

  <!-- Stage 5: Privilege Escalation to root (downgrade chain) -->
  <g transform="translate(40,520)">
    <rect width="720" height="78" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">5</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Privilege Escalation to root — UAT-8616 downgrade chain</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">Software downgrade -&gt; exploit CVE-2022-20775 (path traversal) -&gt; upgrade back -&gt; PermitRootLogin yes</text>
    <text x="48" y="58" class="stage-mitre" font-size="11">MITRE: T1574.011 — Hijack Execution Flow: Services File Permissions</text>
    <text x="48" y="72" class="stage-ioc" font-size="11">/etc/ssh/sshd_config PermitRootLogin yes; SSH keys in /home/root/.ssh/</text>
  </g>

  <!-- Stage 6: Defense Evasion -->
  <g transform="translate(40,610)">
    <rect width="720" height="78" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">6</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Defense Evasion — log truncation</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">syslog / wtmp / lastlog / cli-history / bash_history truncated to 0-1-2 bytes</text>
    <text x="48" y="58" class="stage-mitre" font-size="11">MITRE: T1070.002 + T1070.003</text>
    <text x="48" y="72" class="stage-ioc" font-size="11">Abnormally small or empty files under /var/log/</text>
  </g>

  <!-- Stage 7: Post-compromise tooling -->
  <g transform="translate(40,700)">
    <rect width="720" height="92" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">7</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Post-compromise tooling — 10 Talos clusters</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">JSP webshells (Godzilla / Behinder / XenShell), AdaptixC2 (shadowcore), Sliver mTLS, NimPlant-variant</text>
    <text x="48" y="56" class="stage-sub" font-family="sans-serif" font-size="11">gsocket peer tunneling, XMRig mining, KScan recon, credential extractor scripts</text>
    <text x="48" y="72" class="stage-mitre" font-size="11">MITRE: T1505.003, T1219, T1572, T1496</text>
    <text x="48" y="86" class="stage-ioc" font-size="11">Bidirectional egress to cluster IPs — see C2 panel —&gt;</text>
  </g>

  <!-- Stage 8: Impact / Persistence on the fabric -->
  <g transform="translate(40,805)">
    <rect width="720" height="92" class="stage" rx="6"/>
    <circle cx="22" cy="22" r="14" class="badge"/>
    <text x="22" y="27" text-anchor="middle" class="badge-text" font-family="sans-serif" font-size="14">8</text>
    <text x="48" y="22" class="stage-text" font-family="sans-serif" font-size="13" font-weight="700">Impact — control plane abuse + credential theft</text>
    <text x="48" y="40" class="stage-sub" font-family="sans-serif" font-size="11">Arbitrary NETCONF on SD-WAN fabric: OMP route advertisement manipulation, TLOC table changes</text>
    <text x="48" y="56" class="stage-sub" font-family="sans-serif" font-size="11">Cluster 10: loot_run.sh extracts admin hashdump, JWT chunks, AWS credentials for vManage</text>
    <text x="48" y="72" class="stage-mitre" font-size="11">MITRE: T1003 + T1565.002 + T1565.003</text>
    <text x="48" y="86" class="stage-ioc" font-size="11">JSON Web Token chunks; AWS AccessKeyId/SecretAccessKey/Token leaked</text>
  </g>

  <!-- C2 cluster panel -->
  <g transform="translate(810,115)">
    <rect width="355" height="245" class="c2-bg" rx="6"/>
    <text x="12" y="20" class="c2-title" font-family="sans-serif" font-size="13">UAT-8616 + Cluster C2 (Talos)</text>
    <text x="12" y="42" class="c2-text" font-size="11">vdaemon DTLS UDP/12346</text>
    <text x="12" y="58" class="c2-text" font-size="11">NETCONF SSH TCP/830</text>
    <text x="12" y="80" class="c2-title" font-size="11">AdaptixC2 (Cluster 5):</text>
    <text x="12" y="96" class="c2-text" font-size="11">194.163.175.135:4445</text>
    <text x="12" y="112" class="c2-text" font-size="11">banner: "shadowcore"</text>
    <text x="12" y="134" class="c2-title" font-size="11">Sliver (Cluster 6):</text>
    <text x="12" y="150" class="c2-text" font-size="11">mtls://23.27.143.170:443</text>
    <text x="12" y="172" class="c2-title" font-size="11">NimPlant-variant (Cluster 8):</text>
    <text x="12" y="188" class="c2-text" font-size="11">13.62.52.206:5004</text>
    <text x="12" y="204" class="c2-text" font-size="11">/api/v1/{handshake,tasks,...}</text>
    <text x="12" y="226" class="c2-text" font-size="11">replit.dev dropper subdomain</text>
  </g>

  <!-- Webshell IP block -->
  <g transform="translate(810,370)">
    <rect width="355" height="170" class="c2-bg" rx="6"/>
    <text x="12" y="20" class="c2-title" font-family="sans-serif" font-size="13">Webshell operator IPs (Clusters 1-4)</text>
    <text x="12" y="40" class="c2-text" font-size="11">Godzilla (C1): 38.181.52.89,</text>
    <text x="12" y="56" class="c2-text" font-size="11">89.125.244.33, 89.125.244.51</text>
    <text x="12" y="76" class="c2-text" font-size="11">Behinder (C2): 71.80.85.135</text>
    <text x="12" y="96" class="c2-text" font-size="11">XenShell (C3): 212.83.162.37</text>
    <text x="12" y="116" class="c2-text" font-size="11">Godzilla v2 (C4): 38.60.214.92,</text>
    <text x="12" y="132" class="c2-text" font-size="11">65.20.67.134, 104.233.156.1,</text>
    <text x="12" y="148" class="c2-text" font-size="11">194.233.100.40</text>
  </g>

  <!-- Mining/proxy block -->
  <g transform="translate(810,550)">
    <rect width="355" height="150" class="c2-bg" rx="6"/>
    <text x="12" y="20" class="c2-title" font-family="sans-serif" font-size="13">Mining + tunneling (Clusters 7, 9)</text>
    <text x="12" y="40" class="c2-text" font-size="11">XMRig dropper: 83.229.126.195</text>
    <text x="12" y="56" class="c2-text" font-size="11">(also Cobalt Strike host per VT)</text>
    <text x="12" y="76" class="c2-text" font-size="11">XMRig miner (C9): 47.104.248.7</text>
    <text x="12" y="96" class="c2-text" font-size="11">gsocket peer-id (binary):</text>
    <text x="12" y="112" class="c2-text" font-size="11">78c4a23756277bb7de200676...</text>
    <text x="12" y="132" class="c2-text" font-size="11">GSRN tunnel via .profile hook</text>
  </g>

  <!-- Arrows from stage 7 (post-compromise) to C2 panel — bidirectional -->
  <line x1="760" y1="746" x2="808" y2="237" class="arrow-bi" marker-end="url(#arr-bi)"/>
  <line x1="808" y1="237" x2="760" y2="746" class="arrow-bi" marker-end="url(#arr-bi)"/>

  <!-- Detection anchors footer -->
  <g transform="translate(20,985)">
    <rect width="1160" height="100" class="detect-bg" rx="8"/>
    <text x="14" y="22" class="detect-title" font-family="sans-serif" font-size="13">Detection anchors</text>
    <text x="14" y="42" class="detect-text" font-family="sans-serif" font-size="11">• Sigma: vHub peering anomaly (peer-type:vhub + new-state:up + non-allowlisted public-ip); NETCONF SSH login as vmanage-admin from non-orchestrator; authorized_keys file write.</text>
    <text x="14" y="58" class="detect-text" font-family="sans-serif" font-size="11">• KQL: vHub peering + NETCONF login within 24h join; webshell JSP filename drops; egress to curated cluster IPs.</text>
    <text x="14" y="74" class="detect-text" font-family="sans-serif" font-size="11">• YARA: AdaptixC2 shadowcore banner + ELF + C2 anchor; NimPlant-variant Nim anchors + /api/v1/ REST paths.</text>
    <text x="14" y="90" class="detect-text" font-family="sans-serif" font-size="11">• Suricata sids 8200001-8200007 (cluster C2 IPs + REST API path + Replit dropper SNI). Talos Snort sids 66482-66483 (CVE-2026-20182).</text>
  </g>
</svg>
