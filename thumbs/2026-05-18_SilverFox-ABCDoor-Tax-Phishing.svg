      .arrow-line { stroke: #57606a; stroke-width: 1.5; fill: none; }
      .arrow-c2 { stroke: #d4a72c; stroke-width: 2; fill: none; }
      .mitre { font: 10px ui-monospace, "SFMono-Regular", Consolas, monospace; fill: #6e7781; }
