    <text class="stage-sub" x="85" y="831">SystemInfoManager · RemoteControlManager · ClipboardManager</text>
    <text class="mono" x="85" y="849">ddagrab Desktop Duplication API · DPAPI · pynput keyboard hook</text>
    <text class="mitre" x="85" y="865">MITRE T1113 / T1115 / T1056.001 — Screen Capture / Clipboard / Input</text>
  </g>

  <!-- Stage 9 — C2 + Exfil -->
  <g>
    <rect class="stage-box" x="40" y="890" width="470" height="80" rx="6"/>
    <circle class="badge-circle" cx="60" cy="910" r="14"/>
