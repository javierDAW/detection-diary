  <text class="ioc" x="567" y="188">abc.haijing88[.]com</text>
  <text class="ioc" x="567" y="204">abc.fetish-friends[.]com</text>
  <text class="ioc" x="567" y="220">mcagov[.]cc</text>
  <text class="mono" x="567" y="244">ValleyRAT C2:</text>
  <text class="ioc" x="567" y="260">207.56.138.28:6666</text>
  <text class="mono" x="567" y="284">Plugin C2:</text>
  <text class="ioc" x="567" y="300">154.82.81.205</text>
  <text class="mono" x="567" y="324">Operator playbook:</text>
  <text class="mono" x="567" y="342">• ITD (India) phishing — Dec 2025</text>
  <text class="mono" x="567" y="358">• FNS (Russia) phishing — Jan 2026</text>
  <text class="mono" x="567" y="374">• 1 600+ emails in Jan–Feb 2026</text>
  <text class="mono" x="567" y="390">Aliases:</text>
  <text class="mono" x="567" y="406">• SwimSnake · Void Arachne</text>
  <text class="mono" x="567" y="422">• UTG-Q-1000 · Monarch</text>
  <text class="mono" x="567" y="438">• The Great Thief of Valley</text>
  <text class="mono" x="567" y="462">Confidence (China nexus): medium-high</text>

