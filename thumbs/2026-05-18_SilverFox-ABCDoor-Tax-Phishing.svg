    <text class="stage-sub" x="85" y="736">HKCU\...\Run\AppClient = pythonw.exe -m appclient</text>
    <text class="mono" x="85" y="754">schtasks /create /sc minute /mo 1 /tn AppClient /tr ...</text>
    <text class="mitre" x="85" y="770">MITRE T1547.001 / T1053.005 — Run Key / Scheduled Task</text>
  </g>

