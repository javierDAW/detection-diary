<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d">
  <title id="t">Silver Fox ABCDoor tax-themed phishing kill chain</title>
  <desc id="d">Silver Fox (also tracked as SwimSnake, Void Arachne, UTG-Q-1000) delivers a tax-themed RAR or ZIP archive containing the RustSL loader with a PDF icon. The loader applies geofencing to India, Russia, Indonesia, South Africa, Cambodia and Japan, then deobfuscates and stages ValleyRAT plugins. The ValleyRAT plugin downloads a Python environment plus the ABCDoor implant under the Tailscale brand. ABCDoor persists via HKCU Run key AppClient, a one-minute AppClient scheduled task, and Phantom Persistence shutdown-signal hijack. C2 uses Socket.IO over HTTPS to 207.56.138.28 and HTTP plugin pulls from 154.82.81.205. Detection anchors map to Sigma, KQL, YARA and Suricata rule files.</desc>
