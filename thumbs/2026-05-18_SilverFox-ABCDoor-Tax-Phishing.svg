    <text class="mono" x="85" y="944">device_id: MachineGuid (overwrites UUID4 in device.log)</text>
    <text class="mitre" x="85" y="960">MITRE T1071.001 / T1041 — HTTPS C2 / Exfiltration Over C2</text>
  </g>

