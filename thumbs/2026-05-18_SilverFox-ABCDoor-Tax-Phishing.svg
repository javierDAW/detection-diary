    <text class="badge-text" x="60" y="440">4</text>
    <text class="stage-label" x="85" y="433">Persistence — Phantom Persistence shutdown hijack</text>
    <text class="stage-sub" x="85" y="451">RegisterApplicationRestart + SetProcessShutdownParameters(0x4FF)</text>
    <text class="mono" x="85" y="469">debug log: rsl_debug.log · "God-Tier Telemetry Blinding"</text>
    <text class="mitre" x="85" y="485">MITRE T1574 — Hijack Execution Flow</text>
  </g>

  <!-- Stage 5 — ValleyRAT plugin chain -->
  <g>
    <rect class="stage-box" x="40" y="510" width="470" height="80" rx="6"/>
    <circle class="badge-circle" cx="60" cy="530" r="14"/>
    <text class="badge-text" x="60" y="535">5</text>
