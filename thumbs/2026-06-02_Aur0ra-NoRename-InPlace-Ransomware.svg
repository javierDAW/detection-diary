<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1080" role="img" aria-labelledby="t d">
<title id="t">Aur0ra ransomware kill chain</title>
<desc id="d">Single-lane vertical timeline for the Aur0ra Windows filecoder. Stage 1 initial access via phishing attachment or removable media. Stage 2 execution with sandbox, VM and debugger anti-analysis checks, hidden window and packing. Stage 3 privilege escalation via token manipulation and application shimming plus USB and network-share discovery. Stage 4 collection and claimed exfiltration with victim contact through Tor. Stage 5 critical: deletion of Volume Shadow Copies to inhibit recovery before encryption, the earliest reliable tell. Stage 6 critical: in-place encryption with no rename and no extension, dropping the note triple-exclamation README DO NOT DELETE dot txt with a Tor portal and per-victim key. Detection anchors are shadow-copy deletion and the ransom-note write because extension and canary-rename rules are blind to this family.</desc>
<defs>
<style><![CDATA[
.bg { fill: #ffffff; }
.head { font: 700 18px sans-serif; fill: #0a0a0a; }
.meta { font: 11px sans-serif; fill: #404040; }
.laneL { fill: #f3f7fb; stroke: #5a7da6; stroke-width: 1.2; }
.laneR { fill: #faf3ee; stroke: #b07a3a; stroke-width: 1.2; }
.laneLabelL { font: 700 12px sans-serif; fill: #2a4a6a; }
.laneLabelR { font: 700 12px sans-serif; fill: #8a5520; }
.stage { fill: #ffffff; stroke: #5a7da6; stroke-width: 1.1; }
.stageK { fill: #fdecec; stroke: #b03030; stroke-width: 1.4; }
.op { fill: #ffffff; stroke: #b07a3a; stroke-width: 1.1; }
.opK { fill: #fdecec; stroke: #b03030; stroke-width: 1.4; }
.band { fill: #f7f1eb; stroke: #c08555; stroke-width: 1.2; }
.badge { fill: #5a7da6; }
.badgeK { fill: #b03030; }
.badgeR { fill: #b07a3a; }
.badgeText { font: 700 12px sans-serif; fill: #ffffff; text-anchor: middle; }
.label { font: 700 13px sans-serif; fill: #0a0a0a; }
.sub { font: 11px sans-serif; fill: #303030; }
.mono { font: 10.5px ui-monospace, "SFMono-Regular", Consolas, monospace; fill: #303030; }
.footer { fill: #f6f6f4; stroke: #888; stroke-width: 1; }
.footerH { font: 700 12px sans-serif; fill: #1a1a1a; }
.footerT { font: 10.5px sans-serif; fill: #1a1a1a; }
.arrow { stroke: #2a4a6a; stroke-width: 1.6; fill: none; }
.arrowX { stroke: #7a3a7a; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
.arrowR { stroke: #8a5520; stroke-width: 1.6; fill: none; }

@media (prefers-color-scheme: dark) {
  .bg { fill: #0d1117; }
  .head, .label, .footerH { fill: #f0f0f0; }
  .meta, .sub, .footerT { fill: #c8c8c8; }
  .mono { fill: #c0d0e0; }
  .laneL { fill: #182230; stroke: #7aa6d0; }
  .laneR { fill: #2a2418; stroke: #d09a5a; }
  .laneLabelL { fill: #a8c6e2; }
  .laneLabelR { fill: #e2bf8a; }
  .stage { fill: #1c2530; stroke: #7aa6d0; }
  .stageK { fill: #3a1818; stroke: #e06060; }
  .op { fill: #2a2418; stroke: #d09a5a; }
  .opK { fill: #3a1818; stroke: #e06060; }
  .band { fill: #2a2418; stroke: #d09a5a; }
  .badge { fill: #7aa6d0; }
  .badgeK { fill: #e06060; }
  .badgeR { fill: #d09a5a; }
  .badgeText { fill: #0d1117; }
  .footer { fill: #1a1d22; stroke: #555; }
  .arrow { stroke: #a8c6e2; }
  .arrowX { stroke: #c898d0; }
  .arrowR { stroke: #e2bf8a; }
}

.acc-ransomware { fill: #b03030; }
.acc-espionage { fill: #2a4a6a; }
.acc-supply-chain { fill: #b07a3a; }
.acc-identity-cloud { fill: #6a4ca6; }
.acc-ot-ics { fill: #2f8f4e; }
.acc-edge-network { fill: #1d7a8c; }
.acc-mobile { fill: #c2569a; }
.acc-crypto-defi { fill: #d08a1f; }
.acc-malware-re { fill: #556070; }
.acc-other { fill: #6a6a6a; }
.accLabel { font: 700 11px sans-serif; fill: #ffffff; }
]]></style>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
  <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
</marker>
</defs>

<rect class="bg" x="0" y="0" width="880" height="1080"/>
  <rect class="acc-ransomware" x="0" y="0" width="880" height="8"/>
<text class="head" x="20" y="36">Aur0ra ransomware - in-place encryption, no rename</text>
<text class="meta" x="20" y="58">Vendor: CYFIRMA / pcrisk - Date: 2026-05 - Cluster: Aur0ra (unattributed) - Day 36</text>

<rect class="laneL" x="20" y="85" width="840" height="890"/>

<!-- Stage 1 -->
<rect class="stage" x="30" y="100" width="820" height="130"/>
<circle class="badge" cx="50" cy="120" r="14"/>
<text class="badgeText" x="50" y="124">1</text>
<text class="label" x="78" y="124">Initial access</text>
<text class="sub" x="78" y="146">Phishing attachment (macro doc / JS / PDF)</text>
<text class="sub" x="78" y="164">USB-bus enumeration - consistent with removable-media spread</text>
<text class="sub" x="78" y="182">No public CVE used for initial access</text>
<text class="mono" x="78" y="206">MITRE T1566.001 / T1091</text>

<!-- Stage 2 -->
<rect class="stage" x="30" y="245" width="820" height="130"/>
<circle class="badge" cx="50" cy="265" r="14"/>
<text class="badgeText" x="50" y="269">2</text>
<text class="label" x="78" y="269">Execution + anti-analysis</text>
<text class="sub" x="78" y="291">x64 PE filecoder (AV family Win64/Filecoder.Aur0ra.A)</text>
<text class="sub" x="78" y="309">Sandbox / VM / debugger checks; hidden window</text>
<text class="sub" x="78" y="327">Software packing; process injection</text>
<text class="mono" x="78" y="351">T1059 / T1497.001 / T1564.003 / T1027.002</text>

<!-- Stage 3 -->
<rect class="stage" x="30" y="390" width="820" height="130"/>
<circle class="badge" cx="50" cy="410" r="14"/>
<text class="badgeText" x="50" y="414">3</text>
<text class="label" x="78" y="414">Privilege escalation + discovery</text>
<text class="sub" x="78" y="436">Access-token manipulation; application shimming</text>
<text class="sub" x="78" y="454">Registry / process / system-info enumeration</text>
<text class="sub" x="78" y="472">USB-bus (T1120) and network-share (T1135) discovery</text>
<text class="mono" x="78" y="496">T1134 / T1546.011 / T1548 / T1012 / T1082</text>

<!-- Stage 4 -->
<rect class="stage" x="30" y="535" width="820" height="130"/>
<circle class="badge" cx="50" cy="555" r="14"/>
<text class="badgeText" x="50" y="559">4</text>
<text class="label" x="78" y="559">Collection + claimed exfiltration</text>
<text class="sub" x="78" y="581">Archive collected data; note claims data theft</text>
<text class="sub" x="78" y="599">Victim contact funneled through Tor (.onion) portal</text>
<text class="sub" x="78" y="617">No exfil domain or volume published (treat as claimed)</text>
<text class="mono" x="78" y="641">T1560 / T1071 / T1090.003</text>

<!-- Stage 5 (critical) -->
<rect class="stageK" x="30" y="680" width="820" height="130"/>
<circle class="badgeK" cx="50" cy="700" r="14"/>
<text class="badgeText" x="50" y="704">5</text>
<text class="label" x="78" y="704">Inhibit recovery  [CRITICAL]</text>
<text class="sub" x="78" y="726">Delete Volume Shadow Copies before encryption</text>
<text class="sub" x="78" y="744">Earliest reliable, high-fidelity ransomware tell</text>
<text class="mono" x="78" y="768">vssadmin Delete Shadows /all /quiet</text>
<text class="mono" x="78" y="786">wmic shadowcopy delete /nointeractive   (T1490)</text>

<!-- Stage 6 (critical) -->
<rect class="stageK" x="30" y="825" width="820" height="130"/>
<circle class="badgeK" cx="50" cy="845" r="14"/>
<text class="badgeText" x="50" y="849">6</text>
<text class="label" x="78" y="849">Impact - in-place encryption  [CRITICAL]</text>
<text class="sub" x="78" y="871">Encrypts file content; NO rename, NO extension</text>
<text class="sub" x="78" y="889">1.jpg stays 1.jpg but can no longer be opened</text>
<text class="sub" x="78" y="907">Drops note + Tor portal + per-victim access key</text>
<text class="mono" x="78" y="931">!!!README!!!DO_NOT_DELETE.txt   (T1486)</text>

<!-- flow arrows -->
<g color="#2a4a6a">
<line class="arrow" x1="440" y1="230" x2="440" y2="244" marker-end="url(#ah)"/>
<line class="arrow" x1="440" y1="375" x2="440" y2="389" marker-end="url(#ah)"/>
<line class="arrow" x1="440" y1="520" x2="440" y2="534" marker-end="url(#ah)"/>
<line class="arrow" x1="440" y1="665" x2="440" y2="679" marker-end="url(#ah)"/>
<line class="arrow" x1="440" y1="810" x2="440" y2="824" marker-end="url(#ah)"/>
</g>

<rect class="footer" x="20" y="985" width="840" height="85"/>
<text class="footerH" x="34" y="1011">Detection anchors</text>
<text class="footerT" x="34" y="1031">Shadow-copy deletion (pre-encryption) and the ransom-note write are the loudest signals; extension and</text>
<text class="footerT" x="34" y="1049">canary-rename rules are blind to this family. Hunt by recovery inhibition (T1490) and per-process file-</text>
<text class="footerT" x="34" y="1067">modification rate, not by file extension.   Source: CYFIRMA 2026-05-22; pcrisk.</text>
</svg>
