<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">LinkPro eBPF rootkit kill chain</title>
<desc id="d">Two lanes. Left, the victim AWS EKS estate: exposed Jenkins exploited via CVE-2024-23897, malicious kvlnt/vv container deployed to EKS, pod credential harvest, vGet downloads in-memory vShell, then LinkPro installs an eBPF Hide module, an ld.so.preload fallback library, and a Knock magic-packet listener. Right, the operator infrastructure: Jenkins CLI file read, Docker Hub image, vnt relay, S3 staging, vShell C2, and the magic packet (TCP SYN window 54321) that activates the internal listener on port 2233. Critical red anchors are the eBPF Hide module load and the Knock listener; both are detectable at load or transit time even though the rootkit hides itself afterward.</desc>
<defs>
