<rect class="footer" x="20" y="1175" width="840" height="95"/>
<text class="footerH" x="32" y="1198">Detection anchors (durable, survive per-intrusion rebuilds)</text>
<text class="footerT" x="32" y="1218">Load-time: auditd bpf() syscall (key ebpf_load) catches Hide/Knock before they blind bpftool inventory.</text>
<text class="footerT" x="32" y="1236">Seam: /etc/ld.so.preload write + ss-vs-netstat port 2233 discrepancy; static-binary directory listing.</text>
<text class="footerT" x="32" y="1254">Transit: TCP SYN window 54321 on a tap; vnt relay 29872; verify eBPF via RAM prog_idr, not userspace.</text>
