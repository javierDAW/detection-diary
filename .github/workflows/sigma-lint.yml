name: sigma-lint

on:
  push:
    branches: [main]
    paths:
      - 'days/**/sigma/**.yml'
      - 'days/**/sigma/**.yaml'
      - '.github/workflows/sigma-lint.yml'
  pull_request:
    paths:
      - 'days/**/sigma/**.yml'
      - 'days/**/sigma/**.yaml'
      - '.github/workflows/sigma-lint.yml'
  workflow_dispatch:

jobs:
  lint:
    name: Validate Sigma rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pySigma + Sigma CLI + backends
        run: |
          python -m pip install --upgrade pip
          pip install \
            pysigma \
            sigma-cli \
            pysigma-backend-splunk \
            pysigma-backend-elasticsearch \
            pysigma-backend-microsoft365defender \
            pysigma-pipeline-windows \
            pysigma-pipeline-sysmon \
            pyyaml \
            yamllint

      - name: yamllint (style + structural sanity)
        run: |
          mkdir -p .lint
          cat > .lint/yamllint.yaml <<'EOF'
          extends: relaxed
          rules:
            line-length: { max: 200, level: warning }
            document-start: disable
            truthy: { check-keys: false }
            indentation:
              spaces: 2
              indent-sequences: consistent
          EOF
          yamllint -c .lint/yamllint.yaml days/**/sigma/*.yml days/**/sigma/*.yaml || true
          # We do not fail the job on yamllint warnings; pysigma is the gate.

      - name: sigma check (parse + structural validation)
        run: |
          set -e
          shopt -s globstar nullglob
          rules=( days/**/sigma/*.yml days/**/sigma/*.yaml )
          if [ ${#rules[@]} -eq 0 ]; then
            echo "::warning::No Sigma rules found under days/**/sigma/"
            exit 0
          fi
          echo "Found ${#rules[@]} Sigma rule(s)."
          sigma check "${rules[@]}"

      - name: sigma convert → splunk (smoke test)
        run: |
          set -e
          shopt -s globstar nullglob
          rules=( days/**/sigma/*.yml days/**/sigma/*.yaml )
          for r in "${rules[@]}"; do
            echo "::group::convert $r → splunk"
            sigma convert -t splunk -p sysmon "$r" || {
              echo "::error file=$r::failed to convert to splunk";
              exit 1;
            }
            echo "::endgroup::"
          done

      - name: sigma convert → microsoft365defender (smoke test, allow soft fail)
        run: |
          set +e
          shopt -s globstar nullglob
          rules=( days/**/sigma/*.yml days/**/sigma/*.yaml )
          fail=0
          for r in "${rules[@]}"; do
            echo "::group::convert $r → microsoft365defender"
            if ! sigma convert -t microsoft365defender "$r"; then
              echo "::warning file=$r::not convertible to microsoft365defender (acceptable for non-Defender logsources)"
            fi
            echo "::endgroup::"
          done
          # We do NOT fail on this — Defender XDR backend has stricter requirements
          # than the universal Sigma schema. The splunk smoke test above is the gate.
          exit 0

      - name: Done
        run: echo "Sigma rules validated."
