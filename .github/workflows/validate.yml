name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-lint:
    name: Validate all detection content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyyaml \
            pysigma \
            sigma-cli \
            pysigma-backend-splunk \
            pysigma-backend-microsoft365defender \
            pysigma-pipeline-windows \
            pysigma-pipeline-sysmon \
            yamllint

      - name: Install YARA + Suricata + shellcheck (apt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            yara \
            suricata \
            shellcheck \
            jq \
            >/dev/null

      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run offline validator (validate_all.py)
        run: python3 tools/validate_all.py

      - name: Run full toolchain (lint_all.sh)
        run: ./tools/lint_all.sh

      - name: Done
        run: echo "All detection content validated successfully."
