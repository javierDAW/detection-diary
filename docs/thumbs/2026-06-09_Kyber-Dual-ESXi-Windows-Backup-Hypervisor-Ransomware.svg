<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Kyber ransomware dual ESXi and Windows kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the Kyber Linux/ESXi encryptor: SSH access to the ESXi host, fork/setsid background detach, esxcli VM process kill of running VMs, defacement of /etc/motd and the hostd docroot index pages, recursive traversal of /vmfs/volumes, ChaCha8 encryption with RSA-4096 key wrap (the post-quantum Kyber1024 claim in the note is false), and rename to .xhsyw with KYBER/CDTA/ATDC trailer markers. Right lane is the Windows Rust encryptor win_encryptor 1.0: SeDebugPrivilege gate, stopping veeam/vss/backup/sql/msexchange services, the eleven-command anti-recovery set (three-method VSS deletion, bcdedit recoveryenabled No, wbadmin system-state delete), clearing all event logs with wevtutil cl, optional Hyper-V Stop-VM force turnoff, and AES-256-CTR with Kyber1024 wrap renaming files to .#~~~. The two variants share a campaign ID and Tor infrastructure. Critical detection anchors are esxcli vm process kill, ESXi management-file defacement, and the Windows service-stop plus recovery-inhibition command set.</desc>
