<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Cavern Manticore kill chain - Iran-MOIS modular .NET C2 framework</title>
<desc id="d">Two-lane diagram. Left lane is the victim environment: Cavern Manticore reaches the target through a trusted IT provider and a second-hop provider, weaponizes a SysAid software update to drop a DLL side-load where legitimate WinDirStat.exe loads a trojanized uxtheme.dll (the Cavern Agent), whose module dispatcher loads native n- DLLs via LoadLibraryA and managed .NET modules via per-module AppDomain isolation; the agent's n-HTCommp.dll reaches hospitalinstallation.com over HTTPS/WebSocket and older builds relay via a cac.aspx IIS webshell, then post-exploitation modules run AD recon, LDAP and SMB brute-force, LSASS dumping and SOCKS5/WebSocket tunneling for lateral movement and exfiltration. Right lane is the operator building the framework across three .NET compilation formats as an anti-RE layer. Detection anchors are uxtheme.dll loaded from a non-System32 path, anomalous AppDomain and Native-AOT module loads, cac.aspx on IIS, and beacons to Fars-Data-registered domains.</desc>
