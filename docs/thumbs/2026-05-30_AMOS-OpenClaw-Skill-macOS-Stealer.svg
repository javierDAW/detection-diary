<title id="t">AMOS macOS stealer kill chain — OpenClaw skill delivery to wallet and Keychain theft</title>
<desc id="d">Two-lane kill chain for AMOS / Atomic macOS Stealer delivered through a malicious OpenClaw skill. Left lane shows seven victim-Mac stages: a malicious SKILL.md ingested by an AI coding agent, an osascript fake-password dialog that captures the user password, a curl-to-shell first-stage loader, the multi-key-XOR universal Mach-O AMOS payload, direct login.keychain-db and crypto-wallet theft, ditto staging into /tmp/out.zip, and a curl multipart exfiltration POST. Right lane shows six infrastructure boxes: the AMOS malware-as-a-service family, the OpenClaw skill marketplace and affiliate publisher accounts, the openclawcli.vercel.app fake-driver lure, the 91.92.242.30 loader host, the socifiapp.com C2 report-upload endpoint, and trojanized wallet replacement apps. Critical badges flag the osascript password capture, the curl loader, the credential theft, and the exfil POST.</desc>
