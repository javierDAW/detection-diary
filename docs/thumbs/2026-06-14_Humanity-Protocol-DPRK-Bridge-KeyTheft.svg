<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Humanity Protocol $36M bridge takeover kill chain</title>
<desc id="d">Two-lane kill chain. Left lane (victim endpoint): a Bithumb-impersonation spear-phishing email with a malicious attachment, user execution, a remote-access loader signed with a stolen Hancom code-signing certificate (critical), full remote-desktop control while evading endpoint security, theft of wallet data and roughly seven Gnosis Safe private keys from one laptop, the stolen keys meeting the multisig threshold as valid signers, and containment by freezing the Ethereum contract via an uncompromised Safe. Right lane (attacker on-chain): signing Gnosis Safe transactions with the stolen keys across Ethereum and BSC, transferring ProxyAdmin ownership to an attacker wallet (critical, point of no return), upgrading the Hyperlane bridge proxy to a malicious implementation with an unlimited-mint and drain backdoor, draining about 141.18 million H on Ethereum, minting over 200 million H on BSC, and laundering through Uniswap, PancakeSwap and Kyber over eight hours for about 36 million dollars. Detection anchors are the Hancom-signed loader on the left and the ProxyAdmin ownership transfer on the right.</desc>
