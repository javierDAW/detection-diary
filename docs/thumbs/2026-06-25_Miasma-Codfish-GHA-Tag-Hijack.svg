<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">Miasma codfish/semantic-release-action tag hijack kill chain</title>
  <desc id="d">Two-lane kill chain. Left lane shows the victim CI/CD pipeline: workflow references floating tag, composite action executes Bun, dead-drop C2 polls GitHub API, credentials harvested from runner environment. Right lane shows attacker infrastructure: leaked Miasma toolkit, forged orphan commits repointing 16 tags, Bun runtime from oven-sh/setup-bun, GitHub commit search API as dead-drop, npm publish for worm propagation. Red badges mark critical detection anchors at the Bun execution and dead-drop C2 stages.</desc>
