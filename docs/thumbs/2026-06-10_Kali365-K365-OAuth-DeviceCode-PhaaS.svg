<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Kali365 OAuth 2.0 device-code phishing kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim identity plane: a OneDrive/SharePoint phishing link loads a lure that shows a Preparing your secure document loader, presents a Microsoft device user_code auto-copied to the clipboard, the victim authorizes that code at the genuine microsoft.com/devicelogin endpoint and completes MFA themselves (the critical MFA-bypass point), Microsoft issues access and refresh tokens directly to the attacker application, the operator uses those tokens via Microsoft Graph from a hosting ASN, and finally collects mail and performs BEC follow-on. Right lane is the operator infrastructure: the Kali365 PhaaS backend branded K365 Control sold on Telegram, disposable Cloudflare Worker and attachedfile.com front-ends, the operator app requesting a device code from Microsoft, the C2 panel.securehubcloud.com polled every three seconds to learn when tokens are captured (the second critical anchor), CTI pivots on the TLS certificate SHA1 and HTTP banner hash that survive domain rotation, and a parallel MAX Messenger takeover branch exfiltrating OTP and 2FA to a Telegram bot. Durable detection anchors are the device-code protocol in sign-in logs, cross-ASN token reuse, and the certificate, banner and content fingerprints.</desc>
