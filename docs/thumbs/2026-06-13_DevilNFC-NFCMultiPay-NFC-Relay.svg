<text class="footerH" x="40" y="1203">Detection anchors (transport rotates, behaviour persists)</text>
<text class="footerT" x="40" y="1226">HCE card-emulation by a non-wallet sideloaded app; Xposed hook on findSelectAid() with one dummy AID; Kiosk lock + PIN overlay;</text>
