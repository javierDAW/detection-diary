<circle class="badge" cx="50" cy="140" r="14"/>
<text class="badgeText" x="50" y="144">1</text>
<text class="label" x="74" y="144">Delivery - smishing / WhatsApp</text>
<text class="sub" x="40" y="168">Fake bank "security update" page imitating</text>
