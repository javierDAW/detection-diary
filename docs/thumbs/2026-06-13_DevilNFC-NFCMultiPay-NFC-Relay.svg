<text class="sub" x="40" y="200">T1660 Phishing (Mobile).</text>
<text class="mono" x="40" y="226">lure: "cuenta bloqueada, instale update"</text>
<text class="mono" x="40" y="244">-&gt; APK download (non-store)</text>

<!-- LEFT STAGE 2 -->
<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/>
<text class="badgeText" x="50" y="294">2</text>
<text class="label" x="74" y="294">Install - sideloaded fake-bank APK</text>
<text class="sub" x="40" y="318">Masquerades as the bank's official app;</text>
<text class="sub" x="40" y="334">requests NFC + SMS + overlay grants.</text>
<text class="sub" x="40" y="350">T1655.001 Match Legitimate Name.</text>
<text class="mono" x="40" y="376">pkg: com.devilnfc.reader</text>
<text class="mono" x="40" y="394">md5: caa5e8cf...e88c2</text>

<!-- LEFT STAGE 3 -->
<rect class="stage" x="30" y="420" width="395" height="135"/>
<circle class="badge" cx="50" cy="440" r="14"/>
<text class="badgeText" x="50" y="444">3</text>
<text class="label" x="74" y="444">Kiosk lock - victim trapped</text>
<text class="sub" x="40" y="468">KioskActivity: lockTask, system UI hidden,</text>
<text class="sub" x="40" y="484">back button neutralised; template from C2.</text>
<text class="sub" x="40" y="500">T1541 Foreground Persistence.</text>
<text class="mono" x="40" y="526">KioskActivity + WebView (remote template)</text>
<text class="mono" x="40" y="544">no exit while relay runs</text>

<!-- LEFT STAGE 4 -->
<rect class="stage" x="30" y="570" width="395" height="135"/>
<circle class="badge" cx="50" cy="590" r="14"/>
<text class="badgeText" x="50" y="594">4</text>
<text class="label" x="74" y="594">Card tap - reader role</text>
<text class="sub" x="40" y="618">Victim holds card to phone; standard</text>
