<rect class="op" x="460" y="295" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="315" r="14"/>
<text class="badgeText" x="480" y="319">R</text>
<text class="label" x="504" y="319">Relay broker (live APDU tunnel)</text>
<text class="sub" x="470" y="343">DevilNFC: raw TCP + Protobuf state machine</text>
<text class="sub" x="470" y="359">OP_SYN/ACK/PSH/FIN, TCP_NODELAY.</text>
<text class="sub" x="470" y="375">NFCMultiPay: REST poll then MQTT 1883.</text>
<text class="sub" x="470" y="391">T1437.001 Web Protocols.</text>
<text class="mono" x="470" y="421">185.203.116[.]18 / 47.253.167[.]219</text>
<text class="mono" x="470" y="439">MQTT 1883 retained card_ready topic</text>

<!-- RIGHT OP 3 (critical) -->
<rect class="opK" x="460" y="465" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="485" r="14"/>
<text class="badgeText" x="480" y="489">T</text>
<text class="label" x="504" y="489">Rooted tapper = HCE (CRITICAL)</text>
<text class="sub" x="470" y="513">Same APK becomes a Host Card Emulator;</text>
<text class="sub" x="470" y="529">Xposed hook injects into com.android.nfc.</text>
<text class="sub" x="470" y="545">findSelectAid() reroutes any payment AID</text>
<text class="sub" x="470" y="561">to one dummy AID -&gt; relay pipeline.</text>
<text class="mono" x="470" y="591">dummy AID F0010203040506 (Google sample)</text>
<text class="mono" x="470" y="609">libnfcgate.so (NFCGate-derived)</text>

<!-- RIGHT OP 4 -->
<rect class="op" x="460" y="635" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="655" r="14"/>
<text class="badgeText" x="480" y="659">P</text>
<text class="label" x="504" y="659">POS / ATM cash-out</text>
<text class="sub" x="470" y="683">Tapper held to a real terminal; relayed</text>
<text class="sub" x="470" y="699">card is card-present from an implausible</text>
<text class="sub" x="470" y="715">geo. PIN harvest unlocks ATM + chip-PIN.</text>
