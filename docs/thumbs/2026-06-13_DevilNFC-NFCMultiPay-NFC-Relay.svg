<rect class="stageK" x="30" y="720" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="740" r="14"/>
<text class="badgeText" x="50" y="744">5</text>
<text class="label" x="74" y="744">PIN overlay capture (CRITICAL)</text>
<text class="sub" x="40" y="768">Fake "verification" pop-up harvests 4-digit</text>
<text class="sub" x="40" y="784">PIN; fake error extends relay window ~10s.</text>
<text class="sub" x="40" y="800">T1417.002 GUI Input Capture.</text>
<text class="mono" x="40" y="826">POST api_pin.php pin=&amp;bank=&amp;ip=</text>
<text class="mono" x="40" y="844">+ e-banking password (2nd form)</text>

<!-- LEFT STAGE 6 -->
<rect class="stage" x="30" y="870" width="395" height="135"/>
<circle class="badge" cx="50" cy="890" r="14"/>
<text class="badgeText" x="50" y="894">6</text>
<text class="label" x="74" y="894">SMS / OTP interception</text>
<text class="sub" x="40" y="918">SmsPermissionManager polls inbound SMS,</text>
