<rect class="bg" x="0" y="0" width="880" height="1280"/>
<text class="head" x="20" y="36">DevilNFC / NFCMultiPay - Android NFC relay fraud</text>
<text class="meta" x="20" y="58">Vendor: Cleafy TIR - Date: 2026-05-18 - Clusters: DevilNFC (ES) + NFCMultiPay (BR) - Day 47</text>

<rect class="laneL" x="20" y="85" width="410" height="1080"/>
<rect class="laneR" x="450" y="85" width="410" height="1080"/>
