<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">DevilNFC / NFCMultiPay NFC relay kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim unrooted phone: smishing delivery, sideloaded fake-bank APK, DevilNFC Kiosk lock, card tap in passive reader role, critical PIN-overlay capture, SMS/OTP interception, and exfiltration. Right lane is the operator estate: C2 template and panel server, relay broker (raw-TCP Protobuf for DevilNFC, MQTT 1883 for NFCMultiPay), critical rooted tapper acting as a Host Card Emulator with an Xposed findSelectAid AID-reroute, the POS or ATM terminal where the relayed card is cashed out, the Telegram exfiltration channel, and the NFCMultiPay REST-to-MQTT variant. Critical anchors in red are the PIN-overlay capture and the HCE AID-reroute on the tapper.</desc>
