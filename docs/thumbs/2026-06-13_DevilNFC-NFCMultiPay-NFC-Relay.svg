<!-- RIGHT OP 6 -->
<rect class="op" x="460" y="975" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="995" r="14"/>
<text class="badgeText" x="480" y="999">M</text>
<text class="label" x="504" y="999">NFCMultiPay variant (BR)</text>
<text class="sub" x="470" y="1023">Pure Java, no root, two phones + broker.</text>
