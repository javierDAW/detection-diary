<text class="label" x="504" y="149">C2 template + operator panel</text>
<text class="sub" x="470" y="173">Serves the fake banking template fetched</text>
<text class="sub" x="470" y="189">by KioskActivity; manages active sessions.</text>
<text class="sub" x="470" y="205">DevilNFC panel = native Spanish.</text>
