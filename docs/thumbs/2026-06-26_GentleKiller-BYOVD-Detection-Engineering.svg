<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">GentleKiller BYOVD kill chain — Day 60</title>
  <desc id="d">Two-lane kill chain. Left lane: victim-side stages from FortiGate initial access through BYOVD driver service install (critical detection window), EDR process kill loop (telemetry goes dark), OxideHarvest credential theft, and ransomware encryption. Right lane: Gentlemen operator toolkit — victim selection by FortiGate config, GentleKiller 8-variant package assembly, impersonation layer application, kernel BYOVD execution, OxideHarvest affiliate tool, and leaked operator backend. Red badges mark the two critical detection-window stages. Footer summarizes behavioral detection anchors: GentlemenCollection directory, sc.exe kernel service from non-standard path, and EDR process mass termination threshold.</desc>
