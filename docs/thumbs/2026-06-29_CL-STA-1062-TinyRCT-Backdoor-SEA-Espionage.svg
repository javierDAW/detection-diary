<title id="t">CL-STA-1062 TinyRCT kill chain</title>
<desc id="d">Two-lane diagram. Left lane (victim Windows estate): ASPX web-shell initial access, internal recon with fscan and traceroute, JuicyPotato privilege escalation and Mimikatz credential theft, chrome_setup.zip AppDomainManager delivery (critical), TinyRCT PerfWatson2.exe execution from LOCALAPPDATA, scheduled-task persistence, and RAR plus AES-chunk exfiltration. Right lane (attacker infrastructure and tradecraft): staging server 139.180.134.221, TinyRCT HTTP C2 45.32.113.172 with AES-128-CBC ten-second beacon (critical), renamed open-source tunnelers, the AppDomainManager loader DLL, choice.exe self-delete anti-forensics, and Chinese-speaking attribution overlapping UAT-7237. Detection anchors: AppDomainManager sideload, PerfWatson2.exe from AppData, and choice.exe self-delete.</desc>
