<title id="t">GREYVIBE Russia-nexus AI-augmented espionage against Ukraine - kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim Windows chain: lure delivery (spear-phish, fake CAPTCHA, fake adult-club sites with Telegram grooming), a .NET/JS/PyInstaller loader launching a decoy while infecting, the PhantomRelay PowerShell fingerprinting stage (XOR plus base64 to C2, history suppression, hardcoded Chrome user-agent), the PhantomRelay or LegionRelay RAT (WebSocket or REST api endpoints, critical), watchdog scheduled-task persistence that re-spawns the RAT every three minutes, privilege escalation via shortcut hijack and fake Windows Update UAC and CMSTP, and collection plus exfiltration of screenshots, browser, Telegram and WhatsApp data with USB propagation (critical). Right lane is GREYVIBE infrastructure and enablers: the newly named Russia-nexus cluster, systematic GenAI tooling (ChatGPT, Gemini, Ideogram), delivery infrastructure on Google Drive and paste sites, compromised-domain C2 on EDIS Global upstream M247, a Telegram dead-drop C2 resolver, and the FallSpy Android spyware plus HUMINT and cybercrime overlap. Detection anchors are conhost headless, the minute-cadence watchdog task, on-disk artifact file names and hardcoded user-agents.</desc>
