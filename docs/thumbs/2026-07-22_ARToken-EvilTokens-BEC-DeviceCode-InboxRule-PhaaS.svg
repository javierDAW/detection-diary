<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">ARToken / EvilTokens BEC-as-a-service kill chain</title>
<desc id="d">Two-lane kill chain. Left lane (victim side): Cloudflare Workers resource development, vendor-impersonation invoice lure, seven-layer anti-analysis gate, device-code credential theft, Primary Refresh Token persistence, ARTSender BEC mailbox collection, and SharePoint/OneDrive impact plus operator cleanup. Right lane (attacker side): the ARToken Panel dashboard, its C2 API for device-code and PRT endpoints, the anti-analysis stack, the ARTSender and Box Monitor BEC toolkit, the ARTBrowser desktop session viewer, and the platform's subscription economics. Cross-lane arrows anchor the C2 API's role in credential/PRT escalation and the ARTSender toolkit's role in mailbox collection.</desc>
