<text class="footerH" x="32" y="1200">Detection anchors</text>
<text class="footerT" x="32" y="1220">1) Signed binary (MpExtMs.exe) loading a system-named DLL (version.dll / EndpointDlp.dll) from a non-System32 path.</text>
<text class="footerT" x="32" y="1238">2) explorer.exe-spawned PowerShell/curl/certutil fetching a remote .msi (ClickFix paste-and-run).</text>
<text class="footerT" x="32" y="1256">3) HKCU Run key named AnyDesk/Splashtop/Comms but launching portable pythonw.exe (ModeloRAT). Author: Jarmi.</text>
