<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">KongTuke/Woodgnat Backdoor.Mistic kill chain</title>
<desc id="d">Two-lane diagram. Left lane (victim): ClickFix lure, paste-and-run PowerShell, remote MSI, signed MpExtMs.exe side-loading version.dll and EndpointDlp.dll (Backdoor.Mistic, critical), in-memory backdoor with BOF loading and self-delete kill switch (critical), recon plus fake-login credential theft, and Run-key persistence handed off to ransomware affiliates (critical). Right lane (infrastructure): Woodgnat WordPress TDS, delivery domains, Mistic C2 (critical), ModeloRAT WinPython DGA C2, LOLBin toolset, and ransomware buyers (critical). Detection anchors: signed binary loading a system-named DLL from a non-system path, explorer-spawned PowerShell fetching an MSI, and Run-key masquerade launching pythonw.exe.</desc>
