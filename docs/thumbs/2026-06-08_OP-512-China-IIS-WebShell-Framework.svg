<rect class="footer" x="20" y="1175" width="840" height="95"/>
<text class="footerH" x="34" y="1200">A per-deployment-unique web shell defeats hashes by construction - detect the structure (RC4 + RSA-verify + IHttpHandler) and the behavior, not bytes.</text>
<text class="footerT" x="34" y="1222">Self-report on page load means IR interaction can tip off the operator; investigate suspected shells from logs first, never browse the URL.</text>
<text class="footerT" x="34" y="1240">Deleting the .aspx/.ashx is not eradication - compiled DLLs in Temporary ASP.NET Files outlive the source and are reactivation points.</text>
<text class="footerT" x="34" y="1258">Prevention fired != contained: IIS restarts the worker and reloads memory tooling; isolate the host, and fix the entry vector before closing.</text>
</svg>
