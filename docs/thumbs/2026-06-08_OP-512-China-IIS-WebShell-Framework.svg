<rect class="bg" x="0" y="0" width="880" height="1280"/>
<text class="head" x="20" y="36">OP-512 - China-linked IIS web shell framework</text>
<text class="meta" x="20" y="58">Vendor: ReliaQuest · Date: 2026-06-05 · Cluster: OP-512 (China, suspected) · Day 42</text>

<rect class="laneL" x="20" y="85" width="410" height="1080"/>
<rect class="laneR" x="450" y="85" width="410" height="1080"/>
<text class="laneLabelL" x="34" y="104">VICTIM CHAIN - IIS server / ASP.NET runtime</text>
<text class="laneLabelR" x="464" y="104">ATTACKER - operations against the IIS host</text>

<rect class="stage" x="30" y="120" width="395" height="135"/>
<circle class="badge" cx="50" cy="140" r="14"/>
<text class="badgeText" x="50" y="144">1</text>
<text class="label" x="72" y="144">Legacy IIS server exposed (DMZ)</text>
<text class="sub" x="40" y="168">Internet-facing Windows Server 2016, EOL .NET 4.0</text>
<text class="sub" x="40" y="184">DMZ host bridges internet and internal tiers</text>
<text class="sub" x="40" y="200">Access seen ~75 days earlier (patient return)</text>
<text class="mono" x="40" y="226">T1190 Exploit Public-Facing Application</text>
<text class="mono" x="40" y="244">Entry path not conclusively determined</text>

<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/>
<text class="badgeText" x="50" y="294">2</text>
<text class="label" x="72" y="294">Web shell #1: .aspx file manager</text>
<text class="sub" x="40" y="318">w3wp.exe writes a .aspx into the upload directory</text>
<text class="sub" x="40" y="334">File ops: list, read/write, upload, delete, rename</text>
<text class="sub" x="40" y="350">Authored by the worker process itself</text>
<text class="mono" x="40" y="376">T1505.003 Web Shell</text>
<text class="mono" x="40" y="394">TELL: worker writing script to a webroot path</text>

<rect class="stageK" x="30" y="420" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="440" r="14"/>
<text class="badgeText" x="50" y="444">3</text>
<text class="label" x="72" y="444">Self-report C2 beacon</text>
<text class="sub" x="40" y="468">On page load, encodes own URL into a DNS query</text>
<text class="sub" x="40" y="484">Pattern a.&lt;hex&gt;.c.hcgos[.]com (5-min cooldown)</text>
<text class="sub" x="40" y="500">HTTP fallback to Meterpreter C2 if DNS fails</text>
<text class="mono" x="40" y="526">T1071.004 DNS / T1071.001 Web / T1132.001</text>
<text class="mono" x="40" y="544">CRITICAL: any visit (even IR) can alert operator</text>

<rect class="stage" x="30" y="570" width="395" height="135"/>
<circle class="badge" cx="50" cy="590" r="14"/>
<text class="badgeText" x="50" y="594">4</text>
<text class="label" x="72" y="594">Web shells #2-3: .ashx handlers</text>
<text class="sub" x="40" y="618">Two crypto command handlers, unique RSA key each</text>
<text class="sub" x="40" y="634">Pipeline: Base64 -&gt; RC4 -&gt; RSA-verify -&gt; execute</text>
<text class="sub" x="40" y="650">Only the private-key holder can issue commands</text>
<text class="mono" x="40" y="676">T1573.002 RSA / T1573.001 RC4</text>
<text class="mono" x="40" y="694">Compartmentalized: one key != access to other</text>

<rect class="stageK" x="30" y="720" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="740" r="14"/>
<text class="badgeText" x="50" y="744">5</text>
<text class="label" x="72" y="744">In-memory privilege escalation</text>
<text class="sub" x="40" y="768">Potato suite + GhostKit loaded into w3wp.exe</text>
<text class="sub" x="40" y="784">Nothing written to disk (reflective .NET load)</text>
<text class="sub" x="40" y="800">whoami /priv base64 matches Flax Typhoon playbook</text>
<text class="mono" x="40" y="826">T1620 Reflective Load / T1134.001 / T1068</text>
<text class="mono" x="40" y="844">CRITICAL: only EDR behavior analytics caught it</text>

<rect class="stage" x="30" y="870" width="395" height="135"/>
<circle class="badge" cx="50" cy="890" r="14"/>
<text class="badgeText" x="50" y="894">6</text>
<text class="label" x="72" y="894">Timestomp + compiled-DLL persistence</text>
<text class="sub" x="40" y="918">Shells backdate to median neighbour timestamp</text>
<text class="sub" x="40" y="934">ASP.NET temp dir compiles .aspx/.ashx to .dll</text>
<text class="sub" x="40" y="950">DLLs persist after web shell files are deleted</text>
<text class="mono" x="40" y="976">T1070.006 Timestomp / T1027 Obfuscation</text>
<text class="mono" x="40" y="994">IR: clear Temporary ASP.NET Files separately</text>

<rect class="stage" x="30" y="1020" width="395" height="135"/>
<circle class="badge" cx="50" cy="1040" r="14"/>
<text class="badgeText" x="50" y="1044">7</text>
<text class="label" x="72" y="1044">EDR kill -&gt; IIS auto-restart loop</text>
<text class="sub" x="40" y="1068">Prevention killed w3wp.exe; IIS restarted it</text>
<text class="sub" x="40" y="1084">In-memory tooling reloaded within minutes</text>
<text class="sub" x="40" y="1100">Containment = host isolation, not process kill</text>
<text class="mono" x="40" y="1126">Detect-kill-reload loop until host isolated</text>
<text class="mono" x="40" y="1144">Prevention fired != threat contained</text>

<rect class="op" x="460" y="125" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="145" r="14"/>
<text class="badgeText" x="480" y="149">A</text>
<text class="label" x="502" y="149">Patient return after 75 days</text>
<text class="sub" x="470" y="173">Earlier foothold + DNS to ashx.lhlsjcb[.]com</text>
<text class="sub" x="470" y="189">Operator returns rather than moving on</text>
<text class="sub" x="470" y="205">Hallmark of state-aligned espionage dwell</text>
<text class="sub" x="470" y="221">Within hours: shells, channels, escalation</text>
<text class="mono" x="470" y="251">Recon + re-entry on legacy IIS in a DMZ</text>
<text class="mono" x="470" y="269">T1190 public-facing exploitation</text>

<rect class="opK" x="460" y="295" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="315" r="14"/>
<text class="badgeText" x="480" y="319">B</text>
<text class="label" x="502" y="319">Drop the polymorphic framework</text>
<text class="sub" x="470" y="343">Shared builder randomizes identifiers per build</text>
<text class="sub" x="470" y="359">Injects dead vars + junk comments (no-op)</text>
<text class="sub" x="470" y="375">Identical logic, different hash every time</text>
<text class="sub" x="470" y="391">Per-handler RSA key pair</text>
<text class="mono" x="470" y="421">Signature/hash detection defeated by design</text>
<text class="mono" x="470" y="439">CRITICAL: hunt structure + behavior, not bytes</text>

<rect class="op" x="460" y="465" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="485" r="14"/>
<text class="badgeText" x="480" y="489">C</text>
<text class="label" x="502" y="489">Infra catalogs the deployment</text>
<text class="sub" x="470" y="513">Shell self-reports its URL on first load</text>
<text class="sub" x="470" y="529">Operator drops file and moves on</text>
<text class="sub" x="470" y="545">DNS-first, HTTP-fallback, one-way channel</text>
<text class="sub" x="470" y="561">Decouples deployment from discovery</text>
<text class="mono" x="470" y="591">hcgos[.]com (later) vs lhlsjcb[.]com (earlier)</text>
<text class="mono" x="470" y="609">T1071.004 DNS self-report</text>

<rect class="opK" x="460" y="635" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="655" r="14"/>
<text class="badgeText" x="480" y="659">D</text>
<text class="label" x="502" y="659">Drive authenticated commands</text>
<text class="sub" x="470" y="683">.ashx handler verifies RSA signature first</text>
<text class="sub" x="470" y="699">RC4-encrypted, Base64-wrapped request body</text>
<text class="sub" x="470" y="715">Encrypted responses evade network inspection</text>
<text class="sub" x="470" y="731">Only the operator's private key works</text>
<text class="mono" x="470" y="761">Each handler embeds a unique RSA public key</text>
<text class="mono" x="470" y="779">CRITICAL: T1505.003 authenticated web shell</text>

<rect class="op" x="460" y="805" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="825" r="14"/>
<text class="badgeText" x="480" y="829">E</text>
<text class="label" x="502" y="829">Escalate in memory</text>
<text class="sub" x="470" y="853">BadPotato, SweetPotato, EfsPotato (token abuse)</text>
<text class="sub" x="470" y="869">GhostKit (EDR label, undocumented)</text>
<text class="sub" x="470" y="885">Reflective .NET load into the worker process</text>
<text class="sub" x="470" y="901">Ran under a limited service account</text>
<text class="mono" x="470" y="931">T1620 / T1134.001 token impersonation</text>
<text class="mono" x="470" y="949">Tell: reflective loads inside w3wp.exe</text>

<rect class="op" x="460" y="975" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="995" r="14"/>
<text class="badgeText" x="480" y="999">F</text>
<text class="label" x="502" y="999">Persist + evade</text>
<text class="sub" x="470" y="1023">Timestomp blends shells into old files</text>
<text class="sub" x="470" y="1039">Compiled DLLs survive source deletion</text>
<text class="sub" x="470" y="1055">Returns through the same unremediated entry</text>
<text class="sub" x="470" y="1071">Espionage objective: long-term collection</text>
<text class="mono" x="470" y="1101">T1070.006 / T1027 anti-forensics</text>
<text class="mono" x="470" y="1119">Close incident only after root cause fixed</text>

