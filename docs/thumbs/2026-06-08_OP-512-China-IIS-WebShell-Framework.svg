<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">OP-512 China-linked IIS web shell framework - kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim IIS server and ASP.NET runtime: an internet-facing Windows Server 2016 with end-of-life .NET 4.0 in a DMZ, the worker process writing a .aspx file-manager web shell, a self-report C2 beacon that encodes the shell URL into a hex DNS subdomain with an HTTP fallback to a Meterpreter server (critical), two .ashx cryptographic command handlers gated by per-handler RSA signatures and RC4, in-memory privilege escalation loading the Potato suite into the worker process (critical), timestomping and compiled-DLL persistence in the ASP.NET temporary directory, and an endpoint-kill then IIS-auto-restart loop. Right lane is the attacker operation: a patient return after 75 days, dropping a per-deployment polymorphic framework (critical), letting the infrastructure catalog the deployment, driving authenticated commands through the .ashx handlers (critical), escalating in memory, and persisting and evading for long-term collection. Detection anchors are the worker emitting long hex-segmented DNS, reflective .NET loading inside w3wp.exe, and new DLLs compiled in ASP.NET temporary directories outside deployment windows.</desc>
