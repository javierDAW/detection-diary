<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d">
  <title id="t">QLNX Quasar Linux RAT kill chain — Trend Micro, 5 May 2026</title>
  <desc id="d">A Linux developer or DevOps host is implanted with QLNX, which compiles its rootkit and PAM backdoor at runtime via gcc, plants seven persistence anchors marked with the literal QLNX_MANAGED, harvests credentials for npm / PyPI / git / AWS / Kubernetes / Vault / SSH in a single burst, and exfiltrates them over a custom TCP/TLS channel after a geo enrichment beacon to ip-api.com.</desc>
