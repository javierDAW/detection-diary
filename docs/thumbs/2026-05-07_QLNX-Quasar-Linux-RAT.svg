  <text x="40" y="40" class="header">QLNX (Quasar Linux RAT) — kill chain</text>
  <text x="40" y="60" class="subhead">Trend Micro . 5 May 2026 . v1.4.1 . dev / DevOps Linux . 58-cmd C2 . 7 persistence anchors</text>

  <text x="20" y="120" class="lane" transform="rotate(-90, 20, 120)">VICTIM (Linux dev / DevOps host)</text>
  <text x="855" y="120" class="lane" transform="rotate(90, 855, 120)">OPERATOR (custom TCP/TLS + ip-api.com geo)</text>

  <!-- Stage 1 -->
  <circle cx="80" cy="115" r="14" class="stagebg"/>
  <text x="80" y="119" text-anchor="middle" class="stagenum">1</text>
  <rect x="110" y="92" width="500" height="48" rx="6" class="bg-stage"/>
  <text x="124" y="111" class="label">Initial Access (vector unconfirmed)</text>
  <text x="124" y="128" class="sub">dev-laptop phish / CI runner exploit / trojan tarball</text>
  <text x="600" y="111" text-anchor="end" class="mitre">T1190</text>
  <text x="600" y="128" text-anchor="end" class="ioc">low confidence</text>
  <line x1="360" y1="140" x2="360" y2="172" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 2 -->
  <circle cx="80" cy="195" r="14" class="stagebg"/>
  <text x="80" y="199" text-anchor="middle" class="stagenum">2</text>
  <rect x="110" y="172" width="500" height="58" rx="6" class="bg-stage"/>
  <text x="124" y="191" class="label">Mutex check — /tmp/.X752e2ca1-lock</text>
  <text x="124" y="208" class="sub">DJB2("quasar_linux") = 0x752e2ca1 — disguised X11 lock</text>
  <text x="124" y="224" class="ioc">single-instance guard before any further action</text>
  <text x="600" y="191" text-anchor="end" class="mitre">T1480</text>
  <text x="600" y="224" text-anchor="end" class="ioc">0x752e2ca1</text>
  <line x1="360" y1="230" x2="360" y2="262" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 3 -->
  <circle cx="80" cy="285" r="14" class="stagebg"/>
  <text x="80" y="289" text-anchor="middle" class="stagenum">3</text>
  <rect x="110" y="262" width="500" height="68" rx="6" class="bg-stage"/>
  <text x="124" y="281" class="label">Runtime gcc compile — .so produced on-host</text>
  <text x="124" y="298" class="sub">C source embedded as strings; gcc -shared -fPIC</text>
  <text x="124" y="314" class="ioc">writes into /tmp /var/tmp /var/log/.ICE-unix /dev/shm</text>
  <text x="124" y="326" class="ioc">ABI-matched to host glibc / kernel</text>
  <text x="600" y="281" text-anchor="end" class="mitre">T1027.004 . T1059.004</text>
  <text x="600" y="326" text-anchor="end" class="ioc">runtime compile</text>
  <line x1="360" y1="330" x2="360" y2="362" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 4 -->
  <circle cx="80" cy="385" r="14" class="stagebg"/>
  <text x="80" y="389" text-anchor="middle" class="stagenum">4</text>
  <rect x="110" y="362" width="500" height="78" rx="6" class="bg-stage"/>
  <text x="124" y="381" class="label">Seven persistence anchors (QLNX_MANAGED)</text>
  <text x="124" y="398" class="ioc">/etc/ld.so.preload  +  systemd unit  +  crontab</text>
  <text x="124" y="414" class="ioc">init.d  +  XDG autostart  +  .bashrc/.zshrc</text>
  <text x="124" y="430" class="ioc">/etc/profile.d  with QLNX_MANAGED marker</text>
  <text x="600" y="381" text-anchor="end" class="mitre">T1546 . T1547 . T1574.006</text>
  <text x="600" y="430" text-anchor="end" class="ioc">7 anchors</text>
  <line x1="360" y1="440" x2="360" y2="472" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 5 -->
  <circle cx="80" cy="495" r="14" class="stagebg"/>
  <text x="80" y="499" text-anchor="middle" class="stagenum">5</text>
  <rect x="110" y="472" width="500" height="58" rx="6" class="bg-stage"/>
  <text x="124" y="491" class="label">Userspace + eBPF rootkit</text>
  <text x="124" y="508" class="sub">LD_PRELOAD .so hooks readdir/read/open/socket</text>
  <text x="124" y="524" class="ioc">BPF maps hide PIDs / files / ports from syscalls</text>
  <text x="600" y="491" text-anchor="end" class="mitre">T1014 . T1564.001</text>
  <text x="600" y="524" text-anchor="end" class="ioc">bpf() syscall</text>
  <line x1="360" y1="530" x2="360" y2="562" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 6 -->
  <circle cx="80" cy="585" r="14" class="stagebg"/>
  <text x="80" y="589" text-anchor="middle" class="stagenum">6</text>
  <rect x="110" y="562" width="500" height="58" rx="6" class="bg-stage"/>
  <text x="124" y="581" class="label">PAM backdoor — master password</text>
  <text x="124" y="598" class="sub">Added to /etc/pam.d/sshd; password O$$f$QtYJK bypasses</text>
  <text x="124" y="614" class="ioc">plaintext SSH sessions logged XOR encrypted</text>
  <text x="600" y="581" text-anchor="end" class="mitre">T1556.003</text>
  <text x="600" y="614" text-anchor="end" class="ioc">PAM hook</text>
  <line x1="360" y1="620" x2="360" y2="652" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 7 -->
  <circle cx="80" cy="675" r="14" class="stagebg"/>
  <text x="80" y="679" text-anchor="middle" class="stagenum">7</text>
  <rect x="110" y="652" width="500" height="68" rx="6" class="bg-stage"/>
  <text x="124" y="671" class="label">Credential harvest (60s burst)</text>
  <text x="124" y="688" class="sub">~/.npmrc ~/.pypirc ~/.git-credentials ~/.aws ~/.kube</text>
  <text x="124" y="704" class="sub">~/.docker ~/.vault-token ~/.terraform.d ~/.ssh ~/.config/gh</text>
  <text x="124" y="716" class="ioc">env regex: TOKEN | SECRET | KEY | MNEMONIC | AWS | NPM</text>
  <text x="600" y="671" text-anchor="end" class="mitre">T1552.001 . T1555.005</text>
  <text x="600" y="716" text-anchor="end" class="ioc">10+ paths</text>
  <line x1="360" y1="720" x2="360" y2="752" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 8 -->
  <circle cx="80" cy="775" r="14" class="stagebg"/>
  <text x="80" y="779" text-anchor="middle" class="stagenum">8</text>
  <rect x="110" y="752" width="500" height="58" rx="6" class="bg-stage"/>
  <text x="124" y="771" class="label">Geo enrichment + C2 dial</text>
  <text x="124" y="788" class="sub">HTTP GET ip-api.com  -&gt;  custom TCP/TLS + HTTP/HTTPS fallback</text>
  <text x="124" y="804" class="ioc">first beacon: machine-id SHA256 + 1.4.1 + 58-cmd channel</text>
  <text x="600" y="771" text-anchor="end" class="mitre">T1614 . T1071.001 . T1573.002</text>
  <text x="600" y="804" text-anchor="end" class="ioc">58 commands</text>
  <line x1="600" y1="780" x2="700" y2="780" class="arrow" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <line x1="360" y1="810" x2="360" y2="842" class="arrow" marker-end="url(#arr)"/>

  <!-- Stage 9 -->
  <circle cx="80" cy="865" r="14" class="stagebg"/>
  <text x="80" y="869" text-anchor="middle" class="stagenum">9</text>
  <rect x="110" y="842" width="500" height="58" rx="6" class="bg-stage"/>
  <text x="124" y="861" class="label">Supply-chain pre-position impact</text>
  <text x="124" y="878" class="sub">Captured creds feed npm/PyPI typosquat + CI poison + Vault read</text>
  <text x="124" y="894" class="ioc">downstream: Bitwarden / LiteLLM / Shai-Hulud-class</text>
  <text x="600" y="861" text-anchor="end" class="mitre">T1195.001 . T1195.002</text>
  <text x="600" y="894" text-anchor="end" class="ioc">off-host damage</text>

  <!-- Operator cluster -->
  <rect x="640" y="92" width="220" height="710" rx="6" class="bg-c2"/>
  <text x="660" y="115" class="label">QLNX C2 fabric</text>

  <text x="660" y="148" class="sub">Family / version</text>
  <text x="660" y="166" class="ioc">QLNX = Quasar Linux</text>
  <text x="660" y="182" class="ioc">v1.4.1</text>

  <text x="660" y="216" class="sub">Mutex</text>
  <text x="660" y="234" class="ioc">/tmp/.X752e2ca1-lock</text>
  <text x="660" y="250" class="ioc">DJB2(quasar_linux)</text>
  <text x="660" y="266" class="ioc">= 0x752e2ca1</text>

  <text x="660" y="300" class="sub">Master password</text>
  <text x="660" y="318" class="ioc">O$$f$QtYJK</text>
  <text x="660" y="334" class="ioc">PAM auth bypass</text>

  <text x="660" y="368" class="sub">Marker literal</text>
  <text x="660" y="386" class="ioc">QLNX_MANAGED</text>
  <text x="660" y="402" class="ioc">in every artefact</text>

  <text x="660" y="436" class="sub">Geo recon</text>
  <text x="660" y="454" class="ioc">GET ip-api.com</text>

  <text x="660" y="488" class="sub">Channel</text>
  <text x="660" y="506" class="ioc">custom TCP/TLS</text>
  <text x="660" y="522" class="ioc">HTTP/HTTPS fallback</text>
  <text x="660" y="538" class="ioc">58 commands</text>

  <text x="660" y="572" class="sub">Compile primitive</text>
  <text x="660" y="590" class="ioc">gcc -shared -fPIC</text>
  <text x="660" y="606" class="ioc">ABI match host</text>

  <text x="660" y="640" class="sub">Stage paths</text>
  <text x="660" y="658" class="ioc">/var/log/.ICE-unix/</text>
  <text x="660" y="674" class="ioc">/tmp/.X11-unix/</text>
  <text x="660" y="690" class="ioc">/dev/shm/</text>

  <text x="660" y="724" class="sub">Self-clean</text>
  <text x="660" y="742" class="ioc">clean_QLNX_managed</text>
  <text x="660" y="758" class="ioc">self_destruct cmd</text>

  <text x="660" y="792" class="sub">Detection rate</text>
  <text x="660" y="810" class="ioc">~4 vendors on pub</text>

  <!-- Detection anchors box -->
  <rect x="40" y="930" width="800" height="240" rx="6" class="anchor-bg"/>
  <text x="60" y="958" class="anchor">Detection anchors (rules in this folder)</text>
  <text x="60" y="982" class="anchor-sub">sigma/qlnx_ld_so_preload_write.yml — /etc/ld.so.preload write outside pkg-manager transactions</text>
  <text x="60" y="1002" class="anchor-sub">sigma/qlnx_pam_backdoor_drop.yml — .so drop in /tmp/.ICE-unix/ or /tmp/.X11-unix/</text>
  <text x="60" y="1022" class="anchor-sub">sigma/qlnx_gcc_compile_in_runtime_path.yml — gcc -shared -fPIC writing to ephemeral paths</text>
  <text x="60" y="1042" class="anchor-sub">sigma/qlnx_qlnx_managed_marker_in_persistence.yml — QLNX_MANAGED literal in new persistence artefact</text>
  <text x="60" y="1062" class="anchor-sub">kql/qlnx_credential_files_burst.kql + qlnx_ld_preload_modification.kql + qlnx_ipapi_geo_beacon.kql + qlnx_x11_lock_path_drop.kql</text>
  <text x="60" y="1082" class="anchor-sub">yara/QLNX_Quasar_Linux_RAT_2026.yar — ELF + DJB2 + QLNX_MANAGED + O$$f$QtYJK + 1.4.1 + cred paths</text>
  <text x="60" y="1102" class="anchor-sub">suricata/qlnx_ipapi_recon.rules — DNS/HTTP/TLS ip-api.com from server-tier + QLNX beacon shape</text>
  <text x="60" y="1124" class="anchor-sub">Pedagogical: re-image not clean. Detect side-effects (gcc, ld.so.preload, cred burst), not file signatures.</text>
  <text x="60" y="1144" class="anchor-sub">QLNX_MANAGED is operator self-clean convenience and defender high-precision anchor.</text>

  <rect class="acc-supply-chain" x="0" y="0" width="880" height="8"/>
