<title id="t">RedHook Android RAT kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim phone: vishing/smishing delivery, sideloaded APK install from GitHub or AWS S3, Accessibility service grant, automated Wireless ADB activation, critical Shizuku privileged shell at uid 2000, a six-mechanism persistence stack, and command-and-control plus data theft. Right lane is the operator estate: distribution infrastructure, the REST command-and-control API, critical WebSocket plus RTMP screen streaming that bypasses MediaProjection consent, the 53-command control surface, dormant OEM-specific enablement code, and the family lineage back to the original 2025 report. Critical anchors in red are the Shizuku privileged shell and the consent-bypassing streaming channel.</desc>
