<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1080" role="img" aria-labelledby="t d">
  <title id="t">CloudZ + Pheno kill chain — Talos, May 2026</title>
  <desc id="d">Vertical timeline: fake ScreenConnect installer drops a Rust dropper that spawns a .NET loader via a scheduled task. The loader runs three anti-analysis checks (sleep skew, forensic-tool enumeration, _ENABLE_PROFILING) and then loads CloudZ in memory. CloudZ refreshes its config via Cloudflare Workers and Pastebin and beacons to backend IP 185.196.10.136. The Pheno plugin is downloaded on demand, scans for Phone Link processes (YourPhone.exe, PhoneExperienceHost.exe, Link to Windows), reads the SQLite cache PhoneExperiences-*.db under the Microsoft.YourPhone_8wekyb3d8bbwe UWP package, filters OTP-shaped messages and exfiltrates them over HTTPS. Net effect: silent SMS and OTP theft and 2FA bypass without compromising the paired phone.</desc>
