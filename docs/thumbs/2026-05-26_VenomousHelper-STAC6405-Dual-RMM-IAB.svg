      <path d="M0,0 L10,5 L0,10 Z" fill="#57606a"/>
    </marker>
    <marker id="mc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
