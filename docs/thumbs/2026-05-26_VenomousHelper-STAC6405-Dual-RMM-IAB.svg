<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d" font-family="sans-serif">
  <title id="t">VENOMOUS#HELPER / STAC6405 dual-RMM IAB kill chain</title>
  <desc id="d">Two-lane kill chain. Victim host lane (left) shows SSA-themed phishing email, JWrapper-packaged signed SimpleHelp installer execution, Windows service plus SafeBoot persistence (critical), three automated reconnaissance polling loops, ScreenConnect MSI silent install, and operator orientation burst once mouse is idle. Attacker infrastructure lane (right) shows two compromised legitimate .com.mx hosts at the top (gruta for email harvest, cubatiendaalimentos cPanel for payload staging), the SimpleHelp UDP 5555 primary C2 paired with the persistence stage, and the ScreenConnect TCP 8041 relay (critical) paired with the MSI drop. Detection anchors are summarised in the footer.</desc>

  <defs>
    <style>
