  <rect class="bg" width="880" height="1280"/>
  <rect class="acc-other" x="0" y="0" width="880" height="8"/>

  <!-- Header -->
  <text class="head" x="20" y="32">VENOMOUS#HELPER / STAC6405 — Dual-RMM IAB (JWrapper SimpleHelp + ScreenConnect)</text>
  <text class="meta" x="20" y="52">Securonix Threat Research (Gaikwad, Sangwan, Beardslee) · public 2026-05-04 · active since Apr 2025 · 80+ orgs (US-heavy) · Sophos STAC6405 + Red Canary overlap</text>

  <!-- Lanes -->
  <rect class="lane" x="20"  y="80" width="420" height="900" rx="6"/>
  <rect class="lane" x="460" y="80" width="400" height="900" rx="6"/>
  <text class="laneL" x="35"  y="100">VICTIM HOST · WINDOWS WORKSTATION</text>
  <text class="laneR" x="475" y="100">ATTACKER INFRASTRUCTURE · COMPROMISED LEGIT + DEDICATED VPS</text>

  <!-- ===== Stage 1 (L1): Phishing email ===== -->
  <rect class="stage" x="35" y="120" width="395" height="110" rx="6"/>
  <circle class="badge" cx="55" cy="142" r="13"/>
  <text class="badgeT" x="55" y="146">1</text>
  <text class="stageT" x="78" y="142">Phishing email · SSA impersonation</text>
  <text class="stageS" x="78" y="160">"A new statement is available — verify your email."</text>
  <text class="stageS" x="78" y="176">Link points to compromised legit .com.mx site.</text>
  <text class="mitre" x="78" y="195">T1566.001 · Spearphishing Link</text>
  <text class="ioc"   x="78" y="215">lure: statement5648.exe · ContractAgreementToSign.exe</text>

  <!-- ===== Stage R1: Compromised hosts ===== -->
  <rect class="stageR" x="475" y="120" width="375" height="110" rx="6"/>
  <circle class="badgeR" cx="495" cy="142" r="13"/>
  <text class="badgeT" x="495" y="146">A</text>
  <text class="stageT" x="518" y="142">Compromised legit .com.mx hosts</text>
  <text class="stageS" x="518" y="160">gruta.com.mx (since 2002) · email harvester</text>
  <text class="stageS" x="518" y="176">cubatiendaalimentos.com.mx · cPanel user payload</text>
  <text class="mitre"  x="518" y="195">T1584.001 · T1608.001</text>
  <text class="ioc"    x="518" y="215">~tiendazoycom/sns/statement5648.exe</text>

  <!-- Arrow R1 -> L1 (right to left) -->
  <path class="arrow" d="M 475,175 L 435,175" marker-end="url(#m)"/>

  <!-- ===== Stage 2 (L2): Signed payload exec ===== -->
  <rect class="stage" x="35" y="245" width="395" height="110" rx="6"/>
  <circle class="badge" cx="55" cy="267" r="13"/>
  <text class="badgeT" x="55" y="271">2</text>
  <text class="stageT" x="78" y="267">Signed JWrapper installer executes</text>
  <text class="stageS" x="78" y="285">UAC blue shield: SimpleHelp Ltd / Thawte (cert exp 2018)</text>
  <text class="stageS" x="78" y="301">SimpleHelp 5.0.1 + Oracle JRE 1.7.0_79 (EOL 2015)</text>
  <text class="mitre"  x="78" y="320">T1204.002 · T1036.001 · cracked build</text>
  <text class="ioc"    x="78" y="340">SHA256 customer.jar 810a99a7d6696a36...</text>

  <!-- Arrow L1 -> L2 -->
  <path class="arrow" d="M 232,230 L 232,245" marker-end="url(#m)"/>

  <!-- ===== Stage 3 (L3) CRITICAL: Service + SafeBoot ===== -->
  <rect class="stageK" x="35" y="370" width="395" height="110" rx="6"/>
  <circle class="badgeK" cx="55" cy="392" r="13"/>
  <text class="badgeT" x="55" y="396">3</text>
  <text class="stageT" x="78" y="392">Windows service + SafeBoot persistence</text>
  <text class="stageS" x="78" y="410">Service: Remote Access Service · self-healing watchdog</text>
  <text class="stageS" x="78" y="426">HKLM SafeBoot\Network key keeps RAT alive in Safe Mode</text>
  <text class="mitre"  x="78" y="445">T1543.003 · T1562.009 · T1219</text>
  <text class="ioc"    x="78" y="465">C:\ProgramData\JWrapper-Remote Access\</text>

  <!-- Arrow L2 -> L3 -->
  <path class="arrow" d="M 232,355 L 232,370" marker-end="url(#m)"/>

  <!-- ===== Stage R2: SimpleHelp UDP C2 (primary) ===== -->
  <rect class="stageR" x="475" y="370" width="375" height="110" rx="6"/>
  <circle class="badgeR" cx="495" cy="392" r="13"/>
  <text class="badgeT" x="495" y="396">B</text>
  <text class="stageT" x="518" y="392">SimpleHelp C2 · primary channel</text>
  <text class="stageS" x="518" y="410">UDP/5555 + HTTP/5555 access endpoint</text>
  <text class="stageS" x="518" y="426">sh_app_profile invariant across victims</text>
  <text class="mitre"  x="518" y="445">T1219 · T1071.001 · T1573</text>
  <text class="ioc"    x="518" y="465">udp://84.200.205.233:5555</text>

  <!-- Arrow L3 <-> R2 -->
  <path class="arrow" d="M 430,425 L 475,425" marker-start="url(#m)" marker-end="url(#m)"/>

  <!-- ===== Stage 4 (L4): Automated recon ===== -->
  <rect class="stage" x="35" y="495" width="395" height="110" rx="6"/>
  <circle class="badge" cx="55" cy="517" r="13"/>
  <text class="badgeT" x="55" y="521">4</text>
  <text class="stageT" x="78" y="517">Automated recon · 986 events/hour</text>
  <text class="stageS" x="78" y="535">netsh wlan show interfaces every 15 s · 233x/h</text>
  <text class="stageS" x="78" y="551">elev_win --mouselocation every 23 s · 157x/h</text>
  <text class="mitre"  x="78" y="570">T1518.001 · T1016 · T1036.003 · T1497.001</text>
  <text class="ioc"    x="78" y="590">wmic.exe.bak SecurityCenter2 batch every 67 s · 54x/h</text>

  <!-- Arrow L3 -> L4 -->
  <path class="arrow" d="M 232,480 L 232,495" marker-end="url(#m)"/>

  <!-- ===== Stage 5 (L5): ScreenConnect MSI silent install ===== -->
  <rect class="stage" x="35" y="620" width="395" height="110" rx="6"/>
  <circle class="badge" cx="55" cy="642" r="13"/>
  <text class="badgeT" x="55" y="646">5</text>
  <text class="stageT" x="78" y="642">ScreenConnect dropped silently</text>
  <text class="stageS" x="78" y="660">msiexec /i sc.msi /qn (parent: Remote Access.exe)</text>
  <text class="stageS" x="78" y="676">rundll32 SfxCA MSI4209.tmp ClientInstallerActions</text>
  <text class="mitre"  x="78" y="695">T1218.007 · T1219</text>
  <text class="ioc"    x="78" y="715">install GUID adbce2b92cb435b3 (invariant)</text>

  <!-- Arrow L4 -> L5 -->
  <path class="arrow" d="M 232,605 L 232,620" marker-end="url(#m)"/>

  <!-- ===== Stage R3 CRITICAL: ScreenConnect relay (fallback) ===== -->
  <rect class="stageK" x="475" y="620" width="375" height="110" rx="6"/>
  <circle class="badgeK" cx="495" cy="642" r="13"/>
  <text class="badgeT" x="495" y="646">C</text>
  <text class="stageT" x="518" y="642">ScreenConnect relay · fallback channel</text>
  <text class="stageS" x="518" y="660">TCP/8041 · sslzeromail.run.place</text>
  <text class="stageS" x="518" y="676">213.136.71.246 · IONOS DE AS8560</text>
  <text class="mitre"  x="518" y="695">T1219 · T1573.002</text>
  <text class="ioc"    x="518" y="715">session GUID 1063c106-fb78-4a61-...</text>

  <!-- Arrow L5 <-> R3 -->
  <path class="arrow" d="M 430,675 L 475,675" marker-start="url(#m)" marker-end="url(#m)"/>

  <!-- ===== Stage 6 (L6): Operator orientation burst ===== -->
  <rect class="stage" x="35" y="745" width="395" height="130" rx="6"/>
  <circle class="badge" cx="55" cy="767" r="13"/>
  <text class="badgeT" x="55" y="771">6</text>
  <text class="stageT" x="78" y="767">Operator orientation burst (mouse-idle)</text>
  <text class="stageS" x="78" y="785">When mouse-presence poll reports idle for long enough,</text>
  <text class="stageS" x="78" y="801">operator engages: whoami, ipconfig, net user, systeminfo.</text>
  <text class="mitre"  x="78" y="820">T1033 · T1016 · T1087.001 · T1082</text>
  <text class="ioc"    x="78" y="840">passive-surveillance posture · IAB hand-off ready</text>
  <text class="stageS" x="78" y="860">No credential dumping observed in this window.</text>

  <!-- Arrow L5 -> L6 -->
  <path class="arrow" d="M 232,730 L 232,745" marker-end="url(#m)"/>

  <!-- ===== Footer: Detection anchors ===== -->
  <rect class="anchor" x="20" y="1000" width="840" height="265" rx="6"/>
  <text class="anchorT" x="35" y="1023">Detection anchors in this folder</text>
  <text class="anchorL" x="35" y="1044">Sigma 01 wmic_rename_bak.yml</text>
  <text class="anchorM" x="290" y="1044">wmic.exe.bak rename masquerade · highest-confidence host anchor</text>
  <text class="anchorL" x="35" y="1064">Sigma 02 remote_access_safeboot_key.yml</text>
  <text class="anchorM" x="290" y="1064">SafeBoot\Network subkey with RMM-themed service name</text>
  <text class="anchorL" x="35" y="1084">Sigma 03 jwrapper_simplehelp_installer.yml</text>
  <text class="anchorM" x="290" y="1084">JWrapper tree process creation + elev_win --mouselocation</text>
  <text class="anchorL" x="35" y="1104">KQL 01 defender_wmic_bak_masquerade.kql</text>
  <text class="anchorM" x="290" y="1104">DeviceFileEvents + DeviceProcessEvents anchor on wmic.exe.bak</text>
  <text class="anchorL" x="35" y="1124">KQL 02 defender_simplehelp_udp_5555.kql</text>
  <text class="anchorM" x="290" y="1124">DeviceNetworkEvents outbound UDP/5555 to 84.200.205.233</text>
  <text class="anchorL" x="35" y="1144">KQL 03 defender_screenconnect_msi_silent.kql</text>
  <text class="anchorM" x="290" y="1144">msiexec /qn parented by Remote Access.exe + GUID anchor</text>
  <text class="anchorL" x="35" y="1164">YARA venomous_helper.yar</text>
  <text class="anchorM" x="290" y="1164">customer.jar + sgalive + sh_app_profile + ScreenConnect GUID</text>
  <text class="anchorL" x="35" y="1184">Suricata venomous_helper.rules (4 sids)</text>
  <text class="anchorM" x="290" y="1184">UDP/5555 + TCP/8041 + DNS for sslzeromail.run.place + HTTP staging</text>
  <text class="anchorL" x="35" y="1204">PEAK H1 wmic_bak_masquerade.md</text>
  <text class="anchorM" x="290" y="1204">Renamed-LOLBin fleet hunt with parent-chain pivot</text>
  <text class="anchorL" x="35" y="1224">PEAK H2 polling_cadence.md</text>
  <text class="anchorM" x="290" y="1224">15 s / 23 s / 67 s deterministic cadences from one parent tree</text>
  <text class="anchorL" x="35" y="1244">PEAK H3 safeboot_rmm_persistence.md</text>
  <text class="anchorM" x="290" y="1244">SafeBoot\Network subkey with RMM tokens · cross-host sweep</text>
