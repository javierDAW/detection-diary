<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1080" role="img" aria-labelledby="t d">
  <title id="t">VECT 2.0 RaaS kill chain — Check Point Research, 28 April 2026</title>
  <desc id="d">Vertical timeline of the VECT 2.0 multi-platform locker. A supply-chain CI/CD compromise from TeamPCP or a valid AD account drops svchostupdate.exe on Windows or encesxi.elf on Linux/ESXi. The loader checks the .vect killswitch marker, plants bcdedit safeboot minimal plus a SafeBoot\Minimal\&lt;svc&gt; service, XOR-clears EVTX channels with key 0xBB55FF59DF597B8D, mass-terminates DB/office/mail/browser processes, then encrypts files in 32 KB chunks with raw ChaCha20-IETF — the four nonces per file share a single 12-byte buffer so only the last persists, destroying the first 3 chunks of every file above 128 KB. SSH lateral movement reaches ESXi, where encesxi.elf geofences out CIS states and encrypts VMDKs. The C2 lane on the right shows the BreachForums escrow plus TeamPCP affiliate panel.</desc>
