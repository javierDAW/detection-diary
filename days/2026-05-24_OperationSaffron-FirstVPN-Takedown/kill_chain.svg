<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d" font-family="sans-serif">
  <title id="t">Operation Saffron — First VPN Service takedown by Europol, France, Netherlands and FBI on 19-20 May 2026</title>
  <desc id="d">Three-lane diagram. Left lane: ransomware affiliate (subscription, exit-node selection, scanning, brute force, valid-account auth, ransom negotiation, exfiltration). Middle lane: First VPN infrastructure (1vpns.com web, 1jabber.com Jabber, Telegram @FVPNS, 32 exit nodes across 27 countries). Right lane: victim corporate network (perimeter, identity provider, RDP/SSH, tier-0). Bottom panel: law-enforcement takedown (33 servers, four domains, 506 users in 83 intelligence packages). Detection-anchor footer maps Sigma, KQL, YARA, Suricata, and PEAK hunts to the IOC anchors.</desc>

  <defs>
    <style>
      .bg     { fill: #ffffff; }
      .lane   { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
      .lane-l { fill: #fff8f0; stroke: #fb8500; stroke-width: 1; }
      .lane-m { fill: #f0f4ff; stroke: #0969da; stroke-width: 1; }
      .lane-r { fill: #eaf6ec; stroke: #1a7f37; stroke-width: 1; }
      .lane-le{ fill: #fdf6f0; stroke: #6e4500; stroke-width: 1; }
      .lane-d { fill: #f7eef8; stroke: #6f42c1; stroke-width: 1; }
      .stage  { fill: #ffffff; stroke: #1f2328; stroke-width: 1.4; }
      .stage-critical { fill: #ffe4e0; stroke: #cf222e; stroke-width: 1.6; }
      .badge  { fill: #0969da; }
      .badge-text { fill: #ffffff; font-weight: 700; font-size: 12px; text-anchor: middle; }
      .title  { fill: #1f2328; font-weight: 700; font-size: 18px; }
      .subtitle { fill: #57606a; font-size: 12px; }
      .lane-label { fill: #1f2328; font-weight: 700; font-size: 13px; text-anchor: middle; }
      .stage-label { fill: #1f2328; font-weight: 700; font-size: 12px; }
      .stage-sub { fill: #57606a; font-size: 10.5px; }
      .mitre  { fill: #1f6feb; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 10px; }
      .ioc    { fill: #6e4500; font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 10px; }
      .arrow  { stroke: #57606a; stroke-width: 1.4; fill: none; }
      .arrow-bidir { stroke: #fb8500; stroke-width: 1.6; fill: none; }
      .arrow-le    { stroke: #6f42c1; stroke-width: 1.6; fill: none; }
      .footer-box  { fill: #f6f8fa; stroke: #1f2328; stroke-width: 1.2; }
      .footer-title { fill: #1f2328; font-weight: 700; font-size: 12px; }
      .footer-line  { fill: #1f2328; font-size: 10.5px; }
      @media (prefers-color-scheme: dark) {
        .bg       { fill: #0d1117; }
        .lane     { fill: #161b22; stroke: #30363d; }
        .lane-l   { fill: #2a1d10; stroke: #fb8500; }
        .lane-m   { fill: #0f1a2b; stroke: #2f81f7; }
        .lane-r   { fill: #102818; stroke: #2da44e; }
        .lane-le  { fill: #2a200f; stroke: #d29922; }
        .lane-d   { fill: #1d1626; stroke: #a371f7; }
        .stage    { fill: #161b22; stroke: #d0d7de; }
        .stage-critical { fill: #4a1316; stroke: #ff7b72; }
        .badge    { fill: #2f81f7; }
        .title    { fill: #f0f6fc; }
        .subtitle { fill: #8b949e; }
        .lane-label { fill: #f0f6fc; }
        .stage-label { fill: #f0f6fc; }
        .stage-sub { fill: #8b949e; }
        .mitre    { fill: #79c0ff; }
        .ioc      { fill: #d29922; }
        .arrow    { stroke: #8b949e; }
        .arrow-bidir { stroke: #fb8500; }
        .arrow-le    { stroke: #a371f7; }
        .footer-box  { fill: #161b22; stroke: #d0d7de; }
        .footer-title { fill: #f0f6fc; }
        .footer-line  { fill: #c9d1d9; }
      }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
    <marker id="ahbi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fb8500"/>
    </marker>
    <marker id="ahle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6f42c1"/>
    </marker>
  </defs>

  <rect class="bg" width="880" height="1180"/>

  <!-- Header -->
  <text class="title" x="20" y="32">Operation Saffron — First VPN Service takedown</text>
  <text class="subtitle" x="20" y="52">Europol + Eurojust JIT (France BL2C + Netherlands NHTC) + FBI · action 19-20 May 2026 · announced 21 May 2026 · FBI FLASH-20260521-001</text>

  <!-- Lane backgrounds -->
  <rect class="lane-l"  x="20"  y="70" width="270" height="900" rx="8"/>
  <rect class="lane-m"  x="305" y="70" width="270" height="900" rx="8"/>
  <rect class="lane-r"  x="590" y="70" width="270" height="900" rx="8"/>

  <!-- Lane labels -->
  <text class="lane-label" x="155" y="92">RANSOMWARE AFFILIATE</text>
  <text class="lane-label" x="440" y="92">FIRST VPN INFRASTRUCTURE</text>
  <text class="lane-label" x="725" y="92">VICTIM CORPORATE NETWORK</text>

  <!-- Affiliate stage 1: subscription -->
  <rect class="stage" x="40" y="110" width="230" height="78" rx="6"/>
  <circle class="badge" cx="58" cy="128" r="12"/>
  <text class="badge-text" x="58" y="132">1</text>
  <text class="stage-label" x="78" y="132">Subscribe on Exploit/XSS forum</text>
  <text class="stage-sub" x="44" y="150">$2/day to $483/year, paid in BTC,</text>
  <text class="stage-sub" x="44" y="164">Perfect Money, Webmoney, EgoPay</text>
  <text class="mitre" x="44" y="180">T1583.003</text>

  <!-- Affiliate stage 2: pick exit -->
  <rect class="stage" x="40" y="198" width="230" height="74" rx="6"/>
  <circle class="badge" cx="58" cy="216" r="12"/>
  <text class="badge-text" x="58" y="220">2</text>
  <text class="stage-label" x="78" y="220">Pick exit node by victim country</text>
  <text class="stage-sub" x="44" y="238">Multi-hop up to 4 nodes available</text>
  <text class="ioc" x="44" y="262">protocol: VLess+Reality (TCP)</text>

  <!-- Affiliate stage 3: scan -->
  <rect class="stage" x="40" y="282" width="230" height="78" rx="6"/>
  <circle class="badge" cx="58" cy="300" r="12"/>
  <text class="badge-text" x="58" y="304">3</text>
  <text class="stage-label" x="78" y="304">Recon + scan from exit node</text>
  <text class="stage-sub" x="44" y="322">Port + service discovery against</text>
  <text class="stage-sub" x="44" y="336">victim public surface</text>
  <text class="mitre" x="44" y="352">T1595 · T1046 · T1018</text>

  <!-- Affiliate stage 4: brute force -->
  <rect class="stage stage-critical" x="40" y="370" width="230" height="80" rx="6"/>
  <circle class="badge" cx="58" cy="388" r="12"/>
  <text class="badge-text" x="58" y="392">4</text>
  <text class="stage-label" x="78" y="392">Brute force / password spray</text>
  <text class="stage-sub" x="44" y="410">SSH, RDP, OWA, Okta SSO,</text>
  <text class="stage-sub" x="44" y="424">corporate VPN portal</text>
  <text class="mitre" x="44" y="442">T1110 · T1110.003</text>

  <!-- Affiliate stage 5: auth -->
  <rect class="stage stage-critical" x="40" y="460" width="230" height="80" rx="6"/>
  <circle class="badge" cx="58" cy="478" r="12"/>
  <text class="badge-text" x="58" y="482">5</text>
  <text class="stage-label" x="78" y="482">Authenticate with valid account</text>
  <text class="stage-sub" x="44" y="500">Credentials from IAB; geo at IdP</text>
  <text class="stage-sub" x="44" y="514">= exit-node country, not real</text>
  <text class="mitre" x="44" y="532">T1133 · T1078 · T1078.002</text>

  <!-- Affiliate stage 6: ransom -->
  <rect class="stage" x="40" y="550" width="230" height="78" rx="6"/>
  <circle class="badge" cx="58" cy="568" r="12"/>
  <text class="badge-text" x="58" y="572">6</text>
  <text class="stage-label" x="78" y="572">Negotiate / route C2 + exfil</text>
  <text class="stage-sub" x="44" y="590">Ransom chat + exfil through</text>
  <text class="stage-sub" x="44" y="604">same exit set; Akira/Phobos/Avaddon</text>
  <text class="mitre" x="44" y="620">T1090.003 · T1567 · T1572</text>

  <!-- Affiliate stage 7: DDoS / botnet -->
  <rect class="stage" x="40" y="638" width="230" height="62" rx="6"/>
  <circle class="badge" cx="58" cy="656" r="12"/>
  <text class="badge-text" x="58" y="660">7</text>
  <text class="stage-label" x="78" y="660">DDoS / botnet relay (side use)</text>
  <text class="mitre" x="44" y="680">T1498</text>

  <!-- Middle lane: First VPN infrastructure -->
  <rect class="stage" x="325" y="110" width="230" height="60" rx="6"/>
  <text class="stage-label" x="335" y="132">Web: 1vpns[.]com / .net / .org</text>
  <text class="ioc" x="335" y="148">seized 20-May-2026</text>
  <text class="ioc" x="335" y="162">+ .onion mirror</text>

  <rect class="stage" x="325" y="180" width="230" height="58" rx="6"/>
  <text class="stage-label" x="335" y="202">Admin / billing back-end</text>
  <text class="ioc" x="335" y="218">5000+ accounts (user DB seized)</text>
  <text class="ioc" x="335" y="232">+ 506 users in 83 intel packages</text>

  <rect class="stage" x="325" y="248" width="230" height="68" rx="6"/>
  <text class="stage-label" x="335" y="270">Customer support channels</text>
  <text class="ioc" x="335" y="286">1jabber[.]com / @FVPNS</text>
  <text class="ioc" x="335" y="300">support@1vpns[.]com · ICQ 82822222</text>

  <rect class="stage" x="325" y="328" width="230" height="160" rx="6"/>
  <text class="stage-label" x="335" y="350">32 exit nodes / 27 countries</text>
  <text class="ioc" x="335" y="368">US: 92.223.66.103</text>
  <text class="ioc" x="335" y="382">US: 5.181.234.59</text>
  <text class="ioc" x="335" y="396">US: 92.38.148.58</text>
  <text class="ioc" x="335" y="412">EU: 92.38.180.39, 195.206.107.203</text>
  <text class="ioc" x="335" y="426">EU: 37.120.143.203, 86.105.25.219</text>
  <text class="ioc" x="335" y="440">EU: 178.175.139.203, 51.79.208.134</text>
  <text class="stage-sub" x="335" y="460">+ ~30 current + ~65 historical IPs</text>
  <text class="stage-sub" x="335" y="476">on OVH / M247 / Cloudbridge / etc</text>

  <rect class="stage" x="325" y="500" width="230" height="84" rx="6"/>
  <text class="stage-label" x="335" y="522">Protocols offered</text>
  <text class="ioc" x="335" y="540">OpenConnect · WireGuard · Outline</text>
  <text class="ioc" x="335" y="554">VLess+Reality (HTTPS-mimicking)</text>
  <text class="ioc" x="335" y="568">OpenVPN ECC · L2TP/IPSec · PPtP</text>

  <!-- Right lane: victim corporate network -->
  <rect class="stage" x="610" y="110" width="230" height="76" rx="6"/>
  <text class="stage-label" x="620" y="132">Corporate VPN gateway</text>
  <text class="stage-sub" x="620" y="150">Fortinet / Palo Alto GP / Cisco AC</text>
  <text class="stage-sub" x="620" y="164">/ Pulse / NetScaler</text>
  <text class="ioc" x="620" y="180">log: sourceIP in FBI list</text>

  <rect class="stage" x="610" y="196" width="230" height="76" rx="6"/>
  <text class="stage-label" x="620" y="218">Identity provider (IdP)</text>
  <text class="stage-sub" x="620" y="236">Entra ID SigninLogs · Okta SystemLog</text>
  <text class="stage-sub" x="620" y="250">Duo Auth API</text>
  <text class="ioc" x="620" y="266">geo = exit-node country (misleading)</text>

  <rect class="stage" x="610" y="282" width="230" height="74" rx="6"/>
  <text class="stage-label" x="620" y="304">Public-facing services</text>
  <text class="stage-sub" x="620" y="322">SSH bastion · RDP gateway · OWA</text>
  <text class="stage-sub" x="620" y="336">M365 endpoints</text>
  <text class="ioc" x="620" y="352">brute force burst from exit IP</text>

  <rect class="stage stage-critical" x="610" y="366" width="230" height="80" rx="6"/>
  <text class="stage-label" x="620" y="388">Tier-0 lateral pivot</text>
  <text class="stage-sub" x="620" y="406">DA / DCs / EDR console / privileged</text>
  <text class="stage-sub" x="620" y="420">M365 admin · cloud control plane</text>
  <text class="ioc" x="620" y="438">post-auth pivot via valid account</text>

  <rect class="stage stage-critical" x="610" y="456" width="230" height="78" rx="6"/>
  <text class="stage-label" x="620" y="478">Pre-encryption staging + exfil</text>
  <text class="stage-sub" x="620" y="496">Rclone / Mega / Wasabi pull</text>
  <text class="stage-sub" x="620" y="510">ransom negotiation chat traffic</text>
  <text class="ioc" x="620" y="528">outbound to exit IP set</text>

  <rect class="stage stage-critical" x="610" y="544" width="230" height="70" rx="6"/>
  <text class="stage-label" x="620" y="566">Encryption (downstream)</text>
  <text class="stage-sub" x="620" y="584">Akira / Phobos / Avaddon / etc</text>
  <text class="ioc" x="620" y="602">cluster of 25+ RaaS named by FBI</text>

  <!-- Arrows -->
  <!-- affiliate -> infrastructure (subscription + select node) -->
  <path class="arrow" d="M270,150 C295,150 305,140 325,140" marker-end="url(#ah)"/>
  <path class="arrow" d="M270,232 C295,232 305,250 325,278" marker-end="url(#ah)"/>

  <!-- affiliate scan -> victim public surface (via infra exit node) -->
  <path class="arrow" d="M270,318 C295,318 555,318 600,318" marker-end="url(#ah)"/>
  <!-- affiliate brute force -> victim public services -->
  <path class="arrow" d="M270,408 C295,408 555,408 600,408" marker-end="url(#ah)"/>
  <!-- affiliate auth -> victim IdP (success) -->
  <path class="arrow" d="M270,496 C295,496 555,236 600,232" marker-end="url(#ah)"/>
  <!-- affiliate auth -> tier-0 -->
  <path class="arrow" d="M270,510 C295,510 555,400 600,400" marker-end="url(#ah)"/>
  <!-- affiliate ransom traffic -> exfil staging (bidirectional) -->
  <path class="arrow-bidir" d="M270,592 C295,592 555,490 600,490" marker-end="url(#ahbi)" marker-start="url(#ahbi)"/>
  <!-- affiliate DDoS -> victim -->
  <path class="arrow" d="M270,668 C295,668 555,578 600,578" marker-end="url(#ah)"/>

  <!-- Infrastructure web -> exit nodes (internal infra) -->
  <path class="arrow" d="M440,170 L440,328" marker-end="url(#ah)"/>
  <path class="arrow" d="M440,238 L440,328" marker-end="url(#ah)"/>
  <path class="arrow" d="M440,316 L440,328" marker-end="url(#ah)"/>

  <!-- Law-enforcement takedown lane (bottom) -->
  <rect class="lane-le" x="20" y="720" width="840" height="200" rx="8"/>
  <text class="lane-label" x="440" y="744">LAW-ENFORCEMENT TAKEDOWN — 19-20 May 2026</text>

  <rect class="stage" x="40" y="758" width="260" height="146" rx="6"/>
  <circle class="badge" cx="58" cy="776" r="12"/>
  <text class="badge-text" x="58" y="780">L1</text>
  <text class="stage-label" x="78" y="780">Seizure</text>
  <text class="stage-sub" x="44" y="800">33 servers across 27 countries</text>
  <text class="stage-sub" x="44" y="816">domains 1vpns[.]com/.net/.org +</text>
  <text class="stage-sub" x="44" y="830">1jabber[.]com + .onion mirrors</text>
  <text class="stage-sub" x="44" y="846">user database extracted</text>
  <text class="ioc" x="44" y="868">FBI FLASH-20260521-001</text>
  <text class="ioc" x="44" y="884">Europol + Eurojust + BL2C + NHTC</text>

  <rect class="stage" x="310" y="758" width="260" height="146" rx="6"/>
  <circle class="badge" cx="328" cy="776" r="12"/>
  <text class="badge-text" x="328" y="780">L2</text>
  <text class="stage-label" x="348" y="780">Admin interview</text>
  <text class="stage-sub" x="314" y="800">Ukrainian operator interviewed</text>
  <text class="stage-sub" x="314" y="816">in-country (no extradition)</text>
  <text class="stage-sub" x="314" y="832">customer-DB partitioned across</text>
  <text class="stage-sub" x="314" y="846">83 intelligence packages</text>
  <text class="ioc" x="314" y="868">506 specific users identified</text>
  <text class="ioc" x="314" y="884">21 EC3 cases advanced</text>

  <rect class="stage" x="580" y="758" width="260" height="146" rx="6"/>
  <circle class="badge" cx="598" cy="776" r="12"/>
  <text class="badge-text" x="598" y="780">L3</text>
  <text class="stage-label" x="618" y="780">Customer notification</text>
  <text class="stage-sub" x="584" y="800">"All users of this service have</text>
  <text class="stage-sub" x="584" y="816">received a message stating the</text>
  <text class="stage-sub" x="584" y="832">VPN service has been taken</text>
  <text class="stage-sub" x="584" y="846">offline and they have been</text>
  <text class="stage-sub" x="584" y="862">identified as the user."</text>
  <text class="ioc" x="584" y="884">— Dutch Police, 21-May-2026</text>

  <path class="arrow-le" d="M120,720 L120,710 L120,704 L120,700" />
  <path class="arrow-le" d="M440,720 L440,710 L440,704 L440,700" />

  <!-- Detection anchors footer -->
  <rect class="footer-box" x="20" y="940" width="840" height="220" rx="8"/>
  <text class="footer-title" x="32" y="962">Detection anchors</text>
  <text class="footer-line" x="32" y="982">Sigma · firstvpn_corp_vpn_auth_from_known_node.yml — successful VPN auth where source IP is in the FBI list (highest-fidelity retro hit).</text>
  <text class="footer-line" x="32" y="1000">Sigma · firstvpn_outbound_dns_corp_endpoint.yml — DNS query from corp endpoint to 1vpns.* or 1jabber.com (insider / contractor anchor).</text>
  <text class="footer-line" x="32" y="1018">Sigma · firstvpn_brute_force_burst_known_node.yml — &gt;20 failed RDP/SSH/web auths from a single First VPN IP in 1h (affiliate spray).</text>
  <text class="footer-line" x="32" y="1036">KQL · firstvpn_signin_from_known_node.kql — Entra ID successful sign-in from FBI IP list (user, app, country, CA result).</text>
  <text class="footer-line" x="32" y="1054">KQL · firstvpn_failed_then_success_burst.kql — same UPN, ≥5 failures then a success from a First VPN IP within 24h.</text>
  <text class="footer-line" x="32" y="1072">KQL · firstvpn_corp_endpoint_outbound.kql — DeviceNetworkEvents outbound from managed endpoint to First VPN IP (insider exfil anchor).</text>
  <text class="footer-line" x="32" y="1090">YARA · firstvpn_client_config_artifacts.yar — First VPN client config / OpenVPN profile artifacts on disk (forensic anchor).</text>
  <text class="footer-line" x="32" y="1108">Suricata · firstvpn_dns_tls_egress.rules — DNS, TLS SNI, HTTP host, IP egress to First VPN infrastructure (8 sids).</text>
  <text class="footer-line" x="32" y="1126">PEAK hunts · H1 24-month retro corp auth from First VPN · H2 insider outbound to First VPN · H3 brute-force burst then success.</text>
  <text class="footer-line" x="32" y="1148">CTI tradecraft anchor: communication-channel artifacts (Jabber, Telegram, ICQ) survive infrastructure rotation — these are the most durable cluster pivots.</text>

</svg>
