<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d">
  <title id="t">Qilin EDR Killer kill chain — Cisco Talos, April 2026</title>
  <desc id="d">Qilin (alias Agenda) and Warlock ransomware operators side-load a malicious msimg32.dll under FoxitPDFReader.exe to start a four-stage in-memory loader that uses Halo's Gate-style SEH and VEH syscall obfuscation, IAT-hooks ExitProcess to detonate after the host process exits, then drops a BYOVD pair: rwdrv.sys (renamed ThrottleStop.sys signed by TechPowerUp LLC) and hlpdrv.sys (purpose-built malicious helper) to unregister kernel callbacks via direct physical-memory writes and terminate over 300 EDR drivers via IOCTL 0x2222008.</desc>
  <defs>
    <style>
      .bg-stage     { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 1; }
      .bg-c2        { fill: #fff8c5; stroke: #d4a72c; stroke-width: 1; }
      .bg-det       { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1; }
      .stagebg      { fill: #0969da; }
      .stagenum     { fill: #ffffff; font: 700 11px sans-serif; }
      .label        { fill: #1f2328; font: 600 13px sans-serif; }
      .sub          { fill: #424a53; font: 12px sans-serif; }
      .ioc          { fill: #57606a; font: 10.5px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .mitre        { fill: #0969da; font: 600 11px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .header       { fill: #1f2328; font: 700 18px sans-serif; }
      .subhead      { fill: #57606a; font: 12px sans-serif; }
      .lane         { fill: #57606a; font: 11px sans-serif; }
      .arrow        { stroke: #57606a; stroke-width: 1.6; fill: none; }
      .arrow-fill   { fill: #57606a; }
      .det-title    { fill: #0550ae; font: 700 13px sans-serif; }
      .det-sub      { fill: #1f2328; font: 11px sans-serif; }
      .det-mono     { fill: #1f2328; font: 10.5px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      @media (prefers-color-scheme: dark) {
        .bg-stage   { fill: #161b22; stroke: #30363d; }
        .bg-c2      { fill: #2d2206; stroke: #9e6a03; }
        .bg-det     { fill: #051d2c; stroke: #265d97; }
        .stagebg    { fill: #58a6ff; }
        .stagenum   { fill: #0d1117; }
        .label      { fill: #c9d1d9; }
        .sub        { fill: #8b949e; }
        .ioc        { fill: #8b949e; }
        .mitre      { fill: #58a6ff; }
        .header     { fill: #c9d1d9; }
        .subhead    { fill: #8b949e; }
        .lane       { fill: #8b949e; }
        .arrow      { stroke: #8b949e; }
        .arrow-fill { fill: #8b949e; }
        .det-title  { fill: #79c0ff; }
        .det-sub    { fill: #c9d1d9; }
        .det-mono   { fill: #c9d1d9; }
      }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="32" class="header">Qilin EDR Killer — msimg32.dll four-stage loader + BYOVD chain</text>
  <text x="40" y="52" class="subhead">Cisco Talos, 2-April-2026 — disables 300+ EDR drivers via rwdrv.sys + hlpdrv.sys (IOCTL 0x2222008)</text>

  <!-- Lane labels -->
  <text x="20" y="92" class="lane" transform="rotate(-90 20 92)">VICTIM HOST</text>
  <text x="860" y="92" class="lane" transform="rotate(-90 860 92)">ATTACKER C2 / RANSOMWARE</text>

  <!-- ============== STAGES (left lane) ============== -->

  <!-- Stage 1 -->
  <rect x="60" y="80" width="540" height="90" rx="6" class="bg-stage"/>
  <circle cx="84" cy="105" r="14" class="stagebg"/>
  <text x="80" y="109" class="stagenum">1</text>
  <text x="110" y="105" class="label">Initial Access — Foxit + msimg32.dll bundle delivered</text>
  <text x="110" y="124" class="sub">VPN/edge unpatched, valid accounts from IABs, or spear-phish dropping signed Foxit + malicious DLL pair</text>
  <text x="110" y="142" class="mitre">T1190 · T1078 · T1218</text>
  <text x="110" y="162" class="ioc">FoxitPDFReader.exe (signed) + co-located msimg32.dll → search-order hijack</text>

  <!-- Stage 2 -->
  <rect x="60" y="190" width="540" height="90" rx="6" class="bg-stage"/>
  <circle cx="84" cy="215" r="14" class="stagebg"/>
  <text x="80" y="219" class="stagenum">2</text>
  <text x="110" y="215" class="label">Execution — DLL side-load via FoxitPDFReader.exe</text>
  <text x="110" y="234" class="sub">DllMain runs; legitimate exports forwarded to System32 to keep Foxit healthy</text>
  <text x="110" y="252" class="mitre">T1574.002 · T1106</text>
  <text x="110" y="272" class="ioc">msimg32.dll  sha256: 7787da25...8b888497</text>

  <!-- Stage 3 -->
  <rect x="60" y="300" width="540" height="100" rx="6" class="bg-stage"/>
  <circle cx="84" cy="325" r="14" class="stagebg"/>
  <text x="80" y="329" class="stagenum">3</text>
  <text x="110" y="325" class="label">Defense Evasion (Stage 1) — Halo's Gate via SEH</text>
  <text x="110" y="344" class="sub">Slot-policy table over ntdll Nt* exports; hook .mrdata exception dispatcher; reuse clean syscall stubs</text>
  <text x="110" y="362" class="sub">Geofence excludes post-Soviet locales; anti-debug breakpoint check on KiUserExceptionDispatcher</text>
  <text x="110" y="380" class="mitre">T1027.007 · T1027.012 · T1480 · T1497.001</text>

  <!-- Stage 4 -->
  <rect x="60" y="420" width="540" height="100" rx="6" class="bg-stage"/>
  <circle cx="84" cy="445" r="14" class="stagebg"/>
  <text x="80" y="449" class="stagenum">4</text>
  <text x="110" y="445" class="label">Defense Evasion (Stage 2) — paging-file section + IAT hook ExitProcess</text>
  <text x="110" y="464" class="sub">Two views of one section: RW for write, RWX for execute; obscures effective permissions</text>
  <text x="110" y="482" class="sub">ExitProcess IAT entry redirected to Stage 3; DllMain returns clean</text>
  <text x="110" y="500" class="mitre">T1620 · T1055.002</text>

  <!-- Stage 5 -->
  <rect x="60" y="540" width="540" height="110" rx="6" class="bg-stage"/>
  <circle cx="84" cy="565" r="14" class="stagebg"/>
  <text x="80" y="569" class="stagenum">5</text>
  <text x="110" y="565" class="label">Defense Evasion (Stage 3) — VEH + HW breakpoint stack-pivot</text>
  <text x="110" y="584" class="sub">LdrLoadDll("hasherezade_*.dll") → HW BP fires NtOpenSection → VEH renames to shell32.dll, RIP→ret, RSP→LdrpMinimalMapModule offset</text>
  <text x="110" y="602" class="sub">Same trick on NtMapViewOfSection; embedded PE mapped on top of shell32.dll in memory</text>
  <text x="110" y="620" class="mitre">T1620 · T1055.001</text>
  <text x="110" y="640" class="ioc">Provocation string: "hasherezade"</text>

  <!-- Stage 6 -->
  <rect x="60" y="670" width="540" height="100" rx="6" class="bg-stage"/>
  <circle cx="84" cy="695" r="14" class="stagebg"/>
  <text x="80" y="699" class="stagenum">6</text>
  <text x="110" y="695" class="label">Privilege Escalation — drop and load rwdrv.sys (BYOVD #1)</text>
  <text x="110" y="714" class="sub">rwdrv.sys = renamed ThrottleStop.sys (TechPowerUp LLC sig); exposes phys mem read/write IOCTLs</text>
  <text x="110" y="732" class="sub">Service registered under HKLM\SYSTEM\CurrentControlSet\Services\rwdrv (Type=1 kernel)</text>
  <text x="110" y="750" class="mitre">T1068 · T1543.003</text>
  <text x="110" y="769" class="ioc">rwdrv.sys  sha256: 16f83f05...99c97f0</text>

  <!-- Stage 7 -->
  <rect x="60" y="790" width="540" height="100" rx="6" class="bg-stage"/>
  <circle cx="84" cy="815" r="14" class="stagebg"/>
  <text x="80" y="819" class="stagenum">7</text>
  <text x="110" y="815" class="label">Defense Evasion — unregister 300+ EDR kernel callbacks</text>
  <text x="110" y="834" class="sub">Resolve cng!CngCreateProcessNotifyRoutine and peers via NtQuerySystemInformation Superfetch + PFN vector</text>
  <text x="110" y="852" class="sub">Direct phys-mem write zeros the callback slots; CiValidateImageHeader redirected to ArbPreprocessEntry (returns TRUE)</text>
  <text x="110" y="870" class="mitre">T1014 · T1562.001</text>

  <!-- Stage 8 -->
  <rect x="60" y="910" width="540" height="100" rx="6" class="bg-stage"/>
  <circle cx="84" cy="935" r="14" class="stagebg"/>
  <text x="80" y="939" class="stagenum">8</text>
  <text x="110" y="935" class="label">Defense Evasion — drop and load hlpdrv.sys (BYOVD #2)</text>
  <text x="110" y="954" class="sub">hlpdrv.sys = purpose-built malicious driver, no legitimate use; IOCTL 0x2222008 = unprotect + terminate process</text>
  <text x="110" y="972" class="sub">Defender / EDR processes terminated; telemetry to SIEM goes silent</text>
  <text x="110" y="990" class="mitre">T1562.001 · T1068</text>
  <text x="110" y="1010" class="ioc">hlpdrv.sys  sha256: bd1f381e...c84a56</text>

  <!-- ============== ATTACKER C2 LANE (right) ============== -->

  <rect x="640" y="80" width="200" height="220" rx="6" class="bg-c2"/>
  <text x="650" y="100" class="label">Operator playbook</text>
  <text x="650" y="120" class="sub">Qilin / Agenda RaaS</text>
  <text x="650" y="138" class="sub">Russian-speaking</text>
  <text x="650" y="158" class="sub">also Warlock (shared loader)</text>
  <text x="650" y="184" class="label">Recent victims</text>
  <text x="650" y="202" class="sub">Cushman &amp; Wakefield</text>
  <text x="650" y="218" class="sub">Imex International</text>
  <text x="650" y="234" class="sub">DL Cohen Construction</text>
  <text x="650" y="260" class="label">Q1 2026</text>
  <text x="650" y="278" class="sub">338 victims · #1 RaaS</text>
  <text x="650" y="294" class="sub">3 quarters consecutive</text>

  <!-- C2 cluster panel -->
  <rect x="640" y="320" width="200" height="200" rx="6" class="bg-c2"/>
  <text x="650" y="340" class="label">Driver IOC anchors</text>
  <text x="650" y="362" class="ioc">rwdrv.sys</text>
  <text x="650" y="378" class="ioc">  16f83f05...99c97f0</text>
  <text x="650" y="398" class="ioc">hlpdrv.sys</text>
  <text x="650" y="414" class="ioc">  bd1f381e...c84a56</text>
  <text x="650" y="434" class="ioc">msimg32.dll</text>
  <text x="650" y="450" class="ioc">  7787da25...8b888497</text>
  <text x="650" y="470" class="ioc">EDRKiller.exe</text>
  <text x="650" y="486" class="ioc">  12fcde06...3f0a4a0</text>
  <text x="650" y="508" class="ioc">IOCTL 0x2222008</text>

  <!-- Post-loader chain panel -->
  <rect x="640" y="540" width="200" height="180" rx="6" class="bg-c2"/>
  <text x="650" y="560" class="label">Post-loader (operator)</text>
  <text x="650" y="582" class="sub">BloodHound + AdFind</text>
  <text x="650" y="600" class="sub">Impacket wmiexec/psexec</text>
  <text x="650" y="618" class="sub">vssadmin delete shadows</text>
  <text x="650" y="636" class="sub">rclone / Restic exfil</text>
  <text x="650" y="654" class="sub">Win + Linux + ESXi</text>
  <text x="650" y="676" class="sub">double extortion</text>
  <text x="650" y="694" class="sub">leak site publication</text>
  <text x="650" y="712" class="mitre">T1486 · T1490</text>

  <!-- ============== ARROWS ============== -->
  <!-- Stages flow downward inside victim lane -->
  <path d="M 330,170 L 330,190" class="arrow" marker-end="url(#arr)"/>
  <path d="M 330,280 L 330,300" class="arrow" marker-end="url(#arr)"/>
  <path d="M 330,400 L 330,420" class="arrow" marker-end="url(#arr)"/>
  <path d="M 330,520 L 330,540" class="arrow" marker-end="url(#arr)"/>
  <path d="M 330,650 L 330,670" class="arrow" marker-end="url(#arr)"/>
  <path d="M 330,770 L 330,790" class="arrow" marker-end="url(#arr)"/>
  <path d="M 330,890 L 330,910" class="arrow" marker-end="url(#arr)"/>

  <!-- Victim ↔ operator (post-loader) -->
  <path d="M 600,960 L 638,720" class="arrow" marker-end="url(#arr)" marker-start="url(#arr)"/>

  <!-- ============== DETECTION ANCHORS BOX (bottom) ============== -->
  <rect x="60" y="1040" width="780" height="120" rx="6" class="bg-det"/>
  <text x="80" y="1062" class="det-title">Detection anchors</text>
  <text x="80" y="1082" class="det-sub">• <tspan class="det-mono">sigma/msimg32_sideload_non_system_path.yml</tspan> — image_load of msimg32.dll outside System32/SysWOW64/WinSxS</text>
  <text x="80" y="1100" class="det-sub">• <tspan class="det-mono">sigma/qilin_byovd_kernel_driver_load.yml</tspan> — rwdrv.sys / hlpdrv.sys / mis-placed ThrottleStop driver load + known SHA-256</text>
  <text x="80" y="1118" class="det-sub">• <tspan class="det-mono">kql/qilin_driver_load_then_telemetry_gap.kql</tspan> — driver load followed by EDR telemetry quiescence ≤15 min</text>
  <text x="80" y="1136" class="det-sub">• <tspan class="det-mono">yara/qilin_edr_killer_msimg32_2026.yar</tspan> + <tspan class="det-mono">suricata/qilin_edr_killer_artifact_delivery.rules</tspan> — heuristic + file-name anchors for IOC delivery</text>
  <text x="80" y="1154" class="det-sub">• <tspan class="det-mono">hunts/h1_h2_h3</tspan> — Foxit side-load vehicle / EDR telemetry gap / kernel callback drift baseline</text>
</svg>
