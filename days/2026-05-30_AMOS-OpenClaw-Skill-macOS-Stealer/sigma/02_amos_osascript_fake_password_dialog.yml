title: AMOS macOS Stealer osascript Fake Password Dialog (GUI Input Capture)
id: c59773a9-e0a9-4107-8587-f1f7119a71ee
status: experimental
description: |
  Detects the AppleScript fake-password dialog that AMOS / Atomic macOS Stealer
  and most macOS infostealers use to capture the local user's password without
  fighting Gatekeeper. The malware invokes osascript with a display dialog that
  requests the password using "hidden answer", styled to look like a legitimate
  macOS system prompt. In the OpenClaw-skill chain (Trend Micro, 26/b) an AI
  coding agent relays the fake "install prerequisite" step and the dialog
  collects the password the stealer needs for Keychain and TCC access. A
  display dialog with hidden answer that mentions a password, launched by
  osascript under a non-Apple parent, is high-confidence stealer GUI input
  capture. Pair with the login.keychain-db access rule for confirmation.
references:
  - https://www.trendmicro.com/en_us/research/26/b/openclaw-skills-used-to-distribute-atomic-macos-stealer.html
  - https://www.glueckkanja.com/en/posts/2026-04-10-incident-to-intelligence
  - https://www.sophos.com/en-us/blog/why-amos-matters-the-macos-malware-stealing-data-at-scale
author: Jarmi
date: 2026/05/30
tags:
  - attack.collection
  - attack.credential-access
  - attack.execution
  - attack.t1056.002
  - attack.t1059.002
  - attack.t1204.002
logsource:
  category: process_creation
  product: macos
detection:
  selection_proc:
    Image|endswith: '/osascript'
  selection_dialog:
    CommandLine|contains|all:
      - 'display dialog'
      - 'hidden answer'
  selection_password:
    CommandLine|contains:
      - 'password'
      - 'Password'
      - 'passcode'
  condition: selection_proc and selection_dialog and selection_password
falsepositives:
  - Legitimate admin or helper apps that prompt for a password via AppleScript
    (rare; validate the parent application is Apple-signed and expected)
  - Internal IT automation that uses osascript password prompts

level: high
