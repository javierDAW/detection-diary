title: Internal SOCKS or Reverse-Proxy Tunneling Tool Execution
id: 93b0ea16-19dc-49da-8af4-13a218216c4f
status: experimental
description: |
  Detects execution of common internal pivot/tunneling tools used to maintain
  foothold and reach across a flat internal network. Dragos reported that in the
  SADM water-utility intrusion the operator "maintained established access to the
  victim's internal network using multiple proxied tunnels" before tasking Claude
  with internal enumeration that reached an OT-adjacent SCADA gateway. This rule
  fires on chisel, ligolo, gost, frp, plink reverse port-forwards, and ssh
  dynamic/remote forwards (-D / -R) — the building blocks of protocol tunneling
  (T1572). In an IT-OT context, tunnel tooling on an enterprise host that can
  route toward OT-adjacent segments is a priority lead. Pair with the East-West
  to OT gateway detections.
references:
  - https://www.dragos.com/blog/ai-assisted-ics-attack-water-utility
  - https://attack.mitre.org/techniques/T1572/
author: Jarmi
date: 2026/05/31
tags:
  - attack.command-and-control
  - attack.t1572
  - attack.lateral-movement
logsource:
  category: process_creation
detection:
  selection_named_tools:
    Image|endswith:
      - '/chisel'
      - '/ligolo'
      - '/ligolo-ng'
      - '/gost'
      - '/frpc'
      - '\chisel.exe'
      - '\ligolo.exe'
      - '\frpc.exe'
      - '\plink.exe'
  selection_named_cmd:
    CommandLine|contains:
      - 'chisel client'
      - 'ligolo-ng'
      - 'socks5'
      - '-R 0.0.0.0'
  selection_ssh_forward:
    Image|endswith:
      - '/ssh'
      - '\ssh.exe'
  selection_ssh_flags:
    CommandLine|contains:
      - ' -D '
      - ' -R '
      - ' -L '
  condition: selection_named_tools or selection_named_cmd or (selection_ssh_forward and selection_ssh_flags)
falsepositives:
  - Administrators using ssh local/remote forwards for legitimate maintenance;
    baseline by user, source host, and destination and exclude sanctioned jump
    workflows <add_known_admin_tunnels>
  - Developers running frp/gost for sanctioned service exposure in lab segments

level: high
