title: Active Directory and Network Interrogation LOLBIN Execution
id: 820ff06b-67d9-4886-8f72-6d5c35c5ea86
status: experimental
description: |
  Detects built-in Windows discovery utilities used for Active Directory and
  network interrogation — the enumeration primitives wrapped by the AI-written
  "BACKUPOSINT v9.0 APEX PREDATOR" framework (49 modules incl. AD interrogation
  and network enumeration) that Dragos analyzed in the SADM water-utility
  intrusion. Individually these commands are benign and common to admin activity;
  the malicious signal is many of them on a single host in a compressed window
  (the AI compressed days of mapping into hours). This rule provides the atomic
  process anchor; push the burst/threshold correlation to the SIEM (e.g. >=4
  distinct discovery commands from one host within 10 minutes), described here
  because Sigma conditions do not express counts. Covers T1087.002 and T1046.
references:
  - https://www.dragos.com/blog/ai-assisted-ics-attack-water-utility
  - https://attack.mitre.org/techniques/T1087/002/
author: Jarmi
date: 2026/05/31
tags:
  - attack.discovery
  - attack.t1087.002
  - attack.t1046
  - attack.t1018
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\nltest.exe'
      - '\dsquery.exe'
      - '\setspn.exe'
      - '\net.exe'
      - '\net1.exe'
      - '\nltest'
  selection_args:
    CommandLine|contains:
      - '/dclist'
      - '/domain_trusts'
      - 'group "Domain Admins"'
      - 'group /domain'
      - '-q */'
      - 'trustedDomain'
  condition: selection_image and selection_args
falsepositives:
  - Domain administrators and inventory/asset tools that enumerate AD; baseline by
    account and host, and treat the value as a burst correlation in the SIEM
    rather than a single-event alert <add_known_ad_admin_hosts>

level: medium
