<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">BumbleBee to AdaptixC2 to Akira kill chain</title>
<desc id="d">Two-lane diagram. Left lane (victim Windows host and Active Directory): initial access via Bing SEO poisoning to a trojanized ManageEngine OpManager MSI; execution via a BumbleBee DLL sideload where the signed consent.exe loads a malicious msimg32.dll with a CIS-locale geofence; an AdaptixC2 foothold delivered as a renamed Windows Address Book wab.exe (AdgNsy.exe) launched via WMI and beaconing to 172.96.137.160; discovery with systeminfo, nltest, whoami and net group plus creation of a backup_EA account added to Enterprise Admins and a RustDesk service; the critical credential-access stage that backs up ntds.dit with wbadmin, dumps and DPAPI-decrypts Veeam credentials and dumps LSASS across three hosts with comsvcs; lateral movement and exfiltration of about 77 gigabytes over a reverse-SSH tunnel and FileZilla SFTP to a server in Ukraine; and the critical Akira impact where locker.exe encrypts the root domain at about 44 hours and the operator returns on day five for the child domain. Right lane (operator machinery): the two-tier SEO-poisoning delivery network on Hostinger, the BumbleBee loader, the AdaptixC2 framework, the hands-on-keyboard credential tradecraft, the RustDesk and SSH access and exfil infrastructure, and the Akira impact with its campaign genealogy from Cyjax through DFIR and Swisscom to Zscaler. Detection anchors: the consent.exe msimg32.dll sideload, the WMI-spawned wab.exe masquerade beacon, and the wbadmin plus comsvcs plus Veeam psql credential burst, all host-behavioral and surviving DGA, IP and hash rotation.</desc>
