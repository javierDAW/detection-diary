<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">STA1/STA2 SS7 and Diameter signalling surveillance kill chain</title>
<desc id="d">Two-lane kill chain. Left lane: target-network chronology of the STA1 campaign (2024-11-25) from SS7 reconnaissance through Diameter pivot, anyTimeInterrogation escalation and a cross-realm Diameter spoof, continuing into the STA2 SIMjacker zero-click SMS branch (2025-02-11) and a contextual stage on Iran's reported wartime SS7 use against US military personnel (separate investigation). Right lane: the Ghost Operator infrastructure layer - GT and hostname acquisition, the Tango Networks UK and 019Mobile Israel proxy identities, IPX transit manipulation via BICS/Comfone/Syniverse, the STA2 Airtel Jersey entry point, and the multi-year multi-tenant platform behind both campaigns. Critical badges mark the ATI escalation, the cross-realm spoof, the SIMjacker delivery, the DNS-suppressed Ghost Operator, the IPX screening failure and the persistent platform finding.</desc>
