<text class="head" x="20" y="36">AWS Console AiTM - input_24 phishing kit</text>
<text class="meta" x="20" y="58">Vendor: Datadog Security Labs - Date: 2026-06-24 - Cluster: input_24 kit (PoisonSeeds-adjacent) - Day 65</text>

<rect class="laneL" x="20" y="85" width="410" height="1080"/>
<rect class="laneR" x="450" y="85" width="410" height="1080"/>
<text class="laneLabelL" x="30" y="105">VICTIM - targeted engineer (browser + AWS console)</text>
<text class="laneLabelR" x="460" y="105">OPERATOR - kit + infrastructure</text>

<rect class="stage" x="30" y="120" width="395" height="135"/>
<circle class="badge" cx="50" cy="140" r="14"/>
<text class="badgeText" x="50" y="144">1</text>
<text class="label" x="75" y="144">AWS-Support lure delivered</text>
<text class="sub" x="40" y="168">Email via legitimate ESP (SendGrid / Nimbu)</text>
<text class="sub" x="40" y="184">Fabricated bandwidth-throttling ticket</text>
<text class="sub" x="40" y="200">Per-recipient link; passes SPF/DKIM/DMARC</text>
<text class="mono" x="40" y="226">T1566.002 T1656  aws.us-west-login[.]com</text>
<text class="mono" x="40" y="244">delivery: SendGrid + Nimbu</text>

<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/>
<text class="badgeText" x="50" y="294">2</text>
<text class="label" x="75" y="294">Click gated link (input_24)</text>
<text class="sub" x="40" y="318">URL carries encrypted base64 email blob</text>
<text class="sub" x="40" y="334">POST /api/check -> sets validEmail cookie</text>
<text class="sub" x="40" y="350">/api/me returns victim email for gating</text>
<text class="mono" x="40" y="376">T1204.001 T1480  input_24= ...</text>
<text class="mono" x="40" y="394">cookie: validEmail</text>

<rect class="stage" x="30" y="420" width="395" height="135"/>
<circle class="badge" cx="50" cy="440" r="14"/>
<text class="badgeText" x="50" y="444">3</text>
<text class="label" x="75" y="444">AWS console clone renders</text>
<text class="sub" x="40" y="468">Renders only for a valid target email</text>
<text class="sub" x="40" y="484">Non-targets / sandboxes see a blank page</text>
<text class="sub" x="40" y="500">React SPA; single JS harvesting file</text>
<text class="mono" x="40" y="526">T1480 T1027  "Amazon Web Services Sign-In"</text>
<text class="mono" x="40" y="544">gate: n||!e ? null</text>

<rect class="stageK" x="30" y="570" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="590" r="14"/>
<text class="badgeText" x="50" y="594">4</text>
<text class="label" x="75" y="594">Submit console credentials</text>
<text class="sub" x="40" y="618">Root or IAM form -> POST /api/login</text>
<text class="sub" x="40" y="634">Response type picks the MFA route</text>
<text class="sub" x="40" y="650">isRootUser flag distinguishes account type</text>
<text class="mono" x="40" y="676">T1557 T1111  /api/login {username,password}</text>
<text class="mono" x="40" y="694">route: /email | /sms | /gauth</text>

<rect class="stageK" x="30" y="720" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="740" r="14"/>
<text class="badgeText" x="50" y="744">5</text>
<text class="label" x="75" y="744">MFA challenge captured + relayed</text>
<text class="sub" x="40" y="768">Variant copy matches real AWS challenge</text>
<text class="sub" x="40" y="784">Code -> POST /api/auth -> real console</text>
<text class="sub" x="40" y="800">Live relay: server knows next AWS route</text>
<text class="mono" x="40" y="826">T1111 T1539  /api/auth {code}</text>
<text class="mono" x="40" y="844">factors: email / sms / TOTP</text>

<rect class="stage" x="30" y="870" width="395" height="135"/>
<circle class="badge" cx="50" cy="890" r="14"/>
<text class="badgeText" x="50" y="894">6</text>
<text class="label" x="75" y="894">Session replayed - ConsoleLogin</text>
<text class="sub" x="40" y="918">CloudTrail ConsoleLogin = Success</text>
<text class="sub" x="40" y="934">MFA satisfied via relay; login looks normal</text>
<text class="sub" x="40" y="950">Anchor: source ASN off identity baseline</text>
<text class="mono" x="40" y="976">T1078.004 T1550.004  signin.amazonaws.com</text>
<text class="mono" x="40" y="994">detect: DNS hit -> ConsoleLogin join</text>

<rect class="stage" x="30" y="1020" width="395" height="135"/>
<circle class="badge" cx="50" cy="1040" r="14"/>
<text class="badgeText" x="50" y="1044">7</text>
<text class="label" x="75" y="1044">IAM persistence (expected)</text>
<text class="sub" x="40" y="1068">New access key / user / login profile</text>
<text class="sub" x="40" y="1084">Durable access outlives browser session</text>
<text class="sub" x="40" y="1100">Then data-plane exfil from new key</text>
<text class="mono" x="40" y="1126">T1098.001 T1136.003  CreateAccessKey</text>
<text class="mono" x="40" y="1144">CreateUser / AttachUserPolicy</text>

<rect class="op" x="460" y="125" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="145" r="14"/>
<text class="badgeText" x="480" y="149">A</text>
<text class="label" x="505" y="149">Domain registration + fronting</text>
<text class="sub" x="470" y="173">Six look-alikes, 2026-06-16..18 window</text>
<text class="sub" x="470" y="189">Registrar: NICENIC INTERNATIONAL GROUP</text>
<text class="sub" x="470" y="205">Cloudflare-fronted; AWS + SendGrid twins</text>
<text class="sub" x="470" y="221">us-east-prod vs us-west-prod naming</text>
<text class="mono" x="470" y="248">T1583.001 T1583.006  loginportal-aws[.]com</text>
<text class="mono" x="470" y="266">switch-sglogin[.]com</text>

<rect class="op" x="460" y="295" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="315" r="14"/>
<text class="badgeText" x="480" y="319">B</text>
<text class="label" x="505" y="319">Gating server</text>
<text class="sub" x="470" y="343">/api/check decrypts input_24 blob</text>
<text class="sub" x="470" y="359">Sets validEmail cookie (plaintext email)</text>
<text class="sub" x="470" y="375">/api/me returns email; gate render</text>
<text class="sub" x="470" y="391">Blocks sandboxes / researchers</text>
<text class="mono" x="470" y="418">T1480 T1027  POST /api/check</text>
<text class="mono" x="470" y="436">GET /api/me -> {email}</text>

<rect class="opK" x="460" y="465" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="485" r="14"/>
<text class="badgeText" x="480" y="489">C</text>
<text class="label" x="505" y="489">Relay backend -> real AWS</text>
<text class="sub" x="470" y="513">/api/login forwards creds to console</text>
<text class="sub" x="470" y="529">/api/auth forwards live MFA code</text>
<text class="sub" x="470" y="545">Server returns next AWS route (relay tell)</text>
<text class="sub" x="470" y="561">Captures email / SMS / TOTP factors</text>
<text class="mono" x="470" y="588">T1557 T1111 T1539  /api/login /api/auth</text>
<text class="mono" x="470" y="606">-> signin.aws.amazon.com</text>

<rect class="op" x="460" y="635" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="655" r="14"/>
<text class="badgeText" x="480" y="659">D</text>
<text class="label" x="505" y="659">ESP abuse for delivery</text>
<text class="sub" x="470" y="683">SendGrid + Nimbu (legitimate senders)</text>
<text class="sub" x="470" y="699">Passes SPF/DKIM/DMARC by design</text>
<text class="sub" x="470" y="715">Sender auth = deliverability, not trust</text>
<text class="sub" x="470" y="731">Discriminator is the URL host, not sender</text>
<text class="mono" x="470" y="758">T1585.002  sendgrid.us-west-prod[.]com</text>
<text class="mono" x="470" y="776">VT 2026-06-19 validation .bat</text>

<rect class="op" x="460" y="805" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="825" r="14"/>
<text class="badgeText" x="480" y="829">E</text>
<text class="label" x="505" y="829">Kit lineage (input_24 / PoisonSeeds)</text>
<text class="sub" x="470" y="853">input_24 gating active since 2025-07</text>
<text class="sub" x="470" y="869">Prior: Trezor / Ledger wallet phishing</text>
<text class="sub" x="470" y="885">Aug 2025: dashboard-salesforce[.]com</text>
<text class="sub" x="470" y="901">SendGrid SPA = PoisonSeeds (NVISO)</text>
<text class="mono" x="470" y="928">track the kit, not the domain</text>
<text class="mono" x="470" y="946">/2fa/(email|sms|ga)/:twoFactorId</text>

<rect class="op" x="460" y="975" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="995" r="14"/>
<text class="badgeText" x="480" y="999">F</text>
<text class="label" x="505" y="999">Targeting</text>
<text class="sub" x="470" y="1023">Fewer than 50 curated recipients</text>
<text class="sub" x="470" y="1039">Primarily US-based individuals</text>
<text class="sub" x="470" y="1055">Software engineers + eng leadership</text>
<text class="sub" x="470" y="1071">Per-recipient encrypted email blob</text>
<text class="mono" x="470" y="1098">T1598.003  targeted, not mass phishing</text>
<text class="mono" x="470" y="1116">gate blinds URL detonation</text>

