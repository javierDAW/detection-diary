<text class="footerH" x="35" y="1200">Detection anchors (survive domain rotation)</text>
<text class="footerT" x="35" y="1222">1) DNS/TLS to look-alike domains  2) request fingerprint input_24= and /api/check | /api/auth</text>
<text class="footerT" x="35" y="1240">3) AWS ConsoleLogin = Success from off-baseline source ASN within minutes of the domain hit</text>
