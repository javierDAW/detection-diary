<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">AWS console AiTM (input_24 kit) kill chain</title>
<desc id="d">Two-lane diagram. Left lane: a targeted engineer receives a SendGrid or Nimbu delivered AWS support lure, clicks an input_24 gated link, the AWS console clone renders, credentials are submitted to the api login endpoint, the MFA challenge is captured, the session is relayed to a successful ConsoleLogin, and IAM persistence is expected. Right lane: operator infrastructure of NICENIC domain registration behind Cloudflare, the gating server, the api login and api auth relay backend talking to the real AWS console, ESP abuse, and the input_24 PoisonSeeds kit lineage targeting fewer than fifty US engineers. Detection anchors are look-alike domain resolution, the input_24 and api relay fingerprints, and an off-baseline ConsoleLogin.</desc>
