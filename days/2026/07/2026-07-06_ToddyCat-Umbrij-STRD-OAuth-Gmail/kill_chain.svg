<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">ToddyCat Umbrij STRD OAuth Gmail kill chain</title>
<desc id="d">Two-lane kill chain. Left lane: the victim workstation from a ToddyCat foothold and a scheduled task masquerading as Kaspersky EDR, through DLL sideload of the Umbrij .NET tool, explorer.exe token impersonation, copying the live browser profile into BackupFiles, launching a headless Chromium with a remote debugging port, driving DevTools to mint an OAuth authorization code, and reading Gmail via the Google API. Right lane: ToddyCat operations - deploy Umbrij, masquerade and sideload from signed loaders, the Shadow Token via Remote Debug design, blending into the GWMMO and GWSMO migration client IDs, retrieving the auth code from the local log, and exchanging it off-host for an access token. Detection anchors: a browser launched with --remote-debugging-port and --headless, a signed loader in a staging dir loading an unsigned DLL, a KasperskyEndpointSecurityEDRAvp task, and an OAuth grant to GWMMO or GWSMO.</desc>
