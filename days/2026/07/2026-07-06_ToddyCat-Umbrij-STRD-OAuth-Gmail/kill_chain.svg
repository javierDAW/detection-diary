<rect class="op" x="460" y="465" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="485" r="14"/><text class="badgeText" x="480" y="489">C</text>
<text class="label" x="502" y="489">Shadow Token via Remote Debug</text>
<text class="sub" x="470" y="513">Ride the live authenticated session</text>
<text class="sub" x="470" y="529">No DPAPI, no cookie decryption needed</text>
<text class="sub" x="470" y="545">Works while user stays logged into Gmail</text>
<text class="sub" x="470" y="561">DevTools protocol over loopback</text>
<text class="mono" x="470" y="591">PuppeteerSharp connects to debug port</text>
<text class="mono" x="470" y="609">ChekPortAvailable() before launch</text>

