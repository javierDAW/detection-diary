<text class="sub" x="470" y="343">Trusted vendor names as cover</text>
<text class="sub" x="470" y="359">Kaspersky task name; signed loaders</text>
<text class="sub" x="470" y="375">Staged in Public / Temp / Vss</text>
<text class="sub" x="470" y="391">Long-standing ToddyCat tradecraft</text>
<text class="mono" x="470" y="421">BDS.exe / VSTestVideoRecorder.exe</text>
<text class="mono" x="470" y="439">DLL: log.dll (unsigned)</text>

