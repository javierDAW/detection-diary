<circle class="badgeR" cx="480" cy="145" r="14"/><text class="badgeText" x="480" y="149">A</text>
<text class="label" x="502" y="149">ToddyCat operator</text>
<text class="sub" x="470" y="173">China-nexus cyber-espionage cluster</text>
<text class="sub" x="470" y="189">Target: corporate Gmail correspondence</text>
<text class="sub" x="470" y="205">Deploy Umbrij (.NET / ConfuserEx)</text>
<text class="sub" x="470" y="221">Discovered via Kaspersky MDR hunt</text>
<text class="mono" x="470" y="251">Umbrij versions a / b / c</text>
<text class="mono" x="470" y="269">ver.b adds -savepdf profile dump</text>

