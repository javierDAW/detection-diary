<text class="sub" x="40" y="1084">Read mail / contacts / calendar / drive</text>
<text class="sub" x="40" y="1100">T1114.002</text>
<text class="mono" x="40" y="1126">scope=https://mail.google.com/</text>
<text class="mono" x="40" y="1144">client_id=279448736670 (GWMMO)</text>

