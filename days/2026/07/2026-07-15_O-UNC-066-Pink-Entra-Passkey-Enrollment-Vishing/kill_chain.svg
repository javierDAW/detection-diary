<text class="sub" x="40" y="768">/submit-otp or /submit-authenticator (OTP/TOTP)</text>
<text class="sub" x="40" y="784">/approve-authenticator: type operator's number</text>
<text class="sub" x="40" y="800">Victim approves attacker's session</text>
<text class="mono" x="40" y="826">POST /backend.php (OTP)</text>
<text class="mono" x="40" y="844">T1111 / T1621</text>

<rect class="stageK" x="30" y="870" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="890" r="14"/><text class="badgeText" x="50" y="894">6</text>
<text class="label" x="74" y="894">Fake passkey + BIP-39 decoy</text>
<text class="sub" x="40" y="918">/passkey/register mimics dialog, registers nothing</text>
<text class="sub" x="40" y="934">/passkey shows fake BIP-39 "recovery key"</text>
<text class="sub" x="40" y="950">/passkey/check confirms last seed word (sleight)</text>
<text class="mono" x="40" y="976">distraction while attacker enrolls own passkey</text>
<text class="mono" x="40" y="994">T1556.006 Modify Auth (MFA)</text>

<rect class="stage" x="30" y="1020" width="395" height="135"/>
<circle class="badge" cx="50" cy="1040" r="14"/><text class="badgeText" x="50" y="1044">7</text>
