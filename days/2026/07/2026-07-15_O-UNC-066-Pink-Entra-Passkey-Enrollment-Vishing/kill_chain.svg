<text class="laneLabelR" x="460" y="104">OPERATOR ACTIONS (panel + real tenant)</text>

<rect class="stage" x="30" y="120" width="395" height="135"/>
<circle class="badge" cx="50" cy="140" r="14"/><text class="badgeText" x="50" y="144">1</text>
<text class="label" x="74" y="144">Vishing call - passkey pretext</text>
<text class="sub" x="40" y="168">Operator phones user, impersonates IT/security</text>
<text class="sub" x="40" y="184">Cites Microsoft passkey-registration nudge (May 2026)</text>
<text class="sub" x="40" y="200">User primed to "enroll a new passkey"</text>
<text class="mono" x="40" y="226">T1566.004 Spearphishing Voice</text>
<text class="mono" x="40" y="244">T1656 Impersonation</text>

<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/><text class="badgeText" x="50" y="294">2</text>
<text class="label" x="74" y="294">Visit per-target kit subdomain</text>
<text class="sub" x="40" y="318">Loads org logo/background (real MS CDN styling)</text>
<text class="sub" x="40" y="334">/gate anti-analysis, then /identify username</text>
<text class="sub" x="40" y="350">Not an AiTM proxy - operator-driven PHP panel</text>
<text class="mono" x="40" y="376">victim.setpasskey[.]com</text>
