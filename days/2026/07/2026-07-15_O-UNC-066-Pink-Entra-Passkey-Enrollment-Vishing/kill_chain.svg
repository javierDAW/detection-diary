<text class="footerH" x="34" y="1200">Durable detection anchor: attacker passkey in Entra audit, not a hash or CVE</text>
<text class="footerT" x="34" y="1222">No malware, no vulnerability. Hunt: passkey/FIDO2 registration correlated with an anomalous sign-in (AS57724 / AS59692).</text>
<text class="footerT" x="34" y="1240">A password reset does NOT remove the rogue passkey - enumerate and delete authentication methods, then re-enroll from a managed device.</text>
