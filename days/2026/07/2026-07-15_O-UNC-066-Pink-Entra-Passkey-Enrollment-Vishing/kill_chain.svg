<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">O-UNC-066 Pink passkey-enrollment vishing kill chain</title>
<desc id="d">Two lanes. Left is the victim experience during a vishing call: the kit stages gate, identify, password, processing, MFA capture, a fake passkey and BIP-39 recovery page, and an all-set confirmation. Right is what the operator does in parallel: register passkey-themed domains, relay captured credentials and OTP through backend.php, sign in to the real Microsoft tenant, enroll the attacker's own FIDO2 passkey into the victim account, then exfiltrate SharePoint and OneDrive and extort via the Pink data-leak site. The durable detection anchor is the attacker passkey appearing in Entra audit logs shortly after an anomalous sign-in from DDoS-Guard AS57724 or IQWeb AS59692.</desc>
