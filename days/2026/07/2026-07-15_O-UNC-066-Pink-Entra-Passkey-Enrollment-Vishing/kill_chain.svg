<text class="sub" x="40" y="500">~1-second heartbeat steers next page</text>
<text class="mono" x="40" y="526">POST /backend.php</text>
<text class="mono" x="40" y="544">T1111 MFA Interception</text>

<rect class="stage" x="30" y="570" width="395" height="135"/>
<circle class="badge" cx="50" cy="590" r="14"/><text class="badgeText" x="50" y="594">4</text>
<text class="label" x="74" y="594">Processing stall</text>
<text class="sub" x="40" y="618">/processing loading screen shown to victim</text>
<text class="sub" x="40" y="634">Buys time while operator signs in to real tenant</text>
