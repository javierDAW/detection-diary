<text class="sub" x="40" y="1068">/done confirms bogus enrollment to victim</text>
<text class="sub" x="40" y="1084">Real MS email: "new passkey registered"</text>
<text class="sub" x="40" y="1100">Rogue passkey named benignly to blend in</text>
<text class="mono" x="40" y="1126">user believes they secured the account</text>
<text class="mono" x="40" y="1144">defense evasion</text>

