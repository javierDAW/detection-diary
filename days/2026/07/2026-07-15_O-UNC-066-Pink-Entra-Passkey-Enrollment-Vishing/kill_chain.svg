<text class="mono" x="40" y="676">kit awaits operator instruction</text>
<text class="mono" x="40" y="694">T1621 MFA Request Generation</text>

<rect class="stageK" x="30" y="720" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="740" r="14"/><text class="badgeText" x="50" y="744">5</text>
