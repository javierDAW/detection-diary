<text class="sub" x="470" y="189">passkeyadd / setpasskey - per-target subdomains</text>
<text class="sub" x="470" y="205">Tucows / Internet Domain Service BS Corp</text>
<text class="sub" x="470" y="221">Hosted DDoS-Guard AS57724, IQWeb AS59692</text>
<text class="mono" x="470" y="248">T1583.001 Acquire Domains</text>
<text class="mono" x="470" y="266">registered Apr-Jun 2026</text>

<rect class="op" x="460" y="295" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="315" r="14"/><text class="badgeText" x="480" y="319">B</text>
<text class="label" x="504" y="319">Relay via operator panel</text>
<text class="sub" x="470" y="343">backend.php receives creds + OTP POSTs</text>
<text class="sub" x="470" y="359">1-second heartbeat drives victim page state</text>
<text class="sub" x="470" y="375">Caller adapts to TOTP / push / SMS live</text>
<text class="sub" x="470" y="391">Human in the loop, not an automated proxy</text>
<text class="mono" x="470" y="418">POST /backend.php</text>
<text class="mono" x="470" y="436">hybrid voice + web tradecraft</text>

<rect class="opK" x="460" y="465" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="485" r="14"/><text class="badgeText" x="480" y="489">C</text>
<text class="label" x="504" y="489">Sign in to the real tenant</text>
<text class="sub" x="470" y="513">Operator authenticates with relayed secrets</text>
<text class="sub" x="470" y="529">Login may egress from actor hosting ASN</text>
<text class="sub" x="470" y="545">Detection: SigninLogs AS57724 / AS59692</text>
<text class="sub" x="470" y="561">Account takeover achieved</text>
<text class="mono" x="470" y="588">T1078.004 Valid Accounts: Cloud</text>
<text class="mono" x="470" y="606">ResultType 0 from new-for-user ASN</text>

<rect class="opK" x="460" y="635" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="655" r="14"/><text class="badgeText" x="480" y="659">D</text>
<text class="label" x="504" y="659">Enroll ATTACKER passkey</text>
<text class="sub" x="470" y="683">Registers attacker FIDO2 into victim account</text>
<text class="sub" x="470" y="699">Durable, phishing-resistant persistence</text>
<text class="sub" x="470" y="715">Survives a password reset - must be deleted</text>
<text class="sub" x="470" y="731">Entra audit: User registered security info</text>
<text class="mono" x="470" y="758">T1098.005 Device Registration</text>
<text class="mono" x="470" y="776">fido2AuthenticationMethod added</text>

<rect class="op" x="460" y="805" width="395" height="155"/>
