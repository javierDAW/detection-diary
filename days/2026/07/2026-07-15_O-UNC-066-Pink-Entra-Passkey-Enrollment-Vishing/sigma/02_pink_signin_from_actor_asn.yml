title: Entra Interactive Sign-In From Pink (O-UNC-066) Hosting ASN
id: dbb04512-9a4e-4323-89d9-e366dd14785f
status: experimental
description: |
  Detects Microsoft Entra ID interactive sign-ins sourced from the autonomous systems that
  hosted the O-UNC-066 (Pink) passkey-phishing infrastructure: DDoS-Guard (AS57724, Russia)
  and IQWeb FZ-LLC (AS59692). The operator authenticates to the legitimate tenant using
  credentials/OTP relayed through the kit, so the takeover sign-in can originate from the
  actor's hosting rather than the victim's usual network. ASNs are a more durable pivot than
  individual IPs; treat a hit as high-signal when it precedes an authentication-method
  registration. Push any impossible-travel / new-ASN baselining to your SIEM.
references:
  - https://www.okta.com/blog/threat-intelligence/vishing-actors-target-microsoft-entra-passkey-enrollment-/
  - https://attack.mitre.org/techniques/T1078/004/
author: Jarmi
date: 2026/07/15
tags:
  - attack.defense-evasion
  - attack.persistence
  - attack.t1078.004
logsource:
  product: azure
  service: signinlogs
detection:
  selection_asn:
    AutonomousSystemNumber:
      - 57724
      - 59692
  selection_success:
    ResultType: '0'
  condition: selection_asn and selection_success
falsepositives:
  - Users legitimately behind these networks (rare in enterprise; validate against your baseline)
  - Corporate VPN or proxy egress that happens to share the ASN
level: high
