<text class="head" x="20" y="36">UAT-7810 and the LapDogs ORB - LONGLEASH / DOGLEASH / JARLEASH</text>
<text class="meta" x="20" y="58">Source: Cisco Talos - Date: 2026-07-07 - Cluster: UAT-7810 (China-nexus) - Class: espionage - Day 77</text>

<rect class="laneL" x="20" y="85" width="410" height="1080"/>
<text class="laneLabelL" x="34" y="104">VICTIM / RELAY NODE - SOHO edge device (Ruckus)</text>
<rect class="laneR" x="450" y="85" width="410" height="1080"/>
<text class="laneLabelR" x="464" y="104">OPERATOR / ORB INFRASTRUCTURE - UAT-7810</text>
<rect class="stage" x="30" y="120" width="395" height="135"/>
<circle class="badge" cx="50" cy="140" r="14"/><text class="badgeText" x="50" y="144">1</text>
<text class="label" x="76" y="144">Select edge device</text>
<text class="sub" x="42" y="168">Internet-facing Ruckus / SOHO router</text>
<text class="sub" x="42" y="184">Unpatched n-day attack surface</text>
<text class="sub" x="42" y="200">T1190 Exploit Public-Facing Application</text>
<text class="mono" x="42" y="226">CVE-2023-25717 (KEV) RCE</text>
<text class="mono" x="42" y="244">CVE-2020-22653 / 22658</text>

<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/><text class="badgeText" x="50" y="294">2</text>
<text class="label" x="76" y="294">Exploit and drop loader</text>
<text class="sub" x="42" y="318">Shell script fetches DOGLEASH</text>
<text class="sub" x="42" y="334">Multi-arch: MIPS / ARM / x64</text>
<text class="sub" x="42" y="350">T1105 / T1059.004</text>
<text class="mono" x="42" y="376">GET raw-IP :8088/ :2222/</text>
<text class="mono" x="42" y="394">wget / curl / busybox</text>

<rect class="stageK" x="30" y="420" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="440" r="14"/><text class="badgeText" x="50" y="444">3</text>
<text class="label" x="76" y="444">Open firewall for listener</text>
<text class="sub" x="42" y="468">iptables INPUT ACCEPT dport</text>
<text class="sub" x="42" y="484">Passive backdoor needs inbound</text>
<text class="sub" x="42" y="500">T1562.004 Disable/Modify Firewall</text>
<text class="mono" x="42" y="526">iptables -A INPUT -p tcp -j ACCEPT</text>
<text class="mono" x="42" y="544">--dport &lt;bind_port&gt;</text>

<rect class="stageK" x="30" y="570" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="590" r="14"/><text class="badgeText" x="50" y="594">4</text>
<text class="label" x="76" y="594">DOGLEASH passive backdoor</text>
<text class="sub" x="42" y="618">Binds local port, waits for operator</text>
<text class="sub" x="42" y="634">cmd via /bin/sh -c; read/rename file</text>
<text class="sub" x="42" y="650">T1620 execute code in memory</text>
<text class="mono" x="42" y="676">hardcoded-password TCP decode</text>
<text class="mono" x="42" y="694">cmd codes 0x2266..0x3450</text>

<rect class="stage" x="30" y="720" width="395" height="135"/>
<circle class="badge" cx="50" cy="740" r="14"/><text class="badgeText" x="50" y="744">5</text>
<text class="label" x="76" y="744">LONGLEASH relay implant</text>
<text class="sub" x="42" y="768">ff-agent nz1.0; Boost.Asio (MIPS)</text>
<text class="sub" x="42" y="784">HTTP/DNS/SOCKS/TCP/ICMP proxy</text>
<text class="sub" x="42" y="800">T1090.003 Multi-hop Proxy / T1572</text>
<text class="mono" x="42" y="826">intermediate C2; forwards to peers</text>
<text class="mono" x="42" y="844">musl static; Nanopb protobuf</text>

<rect class="stage" x="30" y="870" width="395" height="135"/>
<circle class="badge" cx="50" cy="890" r="14"/><text class="badgeText" x="50" y="894">6</text>
<text class="label" x="76" y="894">Encrypted relay channel</text>
<text class="sub" x="42" y="918">MbedTLS / x509 PKI</text>
<text class="sub" x="42" y="934">TLS server on TCP/99</text>
<text class="sub" x="42" y="950">T1573.002 Asymmetric Cryptography</text>
<text class="mono" x="42" y="976">cert subject CN=exploit</text>
<text class="mono" x="42" y="994">Chrome/122 decoy User-Agent</text>

<rect class="stageK" x="30" y="1020" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="1040" r="14"/><text class="badgeText" x="50" y="1044">7</text>
<text class="label" x="76" y="1044">Node joins ORB fabric</text>
<text class="sub" x="42" y="1068">Rented by secondary China APTs</text>
<text class="sub" x="42" y="1084">e.g. UAT-5918 (Taiwan critical infra)</text>
<text class="sub" x="42" y="1100">T1584.008 / T1070.004</text>
<text class="mono" x="42" y="1126">self-clean traces on tamper</text>
<text class="mono" x="42" y="1144">relay hides the true origin</text>
<rect class="op" x="460" y="125" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="145" r="14"/><text class="badgeText" x="480" y="149">A</text>
<text class="label" x="506" y="149">Develop ff-agent codebase</text>
<text class="sub" x="472" y="173">SHORTLEASH -&gt; LONGLEASH successor</text>
<text class="sub" x="472" y="189">Nanopb protobuf, MbedTLS, musl</text>
<text class="sub" x="472" y="205">Base58 / Base64 encoding</text>
<text class="sub" x="472" y="221">T1587.001 Develop Capabilities</text>
<text class="mono" x="472" y="251">internal project nz1.0</text>
<text class="mono" x="472" y="269">shared name: ff-agent</text>

<rect class="op" x="460" y="295" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="315" r="14"/><text class="badgeText" x="480" y="319">B</text>
<text class="label" x="506" y="319">Acquire VPS servers</text>
<text class="sub" x="472" y="343">Four download / relay hosts</text>
<text class="sub" x="472" y="359">Ports 8088 / 2222 / 99</text>
<text class="sub" x="472" y="375">One in Hong Kong</text>
<text class="sub" x="472" y="391">T1583.003 Acquire Infra: VPS</text>
<text class="mono" x="472" y="421">194.233.92.26  217.15.160.247</text>
<text class="mono" x="472" y="439">217.15.164.147  95.182.100.231</text>

<rect class="op" x="460" y="465" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="485" r="14"/><text class="badgeText" x="480" y="489">C</text>
<text class="label" x="506" y="489">Stage multi-arch payloads</text>
<text class="sub" x="472" y="513">DOGLEASH per architecture</text>
<text class="sub" x="472" y="529">MIPS / MIPSel / ARMv7 / x64</text>
<text class="sub" x="472" y="545">Loader scripts co-hosted</text>
<text class="sub" x="472" y="561">T1608.001 Upload Malware</text>
<text class="mono" x="472" y="591">http://&lt;vps&gt;:8088/  :2222/</text>
<text class="mono" x="472" y="609">arch-specific ClamAV sigs</text>

<rect class="op" x="460" y="635" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="655" r="14"/><text class="badgeText" x="480" y="659">D</text>
<text class="label" x="506" y="659">Stand up TLS relay</text>
<text class="sub" x="472" y="683">Self-signed cert on TCP/99</text>
<text class="sub" x="472" y="699">Exploit-themed cert subject</text>
<text class="sub" x="472" y="715">Blends via Chrome-122 UA</text>
<text class="sub" x="472" y="731">T1573.002 Encrypted Channel</text>
<text class="mono" x="472" y="761">CN=exploit  O=exploit</text>
<text class="mono" x="472" y="779">fp c2ab9ada...583d8a15</text>

<rect class="op" x="460" y="805" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="825" r="14"/><text class="badgeText" x="480" y="829">E</text>
<text class="label" x="506" y="829">JARLEASH administration</text>
<text class="sub" x="472" y="853">Java web-based file manager</text>
<text class="sub" x="472" y="869">FTP / SFTP / netcat servers</text>
<text class="sub" x="472" y="885">Config in Simplified Chinese</text>
<text class="sub" x="472" y="901">T1071.001 Web Protocol</text>
<text class="mono" x="472" y="931">startup: kill + respawn JVM</text>
<text class="mono" x="472" y="949">deployed on select nodes</text>

<rect class="op" x="460" y="975" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="995" r="14"/><text class="badgeText" x="480" y="999">F</text>
<text class="label" x="506" y="999">LEASHTEST and iterate</text>
<text class="sub" x="472" y="1023">MIPS capability probe</text>
<text class="sub" x="472" y="1039">iot-test; prints Hello World!</text>
<text class="sub" x="472" y="1055">Recompile per victim/arch</text>
<text class="sub" x="472" y="1071">T1587.001 tooling development</text>
<text class="mono" x="472" y="1101">near-zero VirusTotal overlap</text>
<text class="mono" x="472" y="1119">detect structure, not hash</text>
