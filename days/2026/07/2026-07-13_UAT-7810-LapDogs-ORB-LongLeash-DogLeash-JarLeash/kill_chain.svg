<text class="footerT" x="34" y="1222">Raw-IP fetch on :8088 / :2222 -&gt; chmod +x -&gt; exec  -  iptables INPUT ACCEPT + new listener (DOGLEASH)  -  outbound TLS on TCP/99</text>
