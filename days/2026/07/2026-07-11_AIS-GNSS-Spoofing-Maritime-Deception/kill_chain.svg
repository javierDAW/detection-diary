<text class="sub" x="470" y="173">Kaliningrad, Murmansk, Black Sea, Haifa</text>
<text class="sub" x="470" y="189">Area denial / electronic warfare</text>
<text class="sub" x="470" y="205">Russia-nexus (Baltic/Black Sea) assessed</text>
<text class="sub" x="470" y="221">AIS-only = no definitive attribution</text>
<text class="mono" x="470" y="251">counterfeit constellation over area</text>
<text class="mono" x="470" y="269">T0830 adversary-in-the-middle</text>

