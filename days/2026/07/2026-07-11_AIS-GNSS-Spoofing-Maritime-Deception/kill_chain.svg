<circle class="badge" cx="50" cy="1040" r="14"/><text class="badgeText" x="50" y="1044">7</text>
<text class="label" x="74" y="1044">Stage-2 clustering + identity check</text>
<text class="sub" x="40" y="1068">2+ MMSIs from ~10km source to ~10m dest</text>
<text class="sub" x="40" y="1084">Circular-trajectory-around-a-point tell</text>
<text class="sub" x="40" y="1100">Cross-check registry + MID vs flag</text>
<text class="mono" x="40" y="1126">final potential spoofing event (FPSE)</text>
<text class="mono" x="40" y="1144">T0830 confirmed footprint</text>

