<text class="label" x="74" y="144">Contested positioning environment</text>
<text class="sub" x="40" y="168">Baltic, Black Sea, Murmansk, Haifa, Hormuz</text>
<text class="sub" x="40" y="184">GNSS spoofing + AIS deception hot-zones</text>
<text class="sub" x="40" y="200">Entering the area is the precondition</text>
<text class="mono" x="40" y="226">contested GNSS / AIS choke points</text>
<text class="mono" x="40" y="244">T0830 adversary-in-the-middle (signal)</text>

<!-- Left stage 2 -->
<rect class="stageK" x="30" y="270" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="290" r="14"/><text class="badgeText" x="50" y="294">2</text>
<text class="label" x="74" y="294">GNSS receiver locks counterfeit signal</text>
<text class="sub" x="40" y="318">Fake constellation stronger than real sats</text>
<text class="sub" x="40" y="334">False PVT; or jamming = loss of fix</text>
<text class="sub" x="40" y="350">All receivers dragged to one false point</text>
<text class="mono" x="40" y="376">false position-velocity-time solution</text>
