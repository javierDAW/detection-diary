<text class="sub" x="40" y="650">Generic labels: NATO SHIP, FRENCH WARSHIP</text>
<text class="mono" x="40" y="676">dark-fleet identity laundering</text>
<text class="mono" x="40" y="694">T0856 spoof reporting message</text>

<!-- Left stage 5 -->
<rect class="stageK" x="30" y="720" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="740" r="14"/><text class="badgeText" x="50" y="744">5</text>
<text class="label" x="74" y="744">Observer picture manipulated</text>
<text class="sub" x="40" y="768">VTS / ECDIS / aggregators ingest as truth</text>
<text class="sub" x="40" y="784">Mis-routing, sanctions blind spot</text>
<text class="sub" x="40" y="800">Collision risk when tracks diverge</text>
<text class="mono" x="40" y="826">corrupted traffic picture</text>
<text class="mono" x="40" y="844">T0832 manip of view - T0880 loss of safety</text>

<!-- Left stage 6 -->
<rect class="stage" x="30" y="870" width="395" height="135"/>
<circle class="badge" cx="50" cy="890" r="14"/><text class="badgeText" x="50" y="894">6</text>
<text class="label" x="74" y="894">Stage-1 kinematic filter (defender)</text>
<text class="sub" x="40" y="918">Per-MMSI jump + implied-speed test</text>
<text class="sub" x="40" y="934">Discard zero-coord, seconds&gt;59, placeholder</text>
<text class="sub" x="40" y="950">Flags a potential spoofing event (PSE)</text>
<text class="mono" x="40" y="976">jump &gt; 5 km AND implied &gt; 120 kn</text>
<text class="mono" x="40" y="994">T1565.002 transmitted data manip</text>

