<rect class="laneR" x="450" y="85" width="410" height="1080"/>
<text class="laneLabelR" x="464" y="104">SPOOFING SIDE - GNSS transmitters, dark fleet</text>

<!-- Left stage 1 -->
<rect class="stageK" x="30" y="120" width="395" height="135"/>
