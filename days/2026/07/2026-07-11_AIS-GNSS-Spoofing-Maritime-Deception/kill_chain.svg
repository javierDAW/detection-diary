<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">AIS and GNSS spoofing kill chain - maritime positioning deception</title>
<desc id="d">Two-lane diagram. Left lane is the affected vessel and shore observer: a ship enters a contested GNSS/AIS area, its GNSS receiver locks a counterfeit signal and computes a false position, its AIS broadcasts that false position in an unauthenticated type 1/2/3 report, an operator separately falsifies AIS identity in a type 5 static record (false MMSI, name, flag), and the shore VTS/ECDIS picture is manipulated with collision and mis-routing risk; the defender then applies a Stage-1 per-MMSI kinematic jump filter and a Stage-2 multi-vessel clustering plus identity cross-check. Right lane is the spoofing side: state GNSS transmitters over the Baltic, Black Sea, Murmansk and Haifa, dark-fleet identity manipulation in choke points such as the Strait of Hormuz, and the AIS/GNSS spoofing tooling that produces it, with the caveat that AIS characterises but does not attribute. Detection anchors are per-MMSI implausible jumps, multi-vessel convergence to one point, placeholder MMSIs and generic labels, and GNSS fix degradation.</desc>
