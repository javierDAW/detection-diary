<rect class="op" x="460" y="295" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="315" r="14"/><text class="badgeText" x="480" y="319">B</text>
<text class="label" x="504" y="319">Broadcast counterfeit signal</text>
<text class="sub" x="470" y="343">Overpower real GNSS in the footprint</text>
<text class="sub" x="470" y="359">Every receiver computes same false PVT</text>
<text class="sub" x="470" y="375">Or jam to deny fix entirely</text>
<text class="sub" x="470" y="391">Footprint can span a large sea area</text>
<text class="mono" x="470" y="421">gps-sdr-sim + SDR (bladeRF/HackRF)</text>
<text class="mono" x="470" y="439">T0815 denial of view</text>

<!-- Right op 3 -->
<rect class="opK" x="460" y="465" width="395" height="155"/>
<circle class="badgeK" cx="480" cy="485" r="14"/><text class="badgeText" x="480" y="489">C</text>
<text class="label" x="504" y="489">Dark-fleet identity manipulation</text>
<text class="sub" x="470" y="513">Falsify MMSI/name/flag to evade sanctions</text>
<text class="sub" x="470" y="529">Fabricate tracks; go dark then re-appear</text>
<text class="sub" x="470" y="545">IFC June 2026: 40 incidents, all false AIS</text>
<text class="sub" x="470" y="561">Choke points: Hormuz, Gulf of Oman</text>
<text class="mono" x="470" y="591">identity laundering on the AIS payload</text>
<text class="mono" x="470" y="609">T0856 spoof reporting message</text>

<!-- Right op 4 -->
<rect class="op" x="460" y="635" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="655" r="14"/><text class="badgeText" x="480" y="659">D</text>
<text class="label" x="504" y="659">AIS / GNSS spoofing tooling</text>
<text class="sub" x="470" y="683">ais-simulator injects fabricated tracks</text>
<text class="sub" x="470" y="699">gr-ais / AIVDM encoders (6-bit)</text>
