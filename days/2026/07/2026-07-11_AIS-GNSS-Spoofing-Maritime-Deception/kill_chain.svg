<text class="sub" x="40" y="500">6-bit NMEA AIVDM over VHF</text>
<text class="mono" x="40" y="526">!AIVDM ... position report</text>
<text class="mono" x="40" y="544">T0856 spoof reporting message</text>

<!-- Left stage 4 -->
<rect class="stageK" x="30" y="570" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="590" r="14"/><text class="badgeText" x="50" y="594">4</text>
<text class="label" x="74" y="594">AIS identity falsification (type 5)</text>
<text class="sub" x="40" y="618">False MMSI / name / flag / ship type</text>
