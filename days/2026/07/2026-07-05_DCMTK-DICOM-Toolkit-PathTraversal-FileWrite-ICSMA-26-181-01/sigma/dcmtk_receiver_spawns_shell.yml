title: DICOM Storage Receiver (DCMTK) Spawns a Command Shell (Post-Exploit RCE)
id: 42cd72bf-dada-498e-a8e5-9aefe371daa8
status: experimental
description: |
  Detects a DICOM storage/query-retrieve receiver spawning an OS command
  interpreter - the execution stage after the OFFIS DCMTK path-traversal
  arbitrary file write (CVE-2026-50003, ICSMA-26-181-01, <= 3.7.0). A crafted
  DICOM object drives the receiver to write a file outside the intended output
  directory (e.g. into a web root or an autostart location); when that file is
  later invoked, or when the receiver is coerced to exec directly, the DICOM
  receiver process becomes the parent of a shell. A storescp / dcmrecv /
  dcmqrscp / movescu process should never spawn cmd/powershell/bash, so such a
  child is high-fidelity evidence of code execution on the imaging host.
references:
  - https://www.cisa.gov/news-events/ics-medical-advisories/icsma-26-181-01
  - https://nvd.nist.gov/vuln/detail/CVE-2026-50003
  - https://attack.mitre.org/techniques/T1190/
author: Jarmi
date: 2026/07/05
tags:
  - attack.execution
  - attack.t1059
  - attack.initial-access
  - attack.t1190
logsource:
  category: process_creation
detection:
  selection_parent:
    ParentImage|endswith:
      - '\storescp.exe'
      - '\dcmrecv.exe'
      - '\dcmqrscp.exe'
      - '\movescu.exe'
      - '\getscu.exe'
      - '/storescp'
      - '/dcmrecv'
      - '/dcmqrscp'
      - '/movescu'
      - '/getscu'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '/bash'
      - '/sh'
      - '/dash'
  condition: selection_parent and selection_child
falsepositives:
  - A DICOM post-processing hook or vendor script that legitimately shells out on
    the imaging host; baseline the expected children of your DICOM receiver <add_known_dicom_children>

level: high
