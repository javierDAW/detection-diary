<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">INC Ransom vs City of Acworth kill chain</title>
<desc id="d">Two-lane kill chain. Left lane (defender view): 1 initial access via group playbook (exploit public-facing app, phishing or valid accounts, not confirmed for Acworth), 2 discovery with AdFind/NETSCAN/Advanced IP Scanner, 3 credential access via esentutl NTDS dump and a Veeam credential dumper, 4 lateral movement via PsExec renamed winupd.exe as a LocalSystem service (critical badge), 5 defense evasion disabling Defender via SystemSettingsAdminFlows.exe, 6 collection and staging with 7-Zip/WinRAR and remote-access tooling, 7 exfiltration and impact via MegaSync then the INC Rust encryptor with VSS deletion, wallpaper defacement and printer ransom notes (critical badge). Right lane (attacker infrastructure): INC Ransom / GOLD IONIC group profile, acquired tooling stack, Tor double-extortion leak site (critical badge), MegaSync exfiltration channel (critical badge), cross-platform Rust encryptor (critical badge), and victimology showing Acworth and Oak Park co-listed in the same spree. Dashed cross-lane arrows connect discovery and credential access to the tooling stack, collection/staging to the encryptor, and exfiltration/impact to the victimology box. Footer notes this documents the group's general playbook, not a confirmed Acworth-specific chain.</desc>
