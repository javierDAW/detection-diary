<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Spirals ransomware kill chain</title>
<desc id="d">Two-lane diagram of the Spirals ransomware intrusion. Left lane, victim-side chronology: IIS web shell initial access, UAC bypass and RDP persistence, SAM and LSASS credential dumping, three redundant tunnels for command and control, WMI then PsExec lateral movement, Defender disablement and a 23-service backup and hypervisor kill, and finally Rust-based encryption with a double-extortion note. Right lane, attacker tooling and infrastructure: web shell staging paths, the tunneling toolkit, a token impersonation tool, PsExec mass-deployment infrastructure using SYSVOL for domain-wide propagation, the Spirals payload itself, and the Tor extortion portal. Detection anchors: the web shell to tunnel-drop window, the WMI-to-PsExec handoff, and the backup-service-stop burst immediately preceding encryption.</desc>
