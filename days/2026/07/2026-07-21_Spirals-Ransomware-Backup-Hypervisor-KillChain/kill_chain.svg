<rect class="footer" x="20" y="1175" width="840" height="95"/>
<text class="footerH" x="35" y="1198">Detection anchor: the backup/hypervisor service-stop burst is the last honest chance to interrupt the chain.</text>
<text class="footerT" x="35" y="1218">Burst kills of 15-23 named backup/DB/virtualization services are rare, predictable, and slow to change across rebrands -</text>
<text class="footerT" x="35" y="1234">detect the behavior (WMI-then-PsExec fan-out, Stop-Service burst), not just today's IOCs from a single n=1 sighting.</text>
<text class="footerT" x="35" y="1250">SYSVOL staging turns AD replication into a self-service propagation channel; recovery validation must sweep it too.</text>
</svg>
