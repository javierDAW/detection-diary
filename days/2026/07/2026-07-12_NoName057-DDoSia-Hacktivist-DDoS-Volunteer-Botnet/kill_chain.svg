<text class="sub" x="470" y="343">Cross-platform Go client (6 targets)</text>
<text class="sub" x="470" y="359">AES-GCM target list to conceal from CTI</text>
<text class="sub" x="470" y="375">Stripped Go build resists decompilation</text>
<text class="sub" x="470" y="391">Frequent rebuilds -> hashes rotate</text>
<text class="mono" x="470" y="421">d_windows_amd64.exe, d_linux_amd64, ...</text>
<text class="mono" x="470" y="439">T1587.001 develop capabilities</text>

<!-- Right op 3 -->
<rect class="op" x="460" y="465" width="395" height="155"/>
<circle class="badgeR" cx="480" cy="485" r="14"/><text class="badgeText" x="480" y="489">C</text>
<text class="label" x="504" y="489">Short-lived tiered C2 infra</text>
<text class="sub" x="470" y="513">Tier-1 public servers answer on port 80</text>
<text class="sub" x="470" y="529">Average lifespan ~9 days, then rotate</text>
<text class="sub" x="470" y="545">nginx/1.18.0 banner; /client/* endpoints</text>
<text class="sub" x="470" y="561">IP allow/deny lists age out by design</text>
<text class="mono" x="470" y="591">pull live C2 from ThreatFox / SEKOIA</text>
<text class="mono" x="470" y="609">T1583.003 acquire VPS infra</text>

