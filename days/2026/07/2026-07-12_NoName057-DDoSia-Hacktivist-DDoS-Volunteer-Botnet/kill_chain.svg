<rect class="stage" x="30" y="1020" width="395" height="135"/>
<circle class="badge" cx="50" cy="1040" r="14"/><text class="badgeText" x="50" y="1044">7</text>
<text class="label" x="74" y="1044">Defender: behavioral detection</text>
<text class="sub" x="40" y="1068">Match /client/* handshake + custom headers</text>
<text class="sub" x="40" y="1084">Kit on disk; host high fan-out; L7 spike</text>
<text class="sub" x="40" y="1100">Pull fresh C2 feed, short TTL blocks</text>
<text class="mono" x="40" y="1126">detect the protocol, not the hash/IP</text>
<text class="mono" x="40" y="1144">Sigma + KQL + YARA + Suricata</text>

