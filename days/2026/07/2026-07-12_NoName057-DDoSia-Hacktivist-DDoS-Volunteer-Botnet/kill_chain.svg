<text class="head" x="20" y="36">NoName057(16) and DDoSia - The Volunteer DDoS Botnet</text>
<text class="meta" x="20" y="58">Source: Sekoia TDR + Recorded Future + CISA AA25-343A - Why today: Palencia arrest 2026-07-07 - Class: hacktivism - Day 76</text>

<rect class="laneL" x="20" y="85" width="410" height="1080"/>
<text class="laneLabelL" x="34" y="104">PARTICIPATION / IMPACT - volunteer, client, victim</text>
<rect class="laneR" x="450" y="85" width="410" height="1080"/>
<text class="laneLabelR" x="464" y="104">OPERATOR SIDE - NoName057(16), C2, recruitment</text>

<!-- Left stage 1 -->
<rect class="stage" x="30" y="120" width="395" height="135"/>
<circle class="badge" cx="50" cy="140" r="14"/><text class="badgeText" x="50" y="144">1</text>
<text class="label" x="74" y="144">Volunteer recruited on Telegram</text>
<text class="sub" x="40" y="168">@DDosiabot registers user, issues identity</text>
<text class="sub" x="40" y="184">TON crypto wallet for proportional rewards</text>
<text class="sub" x="40" y="200">Consenting participant, not a compromise</text>
<text class="mono" x="40" y="226">client_id.txt (bcrypt $2a$16$) + help.txt</text>
<text class="mono" x="40" y="244">T1585.001 establish accounts</text>

<!-- Left stage 2 -->
<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/><text class="badgeText" x="50" y="294">2</text>
<text class="label" x="74" y="294">Download and run the Go client</text>
<text class="sub" x="40" y="318">d.zip = six per-OS clients (win/linux/mac)</text>
<text class="sub" x="40" y="334">client_id.txt placed beside the binary</text>
<text class="sub" x="40" y="350">Runs from a user-writable path, no install</text>
<text class="mono" x="40" y="376">Go-Stresser | PID n | (c) NoName057(16)</text>
<text class="mono" x="40" y="394">T1204.002 user execution</text>

<!-- Left stage 3 -->
<rect class="stage" x="30" y="420" width="395" height="135"/>
<circle class="badge" cx="50" cy="440" r="14"/><text class="badgeText" x="50" y="444">3</text>
<text class="label" x="74" y="444">Authenticate to C2</text>
<text class="sub" x="40" y="468">POST /client/login to a raw IPv4, no DNS</text>
<text class="sub" x="40" y="484">Plain HTTP on TCP 80 (historically)</text>
<text class="sub" x="40" y="500">Headers: User-Hash + Client-Hash</text>
<text class="mono" x="40" y="526">User-Agent: Go-http-client/1.1 -> token</text>
<text class="mono" x="40" y="544">T1071.001 web protocols</text>

<!-- Left stage 4 -->
<rect class="stage" x="30" y="570" width="395" height="135"/>
<circle class="badge" cx="50" cy="590" r="14"/><text class="badgeText" x="50" y="594">4</text>
<text class="label" x="74" y="594">Pull encrypted target list</text>
<text class="sub" x="40" y="618">GET /client/get_targets with Time=token</text>
<text class="sub" x="40" y="634">data field = base64 AES-GCM ciphertext</text>
<text class="sub" x="40" y="650">Key from token + User-Hash (conceals list)</text>
<text class="mono" x="40" y="676">{token, data} -> targets + randoms JSON</text>
<text class="mono" x="40" y="694">T1573.001 symmetric crypto channel</text>

<!-- Left stage 5 -->
<rect class="stageK" x="30" y="720" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="740" r="14"/><text class="badgeText" x="50" y="744">5</text>
<text class="label" x="74" y="744">Distributed Layer-7 flood</text>
<text class="sub" x="40" y="768">Many volunteers hit the same URIs at once</text>
<text class="sub" x="40" y="784">randoms feed cache-busting single-use vals</text>
<text class="sub" x="40" y="800">Expensive login/search paths targeted</text>
<text class="mono" x="40" y="826">body: login=$_1%40gmail.com&amp;password=$-1</text>
<text class="mono" x="40" y="844">T1498.001 direct network flood</text>

<!-- Left stage 6 -->
<rect class="stageK" x="30" y="870" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="890" r="14"/><text class="badgeText" x="50" y="894">6</text>
<text class="label" x="74" y="894">Victim service degraded / offline</text>
<text class="sub" x="40" y="918">Gov ~41%, transport ~12%, media ~10%</text>
<text class="sub" x="40" y="934">2026: UK CNI, Denmark + Greenland</text>
<text class="sub" x="40" y="950">Outage plus the Telegram victory claim</text>
<text class="mono" x="40" y="976">availability impact (verify no 2nd stage)</text>
<text class="mono" x="40" y="994">T1499.002 service exhaustion flood</text>

