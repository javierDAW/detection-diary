<text class="label" x="504" y="149">NoName057(16) operators</text>
<text class="sub" x="470" y="173">Pro-Kremlin nationalist hacktivist group</text>
<text class="sub" x="470" y="189">Self-branding, publicity-driven claims</text>
<text class="sub" x="470" y="205">Overlaps CARR / Z-Pentest personas</text>
<text class="sub" x="470" y="221">Attribution high; individual volunteers low</text>
<text class="mono" x="470" y="251">Russia-nexus; Telegram front + crypto</text>
<text class="mono" x="470" y="269">runs the DDoSia project</text>

