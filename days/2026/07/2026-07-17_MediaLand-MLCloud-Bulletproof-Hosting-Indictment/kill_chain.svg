<rect class="band" x="20" y="1005" width="840" height="160"/>
<text class="label" x="30" y="1029">Impact and Outcome</text>
<text class="sub" x="30" y="1055">Victims documented across 21 US states plus Australia, the EU, the UAE, Canada and the UK; $62M+ in confirmed losses.</text>
<text class="sub" x="30" y="1077">None of the three defendants face near-term US extradition - Russia does not extradite nationals - so disruption here</text>
<text class="sub" x="30" y="1099">means degraded, not eliminated, infrastructure until peering partners cut transit.</text>
<text class="sub" x="30" y="1121">Genealogy: second primary in CTI-tradecraft slot #24, after Operation Saffron / First VPN Service (Day 22); part of the</text>
<text class="sub" x="30" y="1143">broader Aeza Group / ZServers bulletproof-hosting sanctions wave.</text>

<rect class="footer" x="20" y="1185" width="840" height="185"/>
<text class="footerH" x="30" y="1207">Pedagogical takeaway</text>
<text class="footerT" x="30" y="1227">ASN-level blocking beats IP-level blocking here: BPH tenants assume single IPs burn fast, so IP-only defense stays</text>
<text class="footerT" x="30" y="1245">structurally behind the threat.</text>
<text class="footerT" x="30" y="1263">Sanctions, indictments and actual outages are three different timelines - track peering/transit relationships, not</text>
<text class="footerT" x="30" y="1281">just ASN ownership, to know if disrupted infrastructure is really dark.</text>
<text class="footerT" x="30" y="1299">A hosting provider's own leaked ledger is a durable CTI asset that re-contextualizes years of orphaned IOCs across</text>
<text class="footerT" x="30" y="1317">unrelated cybercrime investigations.</text>
<text class="footerT" x="30" y="1335">Case detail: days/2026/07/2026-07-17_MediaLand-MLCloud-Bulletproof-Hosting-Indictment/README.md</text>
