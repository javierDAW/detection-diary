<text class="head" x="20" y="36">Media Land / ML.Cloud Bulletproof Hosting Indictment</text>
<text class="meta" x="20" y="58">Vendor: DOJ / OFAC / Recorded Future / Prodaft / Silent Push - Date: 2026-07-14 to 2026-07-17 - Cluster: Media Land LLC / ML.Cloud LLC - Day 81</text>

<rect class="laneL" x="20" y="85" width="410" height="900"/>
<rect class="laneR" x="450" y="85" width="410" height="900"/>
<text class="laneLabelL" x="30" y="97">MEDIA LAND / ML.CLOUD BUILDUP</text>
<text class="laneLabelR" x="460" y="97">CTI ATTRIBUTION AND LE DISRUPTION</text>

<rect class="stage" x="30" y="100" width="395" height="130"/>
<circle class="badge" cx="50" cy="120" r="14"/>
<text class="badgeText" x="50" y="124">1</text>
<text class="label" x="70" y="124">BPH Platform Stood Up (~2015-2016)</text>
<text class="sub" x="40" y="148">Media Land LLC registers AS206728, RIPE-</text>
<text class="sub" x="40" y="164">allocated 2016-11-17; VPS/KVM + dedicated-</text>
<text class="sub" x="40" y="180">server rental sold on RU-language forums</text>
<text class="mono" x="40" y="206">AS206728 45.141.85.0/24 91.220.163.0/24</text>
<text class="mono" x="40" y="220">~385 domains / ~512 IPv4 (takedown-era)</text>

<rect class="stage" x="30" y="245" width="395" height="130"/>
<circle class="badge" cx="50" cy="265" r="14"/>
<text class="badgeText" x="50" y="269">2</text>
<text class="label" x="70" y="269">Fraudulent Domains + Fast-Flux DNS</text>
<text class="sub" x="40" y="293">ML.Cloud fronts customer domains; 3-4 A</text>
<text class="sub" x="40" y="309">records, ~600s TTL, chained reverse-proxy</text>
<text class="sub" x="40" y="325">layers obscure the real backend server</text>
<text class="mono" x="40" y="351">T1583.001 T1568.001</text>
<text class="mono" x="40" y="365">JARM/cert overlap observed Sep-Nov 2024</text>

<rect class="stage" x="30" y="390" width="395" height="130"/>
<circle class="badge" cx="50" cy="410" r="14"/>
<text class="badgeText" x="50" y="414">3</text>
<text class="label" x="70" y="414">Criminal Marketplace + Malware Hosting</text>
<text class="sub" x="40" y="438">8+ carding markets (Briansclub, Bidencash</text>
<text class="sub" x="40" y="454">and others), ransomware leak sites, phish</text>
<text class="sub" x="40" y="470">kits, exfil drops, code-signing servers</text>
<text class="mono" x="40" y="496">T1071.001 T1608.001</text>
<text class="mono" x="40" y="510">Source: DOJ indictment / Apr-2025 leak</text>

<rect class="stage" x="30" y="535" width="395" height="130"/>
<circle class="badge" cx="50" cy="555" r="14"/>
<text class="badgeText" x="50" y="559">4</text>
<text class="label" x="70" y="559">Ransomware Affiliate Onboarding</text>
<text class="sub" x="40" y="583">17+ groups rent Media Land/ML.Cloud infra</text>
<text class="sub" x="40" y="599">for C2, leak sites and DDoS, incl. LockBit</text>
<text class="sub" x="40" y="615">BlackSuit, Play and Cl0p</text>
<text class="mono" x="40" y="641">T1090.002</text>
<text class="mono" x="40" y="655">OFAC designation 2025-11-19</text>

<rect class="stage" x="30" y="680" width="395" height="130"/>
<circle class="badge" cx="50" cy="700" r="14"/>
<text class="badgeText" x="50" y="704">5</text>
<text class="label" x="70" y="704">DDoS Against US Critical Infrastructure</text>
<text class="sub" x="40" y="728">Media Land infra used to launch DDoS on</text>
<text class="sub" x="40" y="744">US companies incl. telecom systems, per</text>
<text class="sub" x="40" y="760">original Treasury sanctions rationale</text>
<text class="mono" x="40" y="786">Source: OFAC press release 2025-11-19</text>

<rect class="stageK" x="30" y="825" width="395" height="130"/>
<circle class="badgeK" cx="50" cy="845" r="14"/>
<text class="badgeText" x="50" y="849">6</text>
<text class="label" x="70" y="849">Internal Breach Exposes Customer Ledger</text>
<text class="sub" x="40" y="873">Apr 2025: unknown actor leaks Media Land's</text>
<text class="sub" x="40" y="889">own customer/payment records; Prodaft ties</text>
<text class="sub" x="40" y="905">intruder to the BlackBasta chat-leak actor</text>
<text class="mono" x="40" y="931">Source: Risky.Biz / Prodaft, Apr 2025</text>

<rect class="op" x="460" y="100" width="395" height="160"/>
<circle class="badge" cx="480" cy="120" r="14"/>
<text class="badgeText" x="480" y="124">A</text>
<text class="label" x="500" y="124">Recorded Future / Prodaft Attribution</text>
<text class="sub" x="470" y="148">Allan Liska (Recorded Future) traces infra</text>
<text class="sub" x="470" y="164">activity to at least 2015; Prodaft links</text>
<text class="sub" x="470" y="180">the Apr-2025 leak to the BlackBasta leaker</text>
<text class="sub" x="470" y="196">10-year telemetry underwrites attribution</text>
<text class="mono" x="470" y="226">Source: CyberScoop 2025-11-19</text>

<rect class="op" x="460" y="275" width="395" height="160"/>
<circle class="badgeR" cx="480" cy="295" r="14"/>
<text class="badgeText" x="480" y="299">B</text>
<text class="label" x="500" y="299">Five Eyes + NL Sanctions (19 Nov 2025)</text>
<text class="sub" x="470" y="323">Treasury/OFAC, UK, Australia sanction</text>
<text class="sub" x="470" y="339">Volosovik, Pankova, Zatolokin + 4 entities</text>
<text class="sub" x="470" y="355">CISA/NSA/FBI publish joint BPH mitigation</text>
<text class="sub" x="470" y="371">guide same day (ASN-level blocking urged)</text>
<text class="mono" x="470" y="401">Source: CISA/OFAC 2025-11-19</text>

<rect class="op" x="460" y="450" width="395" height="160"/>
<circle class="badge" cx="480" cy="470" r="14"/>
<text class="badgeText" x="480" y="474">C</text>
<text class="label" x="500" y="474">ASN / Peering-Partner Pressure Mapping</text>
<text class="sub" x="470" y="498">Silent Push (Zach Edwards) identifies JSC</text>
<text class="sub" x="470" y="514">RetnNet (RU) and RETN Limited (UK) as the</text>
<text class="sub" x="470" y="530">peering partners keeping Media Land routed</text>
<text class="sub" x="470" y="546">sanctions alone did not force an outage</text>
<text class="mono" x="470" y="576">Source: CyberScoop 2025-11-19</text>

<rect class="opK" x="460" y="625" width="395" height="160"/>
<circle class="badgeK" cx="480" cy="645" r="14"/>
<text class="badgeText" x="480" y="649">D</text>
<text class="label" x="500" y="649">DOJ Indictment Unsealed (14 Jul 2026)</text>
<text class="sub" x="470" y="673">2024 indictment vs Volosovik, Pankova,</text>
<text class="sub" x="470" y="689">Zatolokin unsealed in N.D. Ohio; conspiracy</text>
<text class="sub" x="470" y="705">wire fraud and money-laundering charges;</text>
<text class="sub" x="470" y="721">$62M+ losses across 21 US states + intl</text>
<text class="mono" x="470" y="751">Source: DOJ USAO N.D. Ohio, 2026-07-14</text>

<rect class="op" x="460" y="800" width="395" height="160"/>
<circle class="badgeR" cx="480" cy="820" r="14"/>
<text class="badgeText" x="480" y="824">E</text>
<text class="label" x="500" y="824">Reward + Joint EU/UK Sanctions (Jul 2026)</text>
<text class="sub" x="470" y="848">State Dept Rewards for Justice: up to $10M</text>
<text class="sub" x="470" y="864">for info on gov-linked associates; EU</text>
<text class="sub" x="470" y="880">Council + UK issue first joint cyber</text>
<text class="sub" x="470" y="896">sanctions package against Russia</text>
<text class="mono" x="470" y="926">Source: RFJ / EU Council, Jul 2026</text>

