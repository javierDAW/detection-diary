<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">OceanLotus SPECTRALVIPER FireAnt supply-chain kill chain</title>
<desc id="d">Two-lane kill chain. Left lane (victim endpoint): FireAnt MetaKit pulls an update over cleartext HTTP with no integrity check; a malicious setup.exe served from the compromised update server runs as a trusted update (critical) and delivers an obfuscated SPECTRALVIPER downloader that profiles the host and pulls the next stage via the V1/Update/GetUpdate API; a renamed signed binary (IntelAudioService.exe, a copy of dtlupdate.exe) side-loads the SPECTRALVIPER loader DtlCrashCatch.dll (critical); the loader injects the backdoor into OneDrive.Sync.Service.exe; the implant beacons over HTTPS to a hardcoded URL hiding encrypted host data in an HTTP Cookie header prefixed zd_cs_pm or euconsent-v2; and one instance orchestrates peers over named pipes and exfiltrates over C2. Right lane (OceanLotus infrastructure and SPECTRALVIPER): the compromised FireAnt update server is the supply-chain delivery point (critical), staging servers migrate from Akamai to Leaseweb Singapore, per-campaign C2 domains are crafted to blend with victim traffic, the SPECTRALVIPER XGU framework provides loader plus backdoor with RTTI exposed by an OPSEC lapse, named-pipe orchestration enables lateral movement, and exfiltration reflects a strategic shift to domestic Vietnamese espionage. Detection anchors are the malicious update on the right and the signed-binary side-load on the left.</desc>
