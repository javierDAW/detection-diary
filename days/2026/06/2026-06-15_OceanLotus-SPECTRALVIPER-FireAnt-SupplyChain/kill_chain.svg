<rect class="footer" x="20" y="1175" width="840" height="95"/>
<text class="footerH" x="34" y="1200">Why it matters</text>
<text class="footerT" x="34" y="1222">OceanLotus needs no stolen cert: it renames genuinely-signed binaries and lets them side-load the malware.</text>
<text class="footerT" x="34" y="1240">Durable tells are behavioural - signed host + unsigned DLL, OneDrive egress to non-Microsoft hosts, the Cookie beacon.</text>
<text class="footerT" x="34" y="1258">Update integrity is a supply-chain control: no signature + cleartext HTTP turned a market-data updater into delivery.</text>
