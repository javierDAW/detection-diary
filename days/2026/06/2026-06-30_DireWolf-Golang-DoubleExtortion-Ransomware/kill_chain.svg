<circle class="badgeK" cx="50" cy="590" r="14"/><text class="badgeText" x="50" y="594">4</text>
<text class="label" x="74" y="594">Inhibit recovery (critical)</text>
<text class="sub" x="40" y="618">vssadmin delete shadows /all /quiet</text>
