<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Dire Wolf ransomware kill chain</title>
<desc id="d">Two-lane diagram. Left lane (victim Windows host): suspected initial access via VPN exploit, stolen accounts, infostealer logs or phishing; the Global direwolfAppMutex mutex plus C runfinish.exe marker execution guardrail; termination of backup, database and security services and processes; the critical pre-encryption recovery-inhibition burst with vssadmin, wbadmin and bcdedit; event-log destruction via a WMI-driven eventlog kill loop and wevtutil cl; critical Curve25519 plus ChaCha20 encryption appending the .direwolf extension and dropping HowToRecoveryFiles.txt; and the forced reboot with self-delete finale. Right lane (operator build and extortion machinery): the Go UPX build with an 8x CPU worker pool, the backup and security kill lists, the recovery-denial command set, the Tor leak site and qTox negotiation, the tor-browser.io social-engineering infrastructure, and victimology and attribution. Detection anchors: the recovery-inhibition burst, the eventlog kill loop, and the runfinish.exe marker plus forced reboot and self-delete chain, all host-behavioral and surviving hash and onion rotation.</desc>
