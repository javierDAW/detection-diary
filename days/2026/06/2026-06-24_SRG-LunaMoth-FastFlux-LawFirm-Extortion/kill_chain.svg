<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">SRG / Luna Moth Fast Flux kill chain</title>
  <desc id="d">Two-lane kill chain. Left lane (victim side): phishing email and vishing call, RMM tool installation, remote access established, internal recon and lateral movement, bulk data collection, exfiltration within 30 min, and extortion email delivery. Right lane (attacker infrastructure): phishing and vishing script delivery, RMM callback via fast flux C2, fast flux DNS botnet across 22 ISPs, C2 monitoring session, exfil collection server, and public leak site business-data-leaks.com. Cross-lane arrows mark RMM callback to fast flux C2 (detection anchor: DNS TTL anomaly) and extortion delivery linking to leak domain.</desc>
