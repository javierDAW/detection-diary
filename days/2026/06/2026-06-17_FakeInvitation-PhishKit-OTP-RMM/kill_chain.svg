</defs>
  <rect class="bg" x="0" y="0" width="880" height="1280"/>
  <rect class="acc-identity-cloud" x="0" y="0" width="880" height="8"/>
  <text class="head" x="20" y="36">Fake event-invitation phish kit: credential + OTP harvest and RMM delivery</text>
  <text class="meta" x="20" y="58">Vendor: ANY.RUN / GBHackers - Date: 2026-05-05 - Cluster: unattributed phish-kit operator - Day 51</text>

