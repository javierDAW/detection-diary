<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">Fake event-invitation phish kit kill chain</title>
  <desc id="d">Two-lane diagram. Left lane is the victim path: a fake event-invitation link, a Cloudflare CAPTCHA gate used for sandbox evasion, the invitation page branch point, credential capture via processmail.php, OTP interception via process.php, an alternate branch that auto-downloads a legitimate RMM agent, and the outcome of mailbox takeover or remote foothold. Right lane is the operator and infrastructure: roughly 80 rotating .de lure domains since December 2025, a reusable kit with operator edit notes and AI-assisted generation, the static brand-icon set served from /Image/ with fixed SHA-256 hashes, the non-Google backend, the Google backend with a Telegram relay, and the legitimate RMM relay. Red badges mark the two irreversible-loss stages: OTP interception and the RMM foothold. Durable detection anchors are the fixed request chain favicon.ico to blocked.html to Image png, the icon hashes, the PHP endpoints, and RMM agents outside the sanctioned baseline.</desc>
  <defs>
