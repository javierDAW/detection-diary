  <!-- footer -->
  <rect class="footer" x="20" y="1175" width="840" height="95"/>
  <text class="footerH" x="34" y="1200">Durable detection anchors (survive domain rotation)</text>
  <text class="footerT" x="34" y="1222">Request chain: GET / -> /favicon.ico -> /blocked.html -> /&lt;pattern&gt;/Image/*.png   |   Backend endpoints: processmail.php, process.php, pass.php, mlog.php, check_telegram_updates.php</text>
  <text class="footerT" x="34" y="1240">Static icon SHA-256s (office360/yahoo/aol/google/email)   |   RMM agents outside the sanctioned baseline from a browser download path</text>
  <text class="footerT" x="34" y="1258">Containment: revoke sessions + re-MFA (reset alone fails after OTP theft); RMM allowlist; proxy-block the URI chain; move users to FIDO2 / passkeys</text>
