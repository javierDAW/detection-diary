  <circle class="badge" cx="50" cy="140" r="14"/>
  <text class="badgeText" x="50" y="144">1</text>
  <text class="label" x="74" y="144">Lure: fake event invitation</text>
  <text class="sub" x="44" y="168">Spearphishing link to an invitation page</text>
  <text class="sub" x="44" y="184">Event / party / RSVP brand impersonation</text>
  <text class="sub" x="44" y="200">~80 rotating domains, mostly .de</text>
  <text class="mono" x="44" y="226">T1566.002  T1656  T1583.001</text>
  <text class="mono" x="44" y="244">getceptionparty[.]de  festiveparty[.]us</text>

  <!-- LEFT STAGE 2 -->
  <rect class="stage" x="30" y="270" width="395" height="135"/>
  <circle class="badge" cx="50" cy="290" r="14"/>
  <text class="badgeText" x="50" y="294">2</text>
  <text class="label" x="74" y="294">CAPTCHA gate (Cloudflare)</text>
  <text class="sub" x="44" y="318">Turnstile check before the lure renders</text>
  <text class="sub" x="44" y="334">Filters sandboxes and crawlers</text>
  <text class="sub" x="44" y="350">A CAPTCHA at the door = evasion, not trust</text>
  <text class="mono" x="44" y="376">T1497.001  sandbox evasion</text>
  <text class="mono" x="44" y="394">chain: / -> /favicon.ico -> /blocked.html</text>

  <!-- LEFT STAGE 3 -->
  <rect class="stage" x="30" y="420" width="395" height="135"/>
  <circle class="badge" cx="50" cy="440" r="14"/>
  <text class="badgeText" x="50" y="444">3</text>
  <text class="label" x="74" y="444">Invitation page -> branch</text>
  <text class="sub" x="44" y="468">User picks a webmail provider to sign in</text>
  <text class="sub" x="44" y="484">Icons load from a fixed /Image/ path</text>
