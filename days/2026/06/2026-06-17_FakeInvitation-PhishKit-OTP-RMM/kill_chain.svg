  <text class="sub" x="474" y="715">Same form across every lure host</text>
  <text class="sub" x="474" y="731">High-fidelity, rotation-proof anchor</text>
  <text class="mono" x="474" y="761">POST /processmail.php  -> creds</text>
  <text class="mono" x="474" y="779">POST /process.php       -> OTP</text>

  <!-- RIGHT OP 5 (K) -->
