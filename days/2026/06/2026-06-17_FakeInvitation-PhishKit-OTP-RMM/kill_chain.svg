  <text class="mono" x="44" y="526">T1204.001  user execution (link)</text>
  <text class="mono" x="44" y="544">/Image/office360.png (static SHA-256)</text>

  <!-- LEFT STAGE 4 (K) -->
  <rect class="stageK" x="30" y="570" width="395" height="135"/>
  <circle class="badge" cx="50" cy="590" r="14"/>
  <text class="badgeText" x="50" y="594">4</text>
  <text class="label" x="74" y="594">Credential capture</text>
  <text class="sub" x="44" y="618">Email + password POSTed to backend</text>
  <text class="sub" x="44" y="634">Fake "Incorrect Password" grabs 2nd try</text>
  <text class="sub" x="44" y="650">Google flow splits login / password</text>
  <text class="mono" x="44" y="676">T1598.003   POST /processmail.php</text>
  <text class="mono" x="44" y="694">Google: POST /pass.php  /mlog.php</text>

  <!-- LEFT STAGE 5 (K) -->
  <rect class="stageK" x="30" y="720" width="395" height="135"/>
  <circle class="badgeK" cx="50" cy="740" r="14"/>
  <text class="badgeText" x="50" y="744">5</text>
  <text class="label" x="74" y="744">OTP interception</text>
  <text class="sub" x="44" y="768">Second factor captured in real time</text>
  <text class="sub" x="44" y="784">Turns phishing into live account takeover</text>
  <text class="sub" x="44" y="800">Password reset alone does not contain it</text>
  <text class="mono" x="44" y="826">T1111   POST /process.php</text>
  <text class="mono" x="44" y="844">relay: /check_telegram_updates.php</text>

  <!-- LEFT STAGE 6 -->
  <rect class="stage" x="30" y="870" width="395" height="135"/>
  <circle class="badge" cx="50" cy="890" r="14"/>
  <text class="badgeText" x="50" y="894">6</text>
  <text class="label" x="74" y="894">Alt branch: RMM delivery</text>
  <text class="sub" x="44" y="918">Auto-download or one-click of an agent</text>
  <text class="sub" x="44" y="934">Legitimate signed RMM, rarely AV-flagged</text>
  <text class="sub" x="44" y="950">Lands from a browser download path</text>
  <text class="mono" x="44" y="976">T1204.002  T1219  remote access tool</text>
  <text class="mono" x="44" y="994">ScreenConnect / LogMeIn / ITarian / Datto</text>

  <!-- LEFT STAGE 7 (K) -->
  <rect class="stageK" x="30" y="1020" width="395" height="135"/>
  <circle class="badgeK" cx="50" cy="1040" r="14"/>
  <text class="badgeText" x="50" y="1044">7</text>
  <text class="label" x="74" y="1044">Outcome: takeover / foothold</text>
  <text class="sub" x="44" y="1068">Mailbox access + OTP = BEC feedstock</text>
  <text class="sub" x="44" y="1084">Or persistent remote access to the host</text>
  <text class="sub" x="44" y="1100">Inbox rules / OAuth grants for persistence</text>
  <text class="mono" x="44" y="1126">T1078  valid accounts (downstream)</text>
  <text class="mono" x="44" y="1144">revoke sessions, re-MFA, move to passkeys</text>

  <!-- RIGHT OP 1 -->
  <rect class="op" x="460" y="125" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="145" r="14"/>
  <text class="badgeText" x="480" y="149">A</text>
  <text class="label" x="504" y="149">Phish-kit infrastructure</text>
  <text class="sub" x="474" y="173">~80 lure domains, ~160 links tracked</text>
  <text class="sub" x="474" y="189">Mostly .de TLD, registered from Dec 2025</text>
  <text class="sub" x="474" y="205">Continuous domain rotation</text>
  <text class="sub" x="474" y="221">Domains are weak IOCs; hunt structure</text>
  <text class="mono" x="474" y="251">TI query: /blocked.html + /favicon.ico</text>
  <text class="mono" x="474" y="269">+ /Image/*.png</text>

  <!-- RIGHT OP 2 -->
  <rect class="op" x="460" y="295" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="315" r="14"/>
  <text class="badgeText" x="480" y="319">B</text>
  <text class="label" x="504" y="319">Reusable kit framework</text>
  <text class="sub" x="474" y="343">One framework mass-produces lure sites</text>
  <text class="sub" x="474" y="359">Embedded operator edit instructions</text>
  <text class="sub" x="474" y="375">Signs of AI-assisted page generation</text>
  <text class="sub" x="474" y="391">Front-end rotates; backend stays fixed</text>
  <text class="mono" x="474" y="421">T1583.001  resource development</text>
  <text class="mono" x="474" y="439">#18 AI-assisted lure generation</text>

  <!-- RIGHT OP 3 -->
  <rect class="op" x="460" y="465" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="485" r="14"/>
  <text class="badgeText" x="480" y="489">C</text>
  <text class="label" x="504" y="489">Static brand-icon set</text>
  <text class="sub" x="474" y="513">office360 / office / yahoo / google</text>
  <text class="sub" x="474" y="529">aol / email PNGs from /Image/</text>
  <text class="sub" x="474" y="545">Stable SHA-256 across the campaign</text>
  <text class="sub" x="474" y="561">Durable IOC despite domain rotation</text>
  <text class="mono" x="474" y="591">office360.png 887bc414...d65c5c74</text>
  <text class="mono" x="474" y="609">google.png   a838f995...0d30ed82</text>

  <!-- RIGHT OP 4 -->
  <rect class="op" x="460" y="635" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="655" r="14"/>
  <text class="badgeText" x="480" y="659">D</text>
  <text class="label" x="504" y="659">Non-Google backend</text>
