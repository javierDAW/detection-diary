  <text class="sub" x="474" y="1055">Hunt agents outside the RMM baseline</text>
  <text class="sub" x="474" y="1071">Foothold survives credential resets</text>
  <text class="mono" x="474" y="1101">T1219  ScreenConnect / ConnectWise</text>
  <text class="mono" x="474" y="1119">LogMeIn Rescue / ITarian / Datto RMM</text>

