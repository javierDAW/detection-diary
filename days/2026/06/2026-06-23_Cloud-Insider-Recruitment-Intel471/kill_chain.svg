<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">Cloud Insider Recruitment kill chain — Day 57</title>
  <desc id="d">Two-lane kill chain. Left lane (victim): negligent insider stealer infection, manipulated insider AiTM session theft, malicious insider recruitment (red), valid session entry, bulk SaaS collection (red), exfiltration to attacker cloud, ransom/extortion (red). Right lane (attacker): stealer MaaS, AiTM kit market, underground forum (red), stealer log IAB, attacker cloud staging, ransomware affiliate (red). Detection anchors: AiTM token replay on dual-IP MFA and bulk CloudAppEvents download spike.</desc>
