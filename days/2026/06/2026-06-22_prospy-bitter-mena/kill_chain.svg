<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
  <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
</marker>
</defs>
  <!-- Background -->
  <rect class="bg" x="0" y="0" width="880" height="1280"/>
  <!-- Header -->
  <text class="head" x="20" y="36">ProSpy / BITTER: Hack-for-Hire Android Spyware — MENA Civil Society</text>
  <text class="meta" x="20" y="58">Vendor: Lookout + Access Now · Date: 2026-04-08 · Cluster: BITTER / T-APT-17 · Day 56</text>
  <!-- Left lane -->
  <rect class="laneL" x="20" y="85" width="410" height="1080"/>
  <text class="laneLabelL" x="30" y="106">VICTIM / DEVICE PATH</text>
  <!-- Right lane -->
  <rect class="laneR" x="450" y="85" width="410" height="1080"/>
  <text class="laneLabelR" x="460" y="106">ATTACKER INFRASTRUCTURE</text>

  <!-- STAGE 1: Spearphishing delivery (left, y=120) -->
  <rect class="stage" x="30" y="120" width="395" height="135"/>
  <circle class="badge" cx="50" cy="140" r="14"/>
  <text class="badgeText" x="50" y="145">1</text>
  <text class="label" x="72" y="144">Initial Access — Spearphishing (T1566.002)</text>
  <text class="sub" x="30" y="168">Sockpuppet LinkedIn / iMessage "Apple Support" persona</text>
  <text class="sub" x="30" y="184">contacts target; personalized lure (job offer / video call)</text>
  <text class="sub" x="30" y="200">iOS: fake iCloud page or Signal QR link-device phish</text>
  <text class="mono" x="30" y="226">join-secure-call[.]ai-ae[.]io</text>
  <text class="mono" x="30" y="244">totok-pro[.]ai-ae[.]io/ca9bCVSI.php (randomized path)</text>

  <!-- STAGE 2: APK delivery (left, y=270) -->
  <rect class="stage" x="30" y="270" width="395" height="135"/>
  <circle class="badge" cx="50" cy="290" r="14"/>
  <text class="badgeText" x="50" y="295">2</text>
  <text class="label" x="72" y="294">Delivery — APK Side-Load (T1204.002)</text>
  <text class="sub" x="30" y="318">Staging page auto-downloads malicious APK on page load</text>
  <text class="sub" x="30" y="334">Lure: Signal Encryption Plugin / ToTok Pro / Botim Pro</text>
  <text class="sub" x="30" y="350">Package: org.thoghtcrime.securesms / al.totok.chat</text>
  <text class="mono" x="30" y="376">totok-release_v1.9.13.457_signed_14_12_25.apk</text>
  <text class="mono" x="30" y="394">botim-app[.]pro/botim_s_v3.9.2.apk (EN+AR auto-DL)</text>

  <!-- STAGE 3: Execution / Persistence (left, y=420) -->
  <rect class="stage" x="30" y="420" width="395" height="135"/>
  <circle class="badge" cx="50" cy="440" r="14"/>
  <text class="badgeText" x="50" y="445">3</text>
  <text class="label" x="72" y="444">Execution — ProSpy Install + WorkManager Schedule</text>
  <text class="sub" x="30" y="468">Target installs ProSpy Kotlin APK (masquerades as</text>
  <text class="sub" x="30" y="484">trusted messaging app); requests SMS_READ, CONTACTS,</text>
  <text class="sub" x="30" y="500">READ_EXTERNAL_STORAGE, RECORD_AUDIO permissions</text>
  <text class="mono" x="30" y="526">WorkManager periodic interval (~15-60 min)</text>
  <text class="mono" x="30" y="544">Worker classes: ContactsWorker, SmsWorker, DocWorker...</text>

  <!-- STAGE 4: Collection (left, y=570) -->
  <rect class="stageK" x="30" y="570" width="395" height="135"/>
  <circle class="badgeK" cx="50" cy="590" r="14"/>
  <text class="badgeText" x="50" y="595">4</text>
  <text class="label" x="72" y="594">Collection — 10-Worker Data Harvest (T1005)</text>
  <text class="sub" x="30" y="618">Contacts JSON, SMS JSON, documents (doc/pdf/xls/pptx)</text>
  <text class="sub" x="30" y="634">Images, audio, video, archives (.zip/.rar/.7z/.apk/.json)</text>
  <text class="sub" x="30" y="650">BackupWorker targets *backup* and *.ttkmbackup files</text>
  <text class="mono" x="30" y="676">NewFilesWorker: delta exfil of recently modified files</text>
  <text class="mono" x="30" y="694">Commands 0-9 via C2 poll; executed by respective worker</text>

  <!-- STAGE 5: C2 beacon (left, y=720) -->
  <rect class="stageK" x="30" y="720" width="395" height="135"/>
  <circle class="badgeK" cx="50" cy="740" r="14"/>
  <text class="badgeText" x="50" y="745">5</text>
  <text class="label" x="72" y="744">C2 — HTTPS Retrofit /v3/ Beacon (T1071.001)</text>
  <text class="sub" x="30" y="768">Retrofit library: HTTPS POST to /v3/getType polls for</text>
  <text class="sub" x="30" y="784">next command; /v3/setEvent reports errors to operator</text>
  <text class="sub" x="30" y="800">7 known C2 domains; ASN 44901; JARM fingerprint</text>
  <text class="mono" x="30" y="826">POST /v3/getType  HTTP/1.1  Host: sgnlapp[.]info</text>
  <text class="mono" x="30" y="844">POST /v3/contacts  (JSON); POST /v3/images  (binary)</text>

  <!-- STAGE 6: Exfiltration (left, y=870) -->
  <rect class="stageK" x="30" y="870" width="395" height="135"/>
  <circle class="badgeK" cx="50" cy="890" r="14"/>
  <text class="badgeText" x="50" y="895">6</text>
  <text class="label" x="72" y="894">Exfiltration — Typed Endpoints (T1041)</text>
  <text class="sub" x="30" y="918">Binary and JSON data POSTed to typed /v3/ endpoints</text>
  <text class="sub" x="30" y="934">Contacts + SMS: JSON serialized; files: multipart upload</text>
  <text class="sub" x="30" y="950">NewFilesWorker enables incremental delta exfil (low noise)</text>
  <text class="mono" x="30" y="976">Endpoints: /v3/images /v3/videos /v3/docs /v3/audios</text>
  <text class="mono" x="30" y="994">/v3/backup /v3/sms /v3/contacts /v3/others</text>

  <!-- STAGE 7: iOS credential path (left, y=1020) -->
  <rect class="stage" x="30" y="1020" width="395" height="135"/>
  <circle class="badgeR" cx="50" cy="1040" r="14"/>
  <text class="badgeText" x="50" y="1045">7</text>
  <text class="label" x="72" y="1044">iOS Path — AiTM Credential + Signal Hijack (T1056.001)</text>
  <text class="sub" x="30" y="1068">iOS targets: fake iCloud login page (AiTM credential theft)</text>
  <text class="sub" x="30" y="1084">Signal QR link-device phish (Arabic instructions) — attacker</text>
  <text class="sub" x="30" y="1100">mirrors Signal session; reads E2EE messages in real-time</text>
  <text class="mono" x="30" y="1126">Adapted from Russian APT Signal device-link technique</text>
  <text class="mono" x="30" y="1144">(Google TAG 2025); shows rapid tradecraft diffusion</text>

  <!-- RIGHT LANE OPS -->

  <!-- OP 1: Sockpuppet accounts (right, y=125) -->
  <rect class="op" x="460" y="125" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="145" r="14"/>
  <text class="badgeText" x="480" y="150">R1</text>
  <text class="label" x="502" y="149">Resource Development (T1585.001)</text>
  <text class="sub" x="460" y="173">Sockpuppet personas on LinkedIn / iMessage posing</text>
  <text class="sub" x="460" y="189">as professionals or Apple Support</text>
  <text class="sub" x="460" y="205">Hundreds of phishing FLDs; subdomains created on demand</text>
  <text class="sub" x="460" y="221">per victim: &lt;service&gt;.&lt;digraph&gt;.&lt;TLD&gt; pattern</text>
  <text class="mono" x="460" y="247">com-ae[.]net (BITTER FLD; Dracarys pivot)</text>
  <text class="mono" x="460" y="265">ai-ae[.]io (staging FLD); JARM: 15d3...b9b ASN44901</text>

  <!-- OP 2: Staging sites (right, y=295) -->
  <rect class="op" x="460" y="295" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="315" r="14"/>
  <text class="badgeText" x="480" y="320">R2</text>
  <text class="label" x="502" y="319">Staging / Distribution Infrastructure</text>
  <text class="sub" x="460" y="343">Single-page APK distribution sites (EN + AR); auto-DL</text>
  <text class="sub" x="460" y="359">Randomized PHP path hides real staging host URL</text>
  <text class="sub" x="460" y="375">Operated since 2022+; domains rotate regularly</text>
  <text class="sub" x="460" y="391">botim-app[.]pro / totok-pro[.]ai-ae[.]io</text>
  <text class="mono" x="460" y="417">encryption-plug-in-signal[.]com-ae[.]net</text>
  <text class="mono" x="460" y="435">join-secure-call[.]ai-ae[.]io (lure redirect)</text>

  <!-- OP 3: ProSpy build pipeline (right, y=465) -->
  <rect class="op" x="460" y="465" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="485" r="14"/>
  <text class="badgeText" x="480" y="490">R3</text>
  <text class="label" x="502" y="489">ProSpy Malware — Kotlin Build Pipeline</text>
  <text class="sub" x="460" y="513">14 samples in Lookout corpus; Aug 2024 - Mar 2026</text>
  <text class="sub" x="460" y="529">Kotlin successor to Java Dracarys; numbered C2 cmds</text>
  <text class="sub" x="460" y="545">Worker class names mirror Dracarys task architecture</text>
  <text class="sub" x="460" y="561">ESET Oct 2025: ToSpy variant; UAE targeting confirmed</text>
  <text class="mono" x="460" y="587">Latest: 92dd37a7... Botim Pro (2026-03-15)</text>
  <text class="mono" x="460" y="605">Packages: com.chatbot.botim / org.thoghtcrime.securesms</text>

  <!-- OP 4: C2 fleet (right, y=635) -->
  <rect class="opK" x="460" y="635" width="395" height="155"/>
  <circle class="badgeK" cx="480" cy="655" r="14"/>
  <text class="badgeText" x="480" y="660">R4</text>
  <text class="label" x="502" y="659">C2 Fleet — 7 Servers, ASN 44901 (T1583.001)</text>
  <text class="sub" x="460" y="683">All C2 on ASN 44901; JARM fingerprint consistent</text>
  <text class="sub" x="460" y="699">403 Forbidden response + Content-Length: 318 signature</text>
  <text class="sub" x="460" y="715">FOFA query links com-ae.net to Dracarys C2 (2022)</text>
  <text class="sub" x="460" y="731">sgnlapp[.]info / treasuresland[.]cc / relaxmode[.]org</text>
  <text class="mono" x="460" y="757">track-portal[.]co / totokapp[.]info / regularsports[.]org</text>
  <text class="mono" x="460" y="775">JARM: 15d3fd16d29d29d00042d43d0000001ae080241...</text>

  <!-- OP 5: Attribution chain (right, y=805) -->
  <rect class="op" x="460" y="805" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="825" r="14"/>
  <text class="badgeText" x="480" y="830">R5</text>
  <text class="label" x="502" y="829">Attribution — BITTER / T-APT-17 Nexus (Medium)</text>
  <text class="sub" x="460" y="853">Infrastructure pivot: com-ae.net JARM links to Dracarys</text>
  <text class="sub" x="460" y="869">Code: numbered C2 cmds + worker logic = Dracarys lineage</text>
  <text class="sub" x="460" y="885">Lure pattern ("pro"/"premium") mirrors BitterDawn (2020)</text>
  <text class="sub" x="460" y="901">Client: unknown; Egypt govt assessed by Access Now</text>
  <text class="mono" x="460" y="927">BITTER suspected India nexus (Proofpoint / Threatray)</text>
  <text class="mono" x="460" y="945">BitterDawn / Bahamut overlap precedent: 2020 Lookout</text>

  <!-- OP 6: Victimology (right, y=975) -->
  <rect class="op" x="460" y="975" width="395" height="155"/>
  <circle class="badgeR" cx="480" cy="995" r="14"/>
  <text class="badgeText" x="480" y="1000">R6</text>
  <text class="label" x="502" y="999">Victimology — Journalists and Opposition (2022+)</text>
  <text class="sub" x="460" y="1023">Primary: Egyptian journalists (Al-A'sar, Eltantawy)</text>
  <text class="sub" x="460" y="1039">Eltantawy prev. targeted by Predator (Citizen Lab 2023)</text>
  <text class="sub" x="460" y="1055">Lebanese journalist (SMEX 2025); Apple account compromised</text>
  <text class="sub" x="460" y="1071">Phishing lures: Bahrain MoFA, Egypt MoF, Bahrain BDF</text>
  <text class="mono" x="460" y="1097">Geo: Egypt, Lebanon, Bahrain, UAE, Saudi Arabia, UK</text>
  <text class="mono" x="460" y="1115">Sectors: civil society, media, NGO, govt (assessed)</text>

