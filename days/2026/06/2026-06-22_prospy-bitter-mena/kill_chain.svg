<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">ProSpy/BITTER hack-for-hire kill chain — MENA civil society targeting</title>
  <desc id="d">Two-lane kill chain: left lane shows victim attack path from spearphishing through ProSpy Android installation, data collection, and C2 exfiltration; right lane shows attacker infrastructure including sockpuppet personas, phishing domain fleet, staging sites, and seven C2 servers on ASN 44901. Detection anchors: side-load APK event and HTTPS POST to /v3/ endpoint pattern.</desc>
  <defs>
<style><![CDATA[
