  .mono { fill: #c0d0e0; }
  .laneL { fill: #182230; stroke: #7aa6d0; }
  .laneR { fill: #2a2418; stroke: #d09a5a; }
  .laneLabelL { fill: #a8c6e2; }
  .laneLabelR { fill: #e2bf8a; }
  .stage { fill: #1c2530; stroke: #7aa6d0; }
  .stageK { fill: #3a1818; stroke: #e06060; }
  .op { fill: #2a2418; stroke: #d09a5a; }
  .opK { fill: #3a1818; stroke: #e06060; }
  .band { fill: #2a2418; stroke: #d09a5a; }
  .badge { fill: #7aa6d0; }
  .badgeK { fill: #e06060; }
  .badgeR { fill: #d09a5a; }
  .badgeText { fill: #0d1117; }
  .footer { fill: #1a1d22; stroke: #555; }
