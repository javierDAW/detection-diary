  <!-- Footer -->
  <rect class="footer" x="20" y="1175" width="840" height="95"/>
  <text class="footerH" x="30" y="1196">Detection Anchors</text>
  <text class="footerT" x="30" y="1213">1. APK side-load: MDM policy violation + package name match (org.thoghtcrime.securesms / al.totok.chat / com.chatbot.botim)</text>
  <text class="footerT" x="30" y="1229">2. Network: DNS to C2 domains (sgnlapp.info, treasuresland.cc, regularsports.org + 4 others) or HTTPS POST to /v3/ endpoint</text>
  <text class="footerT" x="30" y="1245">3. Infrastructure: ASN 44901 + JARM 15d3fd16d29d29d00042d43d0000001ae0802418786940cae38f1d9eed5b9b pivot (Hunt H1)</text>
  <text class="footerT" x="30" y="1261">Rules: Sigma x3 (proxy/dns) | KQL x2 (Defender XDR) | YARA x4 (APK) | Suricata x10 sids | PEAK hunts H1/H2/H3</text>
