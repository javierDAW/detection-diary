.sub { font: 11px sans-serif; fill: #303030; }
.mono { font: 10.5px ui-monospace, "SFMono-Regular", Consolas, monospace; fill: #303030; }
.footer { fill: #f6f6f4; stroke: #888; stroke-width: 1; }
.footerH { font: 700 12px sans-serif; fill: #1a1a1a; }
.footerT { font: 10.5px sans-serif; fill: #1a1a1a; }
.arrow { stroke: #2a4a6a; stroke-width: 1.6; fill: none; }
.arrowX { stroke: #7a3a7a; stroke-width: 1.6; fill: none; stroke-dasharray: 5 3; }
.arrowR { stroke: #8a5520; stroke-width: 1.6; fill: none; }

@media (prefers-color-scheme: dark) {
  .bg { fill: #0d1117; }
  .head, .label, .footerH { fill: #f0f0f0; }
