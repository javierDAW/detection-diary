title: Wallet Keystore or Seed File Access by a Non-Wallet Process
id: ff3f9fa6-6731-4996-b5e4-80c570695062
status: experimental
description: |
  Detects a process that is not a known wallet application reading wallet
  key material: Geth-style keystore files (UTC-- / keystore directory),
  wallet.dat, MetaMask extension vault storage, hardware-wallet helper data
  or seed/mnemonic files. In the Humanity Protocol incident the DPRK-linked
  malware copied wallet data and several Gnosis Safe signer private keys from
  a single developer/director laptop; the on-disk key access by the malware
  (not a wallet UI) is the detectable moment before the loss moved on-chain.
  Tune the wallet allow-list to your environment.
references:
  - https://www.ccn.com/education/crypto/humanity-protocol-private-key-hack-36m-h-token-crash/
  - https://attack.mitre.org/techniques/T1552/001/
  - https://attack.mitre.org/techniques/T1555/
author: Jarmi
date: 2026/06/14
modified: 2026/06/14
tags:
  - attack.credential-access
  - attack.t1552.001
  - attack.t1555
logsource:
  category: file_event
  product: windows
detection:
  selection_keystore:
    TargetFilename|contains:
      - '\Ethereum\keystore\'
      - '\UTC--'
      - 'wallet.dat'
      - '\MetaMask\'
      - '\Ledger Live\'
      - '\Exodus\exodus.wallet\'
      - 'mnemonic'
      - 'seed.txt'
  filter_wallet_apps:
    Image|endswith:
      - '\MetaMask.exe'
      - '\Ledger Live.exe'
      - '\Exodus.exe'
      - '\frame.exe'
      - '\Trezor Suite.exe'
  condition: selection_keystore and not filter_wallet_apps
falsepositives:
  - Backup software, EDR/AV file scanners, or developer tooling legitimately reading wallet directories. Add those images to the wallet/allow filter. Browser processes accessing extension storage may need per-environment tuning.
level: high
