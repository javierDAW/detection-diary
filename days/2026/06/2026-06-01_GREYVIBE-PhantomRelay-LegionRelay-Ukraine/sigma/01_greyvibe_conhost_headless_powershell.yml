title: conhost.exe --headless Launching a Scripting Host (GREYVIBE LOLBIN Staple)
id: f51271c8-5c7b-47f8-ab32-426537de7811
status: experimental
description: |
  Detects conhost.exe spawned with the --headless parameter and a PowerShell or
  cmd child on the command line. GREYVIBE (WithSecure, 2026-05-28) repeatedly used
  conhost.exe --headless to launch PowerShell across the PhantomMail, PhantomClick,
  PrincessClub, PhantomRelay and LegionRelay chains, frequently combined with an
  arithmetic + charmap obfuscation routine. conhost --headless is a rarely-benign
  LOLBIN pattern: it runs a console application without a visible window, which the
  actor used to hide PowerShell execution and to relaunch privilege-escalation
  helpers (starter.ps1) from hijacked shortcuts. Tune by baselining legitimate
  conhost --headless callers, which are uncommon outside Windows Terminal internals.
references:
  - https://labs.withsecure.com/publications/greyvibe
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1059/003/
author: Jarmi
date: 2026/06/01
tags:
  - attack.execution
  - attack.t1059.001
  - attack.t1059.003
  - attack.defense-evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection_conhost:
    Image|endswith: '\conhost.exe'
    CommandLine|contains: '--headless'
  selection_script:
    CommandLine|contains:
      - 'powershell'
      - 'pwsh'
      - 'cmd'
  condition: selection_conhost and selection_script
falsepositives:
  - Windows Terminal and some IDE integrations invoke conhost --headless; baseline
    legitimate parent processes and command lines per host <add_known_conhost_callers>

level: high
