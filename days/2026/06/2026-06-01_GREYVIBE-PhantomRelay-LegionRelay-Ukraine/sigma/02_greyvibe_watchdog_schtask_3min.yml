title: Scheduled Task Recurring Every Few Minutes Running a Script From a User-Writable Path
id: a9f582bb-ccc1-4661-93b4-d06420251dc8
status: experimental
description: |
  Detects schtasks.exe creating a task with a sub-five-minute minute-interval
  recurrence whose action executes PowerShell. The GREYVIBE PhantomRelay watchdog
  (WithSecure, 2026-05-28) creates a scheduled task that runs the dropped watchdog
  script one minute after creation and every three minutes thereafter, re-launching
  the RAT if no active C2 session exists. The watchdog script and initial-stage
  PhantomRelay are staged under %PROGRAMDATA% (V1) or %LOCALAPPDATA% (V2). A
  legitimate task almost never re-runs a user-path PowerShell script every 1-3
  minutes, so the short recurrence combined with a scripting host is the anchor.
references:
  - https://labs.withsecure.com/publications/greyvibe
  - https://attack.mitre.org/techniques/T1053/005/
author: Jarmi
date: 2026/06/01
tags:
  - attack.persistence
  - attack.t1053.005
  - attack.execution
logsource:
  category: process_creation
  product: windows
detection:
  selection_schtasks:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|all:
      - '/create'
      - '/sc'
  selection_minute:
    CommandLine|contains:
      - '/sc minute'
      - '/sc MINUTE'
  selection_freq:
    CommandLine|contains:
      - '/mo 1'
      - '/mo 2'
      - '/mo 3'
  selection_script:
    CommandLine|contains:
      - 'powershell'
      - 'pwsh'
      - '.ps1'
  condition: selection_schtasks and selection_minute and selection_freq and selection_script
falsepositives:
  - High-frequency operational tasks (monitoring agents, updaters) that legitimately
    poll every 1-3 minutes; baseline by task name, author and action <add_known_minute_tasks>

level: high
