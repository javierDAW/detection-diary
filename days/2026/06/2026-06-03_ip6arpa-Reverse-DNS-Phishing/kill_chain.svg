<text class="sub" x="470" y="173">Free allocation from a tunnel broker</text>
<text class="sub" x="470" y="189">Hurricane Electric (AS6939) / TMW (AS215828)</text>
<text class="sub" x="470" y="205">Delegated control of the reverse zone</text>
<text class="sub" x="470" y="221">No malware, no exploit - pure DNS tradecraft</text>
