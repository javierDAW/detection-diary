<text class="footerH" x="30" y="1200">Detection anchors</text>
<text class="footerT" x="30" y="1222">Primary: any A/AAAA answer from an ip6.arpa zone (RFC violation, ~0% FP) - RPZ sinkhole all non-PTR answers in ip6.arpa.</text>
<text class="footerT" x="30" y="1240">Gateway: extract links from img/a tags; regex [a-z0-9]{6,}(.[0-9a-f]){6,}.ip6.arpa; flag image-only emails; do not whitelist .arpa.</text>
<text class="footerT" x="30" y="1258">Vendors: Infoblox 2026-02-26 - BleepingComputer 2026-03-08 - CloudSEK 2026-03-25 (382 staged zones) - Day 37.</text>
