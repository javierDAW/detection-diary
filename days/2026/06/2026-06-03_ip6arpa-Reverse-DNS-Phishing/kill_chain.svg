<text class="laneLabelR" x="460" y="104">ATTACKER DNS INFRASTRUCTURE</text>

<!-- LEFT STAGES -->
<rect class="stage" x="30" y="120" width="395" height="135"/>
<circle class="badge" cx="50" cy="140" r="14"/>
<text class="badgeText" x="50" y="144">L1</text>
