<text class="label" x="502" y="659">Arm the wildcard A record</text>
<text class="sub" x="470" y="683">* IN A phishing-ip - a single record</text>
<text class="sub" x="470" y="699">Every subdomain now resolves instantly</text>
<text class="sub" x="470" y="715">Remove it between campaigns to go quiet</text>
<text class="sub" x="470" y="731">Reverse-DNS string masquerades as PTR</text>
