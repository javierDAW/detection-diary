<text class="head" x="20" y="36">ip6.arpa Reverse-DNS Phishing - wildcard A records on IPv6 reverse zones</text>
<text class="meta" x="20" y="58">Vendor: Infoblox / BleepingComputer / CloudSEK - Date: 2026-02 to 2026-03 - Cluster: Unattributed phishing operator - Day 37</text>

