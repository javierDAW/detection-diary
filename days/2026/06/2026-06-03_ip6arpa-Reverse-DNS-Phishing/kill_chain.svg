<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">ip6.arpa reverse-DNS phishing kill chain</title>
<desc id="d">Two lanes. Left is the victim and resolver path: a phishing email with an image-only link, the victim clicking it, the resolver querying an ip6.arpa name, a wildcard A record resolving (an RFC violation and the key detection anchor), a traffic-distribution-system gate, a brand-spoof credential harvest page, and stolen credentials feeding downstream account takeover. Right is the attacker DNS infrastructure build: acquiring a free IPv6 slash 48 from a tunnel broker, delegating the matching ip6.arpa reverse zone, pointing its nameservers at Cloudflare as a staging signal, arming a single wildcard A record (the second key anchor), 382 pre-staged zones, and a TDS with a short-lived host. Critical badges are coloured red. Detection anchors: any A or AAAA answer from an ip6.arpa zone, and image-only email links to reverse-DNS strings.</desc>
