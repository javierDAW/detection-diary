<text class="sub" x="40" y="168">Lure: prize / survey / account / brand spoof</text>
<text class="sub" x="40" y="184">Clickable content is an image, no visible URL</text>
<text class="sub" x="40" y="200">Reputation engines have nothing to score</text>
<text class="mono" x="40" y="226">From: spoofed brand / commodity sender</text>
<text class="mono" x="40" y="244">T1566.002 Spearphishing Link</text>

<rect class="stage" x="30" y="270" width="395" height="135"/>
<circle class="badge" cx="50" cy="290" r="14"/>
<text class="badgeText" x="50" y="294">L2</text>
<text class="label" x="72" y="294">Victim clicks the image link</text>
<text class="sub" x="40" y="318">href is a reverse-DNS string, not a hostname</text>
<text class="sub" x="40" y="334">Per-victim random subdomain prefix</text>
<text class="sub" x="40" y="350">Blocklists defeated by construction</text>
<text class="mono" x="40" y="376">xqjerorqxs.d.d.e.0...2.ip6.arpa</text>
<text class="mono" x="40" y="394">T1204.001 Malicious Link</text>

<rect class="stage" x="30" y="420" width="395" height="135"/>
<circle class="badge" cx="50" cy="440" r="14"/>
<text class="badgeText" x="50" y="444">L3</text>
<text class="label" x="72" y="444">Resolver queries ip6.arpa</text>
<text class="sub" x="40" y="468">Recursive resolver - attacker Cloudflare NS</text>
<text class="sub" x="40" y="484">Looks like a routine PTR query to scanners</text>
<text class="sub" x="40" y="500">.arpa has no WHOIS / age / registrar</text>
<text class="mono" x="40" y="526">QN: rand.nibbles.ip6.arpa</text>
<text class="mono" x="40" y="544">Sysmon EID 22 / DnsEvents</text>

<rect class="stageK" x="30" y="570" width="395" height="135"/>
<circle class="badgeK" cx="50" cy="590" r="14"/>
<text class="badgeText" x="50" y="594">L4</text>
<text class="label" x="72" y="594">Wildcard A record resolves</text>
<text class="sub" x="40" y="618">A/AAAA answer in ip6.arpa = RFC violation</text>
<text class="sub" x="40" y="634">Zero legitimate use; ~0% false positive</text>
<text class="sub" x="40" y="650">Every random prefix - same phishing IP</text>
<text class="mono" x="40" y="676">ANSWER: A 104.21.3.194 / 85.215.34.119</text>
<text class="mono" x="40" y="694">KEY DETECT: non-PTR answer in ip6.arpa</text>

<rect class="stage" x="30" y="720" width="395" height="135"/>
<circle class="badge" cx="50" cy="740" r="14"/>
<text class="badgeText" x="50" y="744">L5</text>
<text class="label" x="72" y="744">Traffic distribution system</text>
<text class="sub" x="40" y="768">Filters by device / IP / referrer</text>
<text class="sub" x="40" y="784">Non-targets bounce to a legit site</text>
<text class="sub" x="40" y="800">Links short-lived (a few days)</text>
<text class="mono" x="40" y="826">Valid target - harvest; else - benign</text>
<text class="mono" x="40" y="844">T1027 conditional redirection</text>

<rect class="stage" x="30" y="870" width="395" height="135"/>
<circle class="badge" cx="50" cy="890" r="14"/>
<text class="badgeText" x="50" y="894">L6</text>
<text class="label" x="72" y="894">Credential harvest page</text>
<text class="sub" x="40" y="918">Brand-spoof login (healthcare lure observed)</text>
