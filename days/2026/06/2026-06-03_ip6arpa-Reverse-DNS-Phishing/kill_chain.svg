<text class="label" x="502" y="489">Point NS at Cloudflare (staging)</text>
<text class="sub" x="470" y="513">CDN nameserver on a reverse zone is abnormal</text>
<text class="sub" x="470" y="529">Lends high reputation; hides backend</text>
<text class="sub" x="470" y="545">Zone armed but quiet (no A yet)</text>
<text class="sub" x="470" y="561">Staging signal for defenders to hunt</text>
<text class="mono" x="470" y="591">NS leah/micah.ns.cloudflare.com</text>
<text class="mono" x="470" y="609">T1665 Hide Infrastructure</text>

<rect class="opK" x="460" y="635" width="395" height="155"/>
