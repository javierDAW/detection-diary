<text class="sub" x="470" y="391">Surface = the reverse zone, not an SLD</text>
<text class="mono" x="470" y="421">d.d.e.0.6.3.0...2.ip6.arpa</text>
<text class="mono" x="470" y="439">T1583.002 Acquire DNS Server</text>

