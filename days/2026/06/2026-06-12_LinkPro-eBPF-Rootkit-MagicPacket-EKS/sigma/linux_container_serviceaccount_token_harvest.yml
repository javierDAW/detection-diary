title: Linux Container Service-Account and Cloud Credential File Harvest (Post-Container-Deploy)
id: e20a8ac0-8d6b-49d1-80b5-dffed684f0f3
status: experimental
description: |
  Detects a process reading Kubernetes service-account token paths or cloud
  credential files from inside a container/pod, a behaviour seen in the LinkPro
  intrusion where the kvlnt/vv pod ran cat over host- and neighbour-pod
  credential material (authentication tokens, API keys, certificates) before
  pivoting in the AWS EKS environment (T1552.001). The serviceaccount token at
  /var/run/secrets/kubernetes.io/serviceaccount/token and projected IRSA tokens
  grant API access; reading them with cat/grep/head/dd rather than via the
  kubelet/SDK is anomalous for most workloads. Restrict in SIEM to processes
  whose parent is not a known SDK/runtime and consider container context. This is
  a behavioural rule: it survives payload changes because credential theft from a
  pod must touch these well-known paths.
references:
  - https://www.synacktiv.com/en/publications/linkpro-ebpf-rootkit-analysis
  - https://attack.mitre.org/techniques/T1552/001/
  - https://attack.mitre.org/techniques/T1610/
author: Jarmi
date: 2026/06/12
tags:
  - attack.credential-access
  - attack.t1552.001
  - attack.execution
detection:
  selection_tool:
    Image|endswith:
      - '/cat'
      - '/grep'
      - '/head'
      - '/dd'
      - '/cp'
      - '/tail'
  selection_cred_paths:
    CommandLine|contains:
      - '/var/run/secrets/kubernetes.io/serviceaccount/'
      - '/run/secrets/kubernetes.io/serviceaccount/'
      - '/var/run/secrets/eks.amazonaws.com/serviceaccount/'
      - '.aws/credentials'
      - '.kube/config'
      - '/root/.docker/config.json'
  condition: selection_tool and selection_cred_paths
falsepositives:
  - Backup, debugging or CI tooling that legitimately copies kubeconfig or token material. Baseline the small set of service accounts and images that do this and exclude them.
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
logsource:
  product: linux
  category: process_creation

level: high
