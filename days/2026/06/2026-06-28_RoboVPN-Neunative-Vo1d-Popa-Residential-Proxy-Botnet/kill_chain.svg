</defs>
<rect class="bg" x="0" y="0" width="880" height="1280"/>
  <rect class="acc-malware-re" x="0" y="0" width="880" height="8"/>
<text class="head" x="20" y="40">RoboVPN / Neunative: free VPN ships a residential-proxy botnet SDK</text>
<text class="meta" x="20" y="60">Vendor: Nokia Deepfield ERT · Date: 2026-06-18 · Backend: Vo1d/Popa (gmslb.net) · Day 62</text>

<rect class="laneL" x="20" y="85" width="410" height="1080" rx="6"/>
<rect class="laneR" x="450" y="85" width="410" height="1080" rx="6"/>
<text class="laneLabelL" x="30" y="105">User Windows host (exit node)</text>
<text class="laneLabelR" x="460" y="105">Operator infrastructure</text>

<!-- LEFT STAGES -->
<rect class="stage" x="30" y="120" width="395" height="135" rx="5"/>
<circle class="badge" cx="50" cy="140" r="14"/><text class="badgeText" x="50" y="144">1</text>
<text class="label" x="74" y="144">Free VPN install</text>
<text class="sub" x="40" y="168">RoboVPN.msi (Cyberkick Ltd., WiX 3.14)</text>
<text class="sub" x="40" y="184">12 MB .NET single-file bundle + 4 native DLLs</text>
<text class="sub" x="40" y="200">Neunative SDK bundled as a NuGet dependency</text>
<text class="mono" x="40" y="226">ea40641a... RoboVPN.msi</text>
<text class="mono" x="40" y="244">NeunativeNG 8.0.36 (T1195.002)</text>

<rect class="stageK" x="30" y="270" width="395" height="135" rx="5"/>
<circle class="badgeK" cx="50" cy="290" r="14"/><text class="badgeText" x="50" y="294">2</text>
<text class="label" x="74" y="294">Inverted activation</text>
<text class="sub" x="40" y="318">OpenPeer() fires from idle / disconnect / login</text>
<text class="sub" x="40" y="334">ClosePeer() only on Connect() -- relay off</text>
<text class="sub" x="40" y="350">30-90 min random delay defeats sandbox window</text>
<text class="mono" x="40" y="376">relay ON while VPN OFF (T1496.002)</text>
<text class="mono" x="40" y="394">exits via user residential IP</text>

<rect class="stage" x="30" y="420" width="395" height="135" rx="5"/>
<circle class="badge" cx="50" cy="440" r="14"/><text class="badgeText" x="50" y="444">3</text>
<text class="label" x="74" y="444">Director registration</text>
<text class="sub" x="40" y="468">TLS GET to lb.gmslb.net:443 /regdev</text>
<text class="sub" x="40" y="484">UA "SDK" + pixel-perfect Chrome Accept header</text>
<text class="sub" x="40" y="500">server geolocates egress IP, returns relay list</text>
<text class="mono" x="40" y="526">/regdev?...sdkv=8.0.36 (T1071.001)</text>
<text class="mono" x="40" y="544">HKCU\Software\Neunative _uuid</text>

<rect class="stage" x="30" y="570" width="395" height="135" rx="5"/>
<circle class="badge" cx="50" cy="590" r="14"/><text class="badgeText" x="50" y="594">4</text>
<text class="label" x="74" y="594">TLV relay on port 6000</text>
<text class="sub" x="40" y="618">proprietary binary TLV over TLS to sN.&lt;front&gt;.com</text>
<text class="sub" x="40" y="634">OpenTunnel 0xa070: customer picks host+port</text>
<text class="sub" x="40" y="650">worker thread getaddrinfo, relays both ways</text>
<text class="mono" x="40" y="676">TCP 6000 (T1571 / T1090)</text>
<text class="mono" x="40" y="694">%AppData%\NeuNative.log Tunnel%llu</text>

<rect class="stageK" x="30" y="720" width="395" height="135" rx="5"/>
<circle class="badgeK" cx="50" cy="740" r="14"/><text class="badgeText" x="50" y="744">5</text>
<text class="label" x="74" y="744">Destination-filter gap</text>
<text class="sub" x="40" y="768">denylist blocks RFC1918 / 127/8 / 169.254</text>
<text class="sub" x="40" y="784">misses 0.0.0.0/8 (=loopback) and port 5555</text>
<text class="sub" x="40" y="800">OpenTunnel(0.0.0.0:5555) reaches ADB daemon</text>
<text class="mono" x="40" y="826">exit node becomes foothold (T1133)</text>
<text class="mono" x="40" y="844">:5555 = 3rd-busiest Popa port</text>

<rect class="stage" x="30" y="870" width="395" height="135" rx="5"/>
<circle class="badge" cx="50" cy="890" r="14"/><text class="badgeText" x="50" y="894">6</text>
<text class="label" x="74" y="894">Bandwidth / IP hijack</text>
<text class="sub" x="40" y="918">third-party traffic carried by user connection</text>
<text class="sub" x="40" y="934">no opt-out toggle; terms vs behavior gap</text>
<text class="sub" x="40" y="950">consent never checked by the backend</text>
<text class="mono" x="40" y="976">resource hijacking (T1496.002)</text>
<text class="mono" x="40" y="994">one detection covers all publishers</text>

<rect class="stage" x="30" y="1020" width="395" height="135" rx="5"/>
<circle class="badge" cx="50" cy="1040" r="14"/><text class="badgeText" x="50" y="1044">7</text>
<text class="label" x="74" y="1044">Downstream abuse</text>
<text class="sub" x="40" y="1068">Popa nodes fetch botnet loaders (Synthient)</text>
<text class="sub" x="40" y="1084">Potassium / Gafgyt / IranBot via :5555</text>
<text class="sub" x="40" y="1100">fleet reused for L7 DDoS (T1498)</text>
<text class="mono" x="40" y="1126">117.55.203.189 /jewishgoldowner/arm7</text>
<text class="mono" x="40" y="1144">83.168.110.191 iran.* (decaying)</text>

<!-- RIGHT OPS -->
<rect class="op" x="460" y="125" width="395" height="155" rx="5"/>
<circle class="badgeR" cx="480" cy="145" r="14"/><text class="badgeText" x="480" y="149">A</text>
<text class="label" x="504" y="149">Director / load balancer</text>
<text class="sub" x="470" y="173">gmslb.net (apex) -- hardcoded Vo1d/Popa C2</text>
<text class="sub" x="470" y="189">lb.gmslb.net:443 nginx/1.20.1 + Express</text>
<text class="sub" x="470" y="205">returns dev_asn/city/country + peer_servers</text>
<text class="sub" x="470" y="221">mng_extra field empty -- an invitation</text>
<text class="mono" x="470" y="247">serves same relay list to EULA or malware</text>
<text class="mono" x="470" y="265">enrollment = T1071.001 / T1573.002</text>

<rect class="op" x="460" y="295" width="395" height="155" rx="5"/>
<circle class="badgeR" cx="480" cy="315" r="14"/><text class="badgeText" x="480" y="319">B</text>
<text class="label" x="504" y="319">Relay fleet (~360)</text>
<text class="sub" x="470" y="343">datacenter relays, ~30 rotating front domains</text>
<text class="sub" x="470" y="359">viki-play.com / star-layer.com</text>
<text class="sub" x="470" y="375">pattern sN.&lt;front&gt;.com:6000 (TLS)</text>
<text class="sub" x="470" y="391">geo-relevant subset per egress IP</text>
<text class="mono" x="470" y="417">relays = datacenter; exits = the people</text>
<text class="mono" x="470" y="435">IP blocklists age out -- block director</text>

<rect class="op" x="460" y="465" width="395" height="155" rx="5"/>
<circle class="badgeR" cx="480" cy="485" r="14"/><text class="badgeText" x="480" y="489">C</text>
<text class="label" x="504" y="489">Proxy customers</text>
<text class="sub" x="470" y="513">book a route; pick target host + port</text>
<text class="sub" x="470" y="529">OpenTunnel target relayed by user machine</text>
<text class="sub" x="470" y="545">residential-proxy market = L7 DDoS source</text>
<text class="sub" x="470" y="561">Qurium traces media attacks to proxy/VPNs</text>
<text class="mono" x="470" y="587">customer chooses dest, victim dials it</text>
<text class="mono" x="470" y="605">multi-hop proxy (T1090.003)</text>

<rect class="op" x="460" y="635" width="395" height="155" rx="5"/>
<circle class="badgeR" cx="480" cy="655" r="14"/><text class="badgeText" x="480" y="659">D</text>
<text class="label" x="504" y="659">Vo1d/Popa backend</text>
<text class="sub" x="470" y="683">Dr.Web 2024-09: ~1.3M Android TV boxes</text>
<text class="sub" x="470" y="699">XLab 2025-03: ~1.6M, Popa proxy plugin</text>
<text class="sub" x="470" y="715">same director + same TLV protocol (RTTI)</text>
<text class="sub" x="470" y="731">PDB tree android-native-sdk = cross-platform</text>
<text class="mono" x="470" y="757">one platform, many device populations</text>
<text class="mono" x="470" y="775">T1584.005 Compromise Infra: Botnet</text>

<rect class="op" x="460" y="805" width="395" height="155" rx="5"/>
<circle class="badgeR" cx="480" cy="825" r="14"/><text class="badgeText" x="480" y="829">E</text>
<text class="label" x="504" y="829">Commercialization</text>
<text class="sub" x="470" y="853">SDK affiliate tag = "publisher name"</text>
<text class="sub" x="470" y="869">platform rents proxy capacity to embedders</text>
<text class="sub" x="470" y="885">also in pirated apps, MediaGet, SmartTube</text>
<text class="sub" x="470" y="901">linked to NetNut / Alarum Tech (NASDAQ)</text>
<text class="mono" x="470" y="927">attribution medium, company-disputed</text>
<text class="mono" x="470" y="945">Qurium / Synthient / Krebs 2026-06</text>

<rect class="op" x="460" y="975" width="395" height="155" rx="5"/>
<circle class="badgeR" cx="480" cy="995" r="14"/><text class="badgeText" x="480" y="999">F</text>
<text class="label" x="504" y="999">Why a DDoS team cares</text>
<text class="sub" x="470" y="1023">weak proxy SDK = initial-access vector</text>
<text class="sub" x="470" y="1039">exit-node-to-foothold via :5555 ADB</text>
<text class="sub" x="470" y="1055">recruited devices feed DDoS botnets</text>
<text class="sub" x="470" y="1071">residential proxy = botnet minus consent</text>
<text class="mono" x="470" y="1097">Synthient + Infoblox observed loaders</text>
<text class="mono" x="470" y="1115">block director domain + port 6000 beacon</text>

