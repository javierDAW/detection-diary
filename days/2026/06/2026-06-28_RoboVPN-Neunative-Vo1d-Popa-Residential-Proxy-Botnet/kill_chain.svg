<!-- FOOTER -->
<rect class="footer" x="20" y="1175" width="840" height="95" rx="6"/>
<text class="footerH" x="32" y="1198">Detection anchors (this folder)</text>
<text class="footerT" x="32" y="1218">Network: director gmslb.net /regdev + UA SDK (sigma 1, kql 1, suricata 9620001-2/5); relay TCP 6000 (sigma 3, kql 3, suricata 9620003-4).</text>
<text class="footerT" x="32" y="1236">Host: NeunativeWin/NG.dll load + HKCU\Software\Neunative (sigma 2, kql 2, yara). Lateral: ADB 0.0.0.0:5555 (kql 4, suricata 9620006).</text>
<text class="footerT" x="32" y="1254">Hunts: H1 register-then-relay, H2 relay-while-VPN-idle, H3 ADB foothold. Durable anchors = director domain + port-6000 behavior, not relay IPs.</text>
</svg>
