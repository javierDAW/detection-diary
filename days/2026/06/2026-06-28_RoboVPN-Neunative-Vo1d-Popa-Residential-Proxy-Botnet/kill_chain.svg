<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">RoboVPN / Neunative residential-proxy SDK kill chain</title>
<desc id="d">Two-lane kill chain. Left lane is the user Windows host: a clean-looking free VPN install, an inverted activation where idling or disconnecting turns the relay on, TLS registration to the director lb.gmslb.net, the proprietary TLV relay on port 6000 exiting through the user residential IP, and the ADB 0.0.0.0:5555 destination-filter gap that turns the exit node into a foothold. Right lane is the operator infrastructure: the gmslb.net director and load balancer, the ~360-relay fleet on rotating front domains viki-play.com and star-layer.com, the proxy customers who choose destinations, and the shared Vo1d and Popa Android TV backend proving one platform across device populations. Detection anchors at the bottom map to the Sigma, KQL, YARA, Suricata and PEAK hunt artifacts in this folder.</desc>
<defs>
