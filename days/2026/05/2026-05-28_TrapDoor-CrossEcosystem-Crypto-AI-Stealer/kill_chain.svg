<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">TrapDoor cross-ecosystem supply chain kill chain</title>
  <desc id="d">Two-lane vertical layout. Left lane is the victim developer workstation with seven numbered stages: package install from npm, PyPI or Crates; ecosystem-specific trigger (postinstall, import, build.rs); node -e remote evaluation; AI assistant configuration plant with zero-width Unicode; six-surface persistence (cursorrules, CLAUDE.md, Git hooks, shell hooks, systemd, cron, SSH authorized_keys); credential sweep and validation; exfiltration to GitHub Pages and Gists. Right lane is the TrapDoor operator infrastructure with six boxes: operator persona ddjidd564 with lure repositories; multi-registry publishing waves; shared trap-core.js payload; ddjidd564.github.io configuration and AUDIT-MATRIX playbook; PR-bombing campaign against AI coding projects; exfil destinations and campaign marker. Critical stages are tinted red. Cross-lane arrows mark package ingress, payload pull, PR injection direction, and exfil egress. Footer maps every Sigma, KQL, YARA, Suricata file and PEAK hunt to its anchor.</desc>
