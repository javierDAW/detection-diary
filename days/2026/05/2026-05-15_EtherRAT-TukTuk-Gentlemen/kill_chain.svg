<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
  <title id="t">EtherRAT + TukTuk + The Gentlemen kill chain — The DFIR Report TB40048, May 2026</title>
  <desc id="d">Eleven-stage intrusion chain across a Windows enterprise environment: GitHub-facade MSI dropper, Node.js portable implant resolved via Ethereum smart contracts, TukTuk AI-generated framework side-loaded under signed userland binaries with multi-transport SaaS C2 plus Arweave dead drop, GoTo Resolve installed laterally, NTDS/LSASS dumping with NetExec, Rclone exfiltration to Wasabi, and final domain-wide ransomware deployment via a malicious GPO over SYSVOL.</desc>
