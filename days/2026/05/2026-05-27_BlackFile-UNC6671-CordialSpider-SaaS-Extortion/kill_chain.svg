  <text class="C2S"   x="580" y="480">Commercial VPN + residential proxy</text>
  <text class="C2L"   x="580" y="502">179.43.185.226 (GTIG anchor)</text>
  <text class="C2L"   x="580" y="518">UA: python-requests/2.28.1</text>
  <text class="C2L"   x="580" y="534">UA: WindowsPowerShell/5.1</text>
  <text class="C2L"   x="580" y="550">ClientAppId spoof: d3590ed6-</text>
