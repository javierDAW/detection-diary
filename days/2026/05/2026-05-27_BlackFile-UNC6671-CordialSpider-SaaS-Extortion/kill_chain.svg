<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1120" role="img" aria-labelledby="t d" font-family="sans-serif">
  <title id="t">BlackFile UNC6671 Cordial Spider vishing AiTM SaaS extortion kill chain</title>
  <desc id="d">Two-lane kill chain. Victim organisation lane (left) shows passive recon, vishing call with IT-helpdesk pretext, adversary-in-the-middle credential and MFA capture, attacker MFA device enrollment and previous-device removal, inbox-rule auto-delete of security notifications, internal directory scrape and pivot to privileged accounts, programmatic SharePoint and OneDrive exfiltration with python-requests or PowerShell User-Agent and spoofed Microsoft Office ClientAppId, and extortion (Tox or Session). BlackFile operations lane (right) shows hired vishing callers, Tucows-registered lookalike apex domains, commercial VPN or residential proxy exfil egress with the GTIG-documented anchor IP, and the BlackFile data leak site lifecycle including the 2026-05-11 shutdown announcement. Detection anchors are at the bottom.</desc>

