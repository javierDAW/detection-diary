title: Developer Secret Read Burst from Node Process (npm typosquat telemetry)
id: d5158de0-edb0-4fc6-9ec0-c0a68eb3991d
status: experimental
description: |
  Detects a Node.js process reading multiple developer secret files
  (SSH keys, AWS credentials, npm token, Web3 wallet keystores, .env)
  in close succession — pattern matches the EVM/DeFi npm typosquat
  campaign (telemetry.js, sha256
  71426e93cb6143052d5aeeca920850f8a0343c95bc65aab9a15145848cc5bff1)
  observed by Xygeni on 2026-05-06.
  Use a correlation engine (Sigma 2.x correlation, EDR rule engine,
  or SIEM stats over time-window) to require >= 3 distinct hits in
  60 seconds from the same PID.
references:
  - https://xygeni.io/blog/evm-defi-npm-typosquatting-attack-steals-developer-keys/
  - https://registry.npmjs.org/viem-core
author: Jarmi
date: 2026/05/07
tags:
  - attack.credential-access
  - attack.t1552.001
  - attack.t1552.004
  - attack.collection
  - attack.t1005
logsource:
  category: file_event
  product: linux
detection:
  selection_node:
    Image|endswith:
      - '/node'
      - '/nodejs'
      - '/ts-node'
  selection_paths:
    TargetFilename|contains:
      - '/.ssh/id_'
      - '/.ssh/id_rsa'
      - '/.ssh/id_ed25519'
      - '/.aws/credentials'
      - '/.aws/config'
      - '/.npmrc'
      - '/.foundry/keystores/'
      - '/.ethereum/keystore/'
      - '/.brownie/accounts/'
      - '/.git-credentials'
      - '/.netrc'
  selection_envfiles:
    TargetFilename|endswith:
      - '/.env'
      - '/.env.local'
      - '/.env.production'
      - '/.env.development'
  condition: selection_node and (selection_paths or selection_envfiles)
falsepositives:
  - Legitimate Hardhat/Foundry/Brownie scripts that intentionally read deployer keys (rare and short-lived; correlate with command line)
  - Backup tools running under node (uncommon)
  - Developer running `aws configure` from a Node-based CLI wrapper
level: high
