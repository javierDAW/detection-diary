title: Scheduled Task Created by AppData-Resident Process (CloudZ Loader Persistence)
id: cff46924-261a-4d4c-bb44-9e2f7649fa9a
status: experimental
description: |
  Detects schtasks.exe persistence creation where the parent process lives
  under the user AppData tree. This matches the CloudZ Rust dropper / .NET
  loader pattern — the fake ScreenConnect update lands in AppData, drops a
  loader executable in AppData, and registers a scheduled task to launch it
  at logon or boot. The rule is intentionally broader than the family alone
  to catch related dropper behaviour.
references:
  - https://blog.talosintelligence.com/cloudz-pheno-infostealer/
author: Jarmi
date: 2026/05/08
tags:
  - attack.persistence
  - attack.t1053.005
  - attack.defense-evasion
logsource:
  category: process_creation
  product: windows
detection:
  selection_schtasks:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains: '/create'
  selection_parent_appdata:
    ParentImage|contains:
      - '\AppData\Roaming\'
      - '\AppData\Local\'
  filter_known_installers:
    ParentImage|contains:
      - '\Microsoft\OneDrive\'
      - '\Programs\Microsoft VS Code\'
      - '\Google\Chrome\'
      - '\Mozilla Firefox\'
      - '\GitHubDesktop\'
  condition: selection_schtasks and selection_parent_appdata and not filter_known_installers
falsepositives:
  - Some legitimate user-context installers create scheduled tasks from AppData (auto-updaters).
  - Tune by user/host baseline and signing certificate of the parent image.
level: medium
