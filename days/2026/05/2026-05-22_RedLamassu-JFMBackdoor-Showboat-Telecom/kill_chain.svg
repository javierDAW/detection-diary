  <rect class="bg-anchor" x="30" y="920" width="1140" height="310" rx="8"/>
  <text class="anchor-title" x="50" y="946">Detection anchors</text>

  <text class="anchor-label" x="50" y="972">Sigma</text>
  <text class="anchor-line" x="50" y="990">- fltMC.exe executing from a non-System32 user-writable path (T1574.002)</text>
  <text class="anchor-line" x="50" y="1008">- Hidden PowerShell + Invoke-WebRequest fetching the four staging artefacts (T1059.001)</text>
  <text class="anchor-line" x="50" y="1026">- User-space "kworker" + curl/wget to Pastebin / ghostbin / paste.ee (T1036.005)</text>

  <text class="anchor-label" x="50" y="1054">KQL</text>
  <text class="anchor-line" x="50" y="1072">- %TEMP% staging of 3+ artefacts joined to fltMC.exe outside System32 within 1 h</text>
  <text class="anchor-line" x="50" y="1090">- Egress to the 8 Red Lamassu C2 domains and the 12 IPv4 anchors</text>
  <text class="anchor-line" x="50" y="1108">- User-space kworker process joined to outbound HTTPS / SOCKS5 (Linux MDE)</text>

  <text class="anchor-label" x="50" y="1136">YARA</text>
  <text class="anchor-line" x="50" y="1154">- PE heuristic: Zs0@31=KDw.*7ev + CppServer classes (TCPSession / WSSession)</text>
  <text class="anchor-line" x="50" y="1172">- ELF heuristic: "look me, AV!" + kworker + SKS / MAP + sleep-config fields</text>
  <text class="anchor-line" x="50" y="1190">- Known-hash anchors: 11 SHA256s from the open-directory artefacts</text>

  <text class="anchor-label" x="610" y="972">Suricata</text>
  <text class="anchor-line" x="610" y="990">- DNS + TLS SNI for the 8 Red Lamassu C2 FQDNs (sids 8220001-8220004)</text>
  <text class="anchor-line" x="610" y="1008">- Plain-HTTP GET against 23.27.201.160:8000 for the 4 artefacts (sids 8220005-6)</text>
  <text class="anchor-line" x="610" y="1026">- X.509 fingerprint 27df475626aafce2... on TLS handshakes (sid 8220010)</text>

  <text class="anchor-label" x="610" y="1054">PEAK hunts</text>
  <text class="anchor-line" x="610" y="1072">- H1: fltMC.exe staging chain inside 1 h (memory-first action)</text>
  <text class="anchor-line" x="610" y="1090">- H2: kworker masquerade + outbound egress to the 17 IP anchors</text>
  <text class="anchor-line" x="610" y="1108">- H3: X.509 fingerprint pivot across 20+ historic C2 nodes</text>

  <text class="anchor-label" x="610" y="1136">Pedagogy</text>
  <text class="anchor-line" x="610" y="1154">- Hunt by certificate, not by hostname -- fingerprints outlast IP rotation</text>
  <text class="anchor-line" x="610" y="1172">- Anchor on the legitimate-binary path anomaly, not the malicious DLL hash</text>
  <text class="anchor-line" x="610" y="1190">- Real Linux kworker is kernel-space -- any user-space match is masquerading</text>

  <text class="anchor-foot" x="50" y="1218">PwC TI + Lumen Black Lotus Labs (2026-05-21) - 3 Sigma + 3 KQL + 1 YARA (3 rules) + 1 Suricata (10 sids) + 3 PEAK hunts - ground truth: this folder.</text>
