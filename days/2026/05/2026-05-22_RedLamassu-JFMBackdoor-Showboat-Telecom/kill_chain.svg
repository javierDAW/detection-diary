<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1260" role="img" aria-labelledby="t d">
  <title id="t">Red Lamassu / Calypso kill chain — JFMBackdoor (Windows) + Showboat (Linux) targeting Asian telecoms</title>
  <desc id="d">A two-lane kill chain. Left lane (VICTIM HOST) shows nine stages from initial-access staging through Windows side-load of FLTLIB.dll via fltMC.exe, JFMBackdoor in-memory PE, persistence under ProgramData, and Linux Showboat / kworker masquerade. Right lane (ATTACKER C2) shows the Red Lamassu primary cluster: namefuture.site fronted by Cloudflare, the My Organization self-signed certificate fingerprint, Showboat origin at 139.84.227.139, open-directory staging IP 23.27.201.160. Bidirectional arrows mark JFMBackdoor C2 and Showboat SOCKS5 channel. A two-column detection-anchors box at the bottom summarises Sigma, KQL, YARA, Suricata, PEAK hunts and pedagogy.</desc>
