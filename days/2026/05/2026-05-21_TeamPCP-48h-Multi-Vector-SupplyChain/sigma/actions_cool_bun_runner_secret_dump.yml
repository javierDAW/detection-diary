title: GitHub Actions Runner Secret Dump via python3 reading /proc/PID/mem
id: 418365b9-77d9-4904-be9d-33fbfdc0a6bc
status: experimental
description: |
  Detects the actions-cool tag-poisoning secret theft pattern published by TeamPCP on 2026-05-18.
  An imposter commit on a GitHub Action repository downloads the bun JavaScript runtime to the
  runner, spawns a python3 child under sudo, and reads /proc/<Runner.Worker PID>/mem to scrape
  decrypted CI/CD secrets out of process memory. The detection anchors on the python3 process
  whose command line opens a /proc/<num>/mem path. Tested on Sysmon for Linux EID 1.
references:
  - https://www.stepsecurity.io/blog/actions-cool-issues-helper-github-action-compromised-all-tags-point-to-imposter-commit-that-exfiltrates-ci-cd-credentials
  - https://thehackernews.com/2026/05/github-actions-supply-chain-attack.html
author: Jarmi
date: 2026/05/21
tags:
  - attack.credential-access
  - attack.t1528
  - attack.t1552.005
  - attack.execution
  - attack.t1059.006
logsource:
  product: linux
  category: process_creation
detection:
  selection_python3:
    Image|endswith:
      - '/python3'
      - '/python'
  selection_target_mem:
    CommandLine|contains|all:
      - '/proc/'
      - '/mem'
  selection_secret_marker:
    CommandLine|contains:
      - 'isSecret'
      - 'Runner.Worker'
      - 'gh auth token'
      - '/home/runner/.bun/bin/bun'
      - '~/.bun/bin/bun'
  condition: selection_python3 and (selection_target_mem or selection_secret_marker)
falsepositives:
  - Forensic tooling that legitimately dumps process memory in a triage workflow; pair with the
    Runner.Worker context anchor to suppress.
  - Profilers reading their own /proc/self/mem (excluded implicitly because the regex pattern
    /proc/<other-PID>/mem rarely matches self).
level: high
