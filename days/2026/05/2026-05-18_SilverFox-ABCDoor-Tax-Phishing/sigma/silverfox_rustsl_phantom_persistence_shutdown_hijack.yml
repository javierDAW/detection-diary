title: Silver Fox RustSL Phantom Persistence shutdown-signal hijack registration
id: cd669c61-fc19-4686-aa08-7d90a795f475
status: experimental
description: |
  Detects the Phantom Persistence technique used by the Silver Fox RustSL loader
  (in-the-wild since late December 2025). The loader hijacks the Windows shutdown
  signal via RegisterApplicationRestart and SetProcessShutdownParameters(0x4FF)
  together with EWX_RESTARTAPPS. The registration is logged as a debug file named
  rsl_debug.log with the verbatim banner "God-Tier Telemetry Blinding: Deployed
  via HalosGate Indirect Syscalls". Detection targets the debug-log artifact
  generated by the loader on disk.
references:
  - https://securelist.com/silver-fox-tax-notification-campaign/119575/
  - https://gbhackers.com/silver-fox-uses-fake-tax-notices/
author: Jarmi
date: 2026/05/18
tags:
  - attack.persistence
  - attack.defense-evasion
  - attack.t1574
  - attack.t1027.007
logsource:
  category: file_event
  product: windows
detection:
  selection_path:
    TargetFilename|endswith: '\rsl_debug.log'
  selection_root:
    TargetFilename|contains:
      - '\AppData\Local\Temp\'
      - '\Users\Public\'
      - '\ProgramData\'
      - '\AppData\Roaming\'
  condition: selection_path and selection_root
falsepositives:
  - Custom in-house Rust tooling reusing the same debug-log naming. The string banner inside the file is unique to RustSL; correlate the file write with a YARA scan of the content.
level: high
