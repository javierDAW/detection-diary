title: Brute Force Burst Against Public Service From Known First VPN Exit Node
id: e0c8dab4-ede2-4492-a859-73e4c4297f49
status: experimental
description: |
  Detects failed authentication attempts from a source IP that is on the FBI
  FLASH-20260521-001 First VPN Service exit-node list, where the target is a
  public-facing service such as SSH, RDP, OWA, M365 endpoints, or the corporate
  VPN portal. This is the canonical password-spray / brute-force pattern that
  the FBI flash explicitly calls out as a primary observed use of First VPN
  infrastructure. The rule fires per-failure; apply a count-by-source-IP
  threshold (recommended >= 20 failures in 60 minutes) at the SIEM aggregation
  layer to detect a burst. The same source IP followed by a successful auth
  (firstvpn_corp_vpn_auth_from_known_node) is the highest-confidence ransomware
  affiliate dwell-time anchor.
author: Jarmi
date: 2026/05/24
references:
  - https://www.ic3.gov/CSA/2026/260521.pdf
  - https://www.bitdefender.com/en-us/blog/businessinsights/operation-saffron-bitdefender-joins-first-vpn-takedown
tags:
  - attack.credential-access
  - attack.t1110
  - attack.t1110.003
  - attack.initial-access
  - attack.t1133
logsource:
  category: authentication
  product: linux
