falsepositives:
  - Legitimate user repeatedly mistyping a password from a commercial VPN that happens to share an exit IP with the historical (post-rotation) set; rare but documented; correlate with the FBI current-IP vs historical-IP designation.
  - Automated scanner of the SOC's own engagement (red team, security validation tooling) that egresses through a chosen exit IP; verify against an authorized testing change record.
level: high

