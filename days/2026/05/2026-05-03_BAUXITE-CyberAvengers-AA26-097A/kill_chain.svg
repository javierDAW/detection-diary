  <text x="60" y="994" class="anchor-sub">sigma/rockwell_studio5000_outbound.yml — Studio 5000 / RSLogix / RSLinx -&gt; public IP on EIP/CIP/Modbus/S7</text>
  <text x="60" y="1016" class="anchor-sub">kql/engineering_tool_egress.kql — engineering-tool egress + Dropbear / IOCONTROL drop correlation</text>
