  <text x="60" y="1096" class="anchor">Pedagogical anchors</text>
  <text x="60" y="1118" class="anchor-sub">You do not need an OT 0day in 2026. PLC on the internet + vendor SDK = breach.</text>
  <text x="60" y="1138" class="anchor-sub">The HMI lies during IR. Query the controller directly with a read-only OPC / EIP client.</text>
