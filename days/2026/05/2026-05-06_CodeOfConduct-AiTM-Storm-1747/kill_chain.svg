        .stagebg    { fill: #58a6ff; }
        .stagenum   { fill: #0d1117; }
        .label      { fill: #c9d1d9; }
        .sub        { fill: #8b949e; }
        .ioc        { fill: #8b949e; }
        .mitre      { fill: #58a6ff; }
        .header     { fill: #c9d1d9; }
        .subhead    { fill: #8b949e; }
        .lane       { fill: #8b949e; }
        .arrow      { stroke: #8b949e; }
        .arrow-fill { fill: #8b949e; }
        .anchor     { fill: #c9d1d9; }
