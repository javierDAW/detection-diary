<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d">
  <title id="t">Code of Conduct AiTM kill chain — Microsoft Threat Intelligence, 4 May 2026</title>
  <desc id="d">A PDF lure with HR-disciplinary framing leads through a Cloudflare Turnstile gate to a Tycoon2FA reverse-proxy AiTM landing, which captures ESTSAUTH plus access and refresh tokens. Within ten minutes the operator registers a fraudulent device in Entra ID and derives a Primary Refresh Token that survives password rotation. Inbox rules with 1-character names hide the BEC stage.</desc>
