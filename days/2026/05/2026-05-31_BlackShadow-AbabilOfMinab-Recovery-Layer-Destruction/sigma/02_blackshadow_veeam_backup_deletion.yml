title: Veeam Backup Repository Delete-From-Disk Action
id: 85fd91d8-4940-48e6-8c77-a26aa2d9ff59
status: experimental
description: |
  Detects deletion of Veeam backups at the repository file level via the Veeam
  console or PowerShell, the recovery-denial step in the Black Shadow / Ababil of
  Minab Iran-MOIS campaign (Gambit, 2026-05-26). Veeam "Delete from disk"
  permanently removes the entire backup chain from the repository. This rule fires
  on Veeam PowerShell removal cmdlets or the Veeam Backup process performing a
  delete, which outside a sanctioned retention job is high-fidelity for
  recovery-denial. Push volume/threshold to the SIEM (one principal deleting many
  restore points in a short window) as described in the case README.
references:
  - https://gambit.security/blog-posts/babil-of-minab-iran-mois-destruction-campaign
  - https://attack.mitre.org/techniques/T1490/
author: Jarmi
date: 2026/05/31
tags:
  - attack.impact
  - attack.t1490
logsource:
  category: process_creation
  product: windows
detection:
  selection_pwsh:
    CommandLine|contains:
      - 'Remove-VBRBackup'
      - 'Remove-VBRRestorePoint'
      - 'Remove-VBRBackupRepository'
      - 'Delete-VBRBackup'
  selection_console:
    Image|endswith:
      - '\Veeam.Backup.Manager.exe'
      - '\Veeam.Backup.Shell.exe'
    CommandLine|contains:
      - 'delete'
  condition: selection_pwsh or selection_console
falsepositives:
  - Administrators pruning obsolete restore points during sanctioned retention
    maintenance; baseline by operator and change window <add_known_veeam_admins>

level: high
