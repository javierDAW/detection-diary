<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1280" role="img" aria-labelledby="t d">
<title id="t">Black Shadow / Ababil of Minab recovery-layer destruction - kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim estate: access via valid accounts and proxied RDP, an authenticated vCenter session, virtual machine Power Off and Delete from Disk (critical), disk volume deletion relabeled Minab, SQL database Take Offline and drop via SSMS (critical), Veeam backup chain deletion plus WipeFile secure erase of the SQLBackup directory (critical), and exfiltration of over 700 GB. Right lane is the Black Shadow operator behind the Ababil of Minab persona: proxychains plus xfreerdp relay through 91.193.19.198 port 8443, an A.ExE Go tunneler beaconing to members.nefeshhope.com and 46.30.190.173, scripted inventory-iteration automation, a ChatGPT-refined Python script that dropped 58 SQL Server targets, and an explicit recovery-denial strategy. Detection anchors are the destructive verbs across the virtualization, database and backup planes.</desc>
