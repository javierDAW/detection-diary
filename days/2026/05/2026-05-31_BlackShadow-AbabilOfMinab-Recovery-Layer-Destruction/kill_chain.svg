<rect class="footer" x="20" y="1175" width="840" height="95"/>
<text class="footerH" x="34" y="1200">Recovery-layer destruction: the backup, vCenter and Veeam planes are the target, not just the safety net.</text>
<text class="footerT" x="34" y="1222">Detect on destructive verbs across planes (Destroy_Task, DROP DATABASE, Remove-VBR*, WipeFile, Delete Volume), not on malware -</text>
<text class="footerT" x="34" y="1240">the whole chain is living-off-the-land. Multiple techniques = deliberate recovery denial; plan IR for parallel, compounding restores.</text>
<text class="footerT" x="34" y="1258">Survivability hinges on immutable, isolated, MFA-gated backups validated against an adversarial scenario - not hardware failure alone.</text>
