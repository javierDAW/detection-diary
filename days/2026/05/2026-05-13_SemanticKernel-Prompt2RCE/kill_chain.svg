<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" role="img" aria-labelledby="t d">
  <title id="t">Semantic Kernel prompt-to-RCE kill chain — Microsoft Defender Research, May 2026</title>
  <desc id="d">Two CVEs in Microsoft Semantic Kernel — CVE-2026-26030 (Python InMemoryVectorStore filter eval) and CVE-2026-25592 (.NET SessionsPythonPlugin DownloadFileAsync) — turn prompt injection into native host RCE. Left lane shows the victim agent host; right lane shows the attacker side (prompt source plus Azure Container Apps sandbox). Detection anchors at the bottom map every stage to Sigma, KQL, YARA, and Suricata rules in this folder.</desc>
  <defs>
    <style>
      .bg-stage     { fill: #f6f8fa; stroke: #d1d9e0; stroke-width: 1; }
      .bg-c2        { fill: #fff8c5; stroke: #d4a72c; stroke-width: 1; }
      .bg-det       { fill: #ddf4ff; stroke: #54aeff; stroke-width: 1; }
      .stagebg      { fill: #0969da; }
      .stagenum     { fill: #ffffff; font: 700 11px sans-serif; }
      .label        { fill: #1f2328; font: 600 13px sans-serif; }
      .sub          { fill: #424a53; font: 12px sans-serif; }
      .ioc          { fill: #57606a; font: 10.5px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .mitre        { fill: #0969da; font: 600 11px ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .header       { fill: #1f2328; font: 700 18px sans-serif; }
      .subhead      { fill: #57606a; font: 12px sans-serif; }
      .lane         { fill: #57606a; font: 11px sans-serif; }
      .arrow        { stroke: #57606a; stroke-width: 1.6; fill: none; }
      .arrow-fill   { fill: #57606a; }
      @media (prefers-color-scheme: dark) {
        .bg-stage   { fill: #161b22; stroke: #30363d; }
        .bg-c2      { fill: #2d2206; stroke: #9e6a03; }
        .bg-det     { fill: #0c2d6b; stroke: #1f6feb; }
        .stagebg    { fill: #58a6ff; }
        .stagenum   { fill: #0d1117; }
        .label      { fill: #c9d1d9; }
        .sub        { fill: #8b949e; }
        .ioc        { fill: #8b949e; }
        .mitre      { fill: #58a6ff; }
        .header     { fill: #c9d1d9; }
        .subhead    { fill: #8b949e; }
        .lane       { fill: #8b949e; }
        .arrow      { stroke: #8b949e; }
        .arrow-fill { fill: #8b949e; }
      }
    
.acc-ransomware { fill: #b03030; }
.acc-espionage { fill: #2a4a6a; }
.acc-supply-chain { fill: #b07a3a; }
.acc-identity-cloud { fill: #6a4ca6; }
.acc-ot-ics { fill: #2f8f4e; }
.acc-edge-network { fill: #1d7a8c; }
.acc-mobile { fill: #c2569a; }
.acc-crypto-defi { fill: #d08a1f; }
.acc-malware-re { fill: #556070; }
.acc-other { fill: #6a6a6a; }
.accLabel { font: 700 11px sans-serif; fill: #ffffff; }
</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="40" y="34" class="header">Semantic Kernel prompt-to-RCE kill chain</text>
  <text x="40" y="54" class="subhead">Microsoft Defender Security Research — 2026-05-07 — CVE-2026-26030, CVE-2026-25592</text>

  <!-- Lane labels -->
  <text x="40" y="92" class="lane" transform="rotate(-90 40 92)">VICTIM AGENT HOST</text>
  <text x="840" y="92" class="lane" transform="rotate(-90 840 92)">ATTACKER + SANDBOX</text>

  <!-- Stage 1 -->
  <rect x="60" y="80" width="500" height="90" rx="6" class="bg-stage"/>
  <circle cx="82" cy="102" r="13" class="stagebg"/>
  <text x="82" y="106" text-anchor="middle" class="stagenum">1</text>
  <text x="106" y="106" class="label">Prompt Injection — direct or indirect</text>
  <text x="106" y="125" class="sub">Adversarial text via chat, email, RAG doc, ticket, tool reply</text>
  <text x="106" y="143" class="ioc">AML.T0051 (LLM Prompt Injection) — direct or indirect</text>
  <text x="106" y="161" class="mitre">T1190</text>

  <!-- Stage 2 -->
  <rect x="60" y="186" width="500" height="106" rx="6" class="bg-stage"/>
  <circle cx="82" cy="208" r="13" class="stagebg"/>
  <text x="82" y="212" text-anchor="middle" class="stagenum">2</text>
  <text x="106" y="212" class="label">Tool selection — NL parsed into a tool schema</text>
  <text x="106" y="231" class="sub">search_hotels(city=...) | DownloadFileAsync(remote, local)</text>
  <text x="106" y="250" class="ioc">SK builds: lambda x: x.city == '&lt;ai-controlled&gt;'</text>
  <text x="106" y="267" class="ioc">.NET SK exposes DownloadFileAsync as [KernelFunction]</text>
  <text x="106" y="285" class="mitre">AML.T0050</text>

  <!-- Stage 3 -->
  <rect x="60" y="308" width="500" height="124" rx="6" class="bg-stage"/>
  <circle cx="82" cy="330" r="13" class="stagebg"/>
  <text x="82" y="334" text-anchor="middle" class="stagenum">3</text>
  <text x="106" y="334" class="label">CVE-2026-26030 — Python InMemoryVectorStore eval</text>
  <text x="106" y="353" class="sub">AST traversal escapes lambda and bypasses validator</text>
  <text x="106" y="372" class="ioc">().__class__.__bases__[0].__subclasses__()</text>
  <text x="106" y="389" class="ioc">[c for c in ... if c.__name__=='BuiltinImporter'][0]()</text>
  <text x="106" y="406" class="ioc">.load_module('os').system('powershell ...')</text>
  <text x="106" y="425" class="mitre">T1059.006</text>

  <!-- Stage 4 -->
  <rect x="60" y="448" width="500" height="128" rx="6" class="bg-stage"/>
  <circle cx="82" cy="470" r="13" class="stagebg"/>
  <text x="82" y="474" text-anchor="middle" class="stagenum">4</text>
  <text x="106" y="474" class="label">CVE-2026-25592 — SessionsPythonPlugin escape</text>
  <text x="106" y="493" class="sub">ExecuteCode drops /tmp/payload.ps1 in Container Apps</text>
  <text x="106" y="512" class="sub">DownloadFileAsync writes it to host Startup folder</text>
  <text x="106" y="531" class="ioc">localFilePath = ...\Programs\Startup\sk_init.ps1</text>
  <text x="106" y="548" class="ioc">UploadFileAsync (reverse) exfils id_rsa, AWS creds</text>
  <text x="106" y="568" class="mitre">T1547.001  T1106</text>

  <!-- Stage 5 -->
  <rect x="60" y="592" width="500" height="90" rx="6" class="bg-stage"/>
  <circle cx="82" cy="614" r="13" class="stagebg"/>
  <text x="82" y="618" text-anchor="middle" class="stagenum">5</text>
  <text x="106" y="618" class="label">Execution — RCE on agent host</text>
  <text x="106" y="637" class="sub">python.exe / dotnet.exe spawn cmd, powershell, whoami</text>
  <text x="106" y="655" class="ioc">calc.exe in PoC; staged loader in production</text>
  <text x="106" y="673" class="mitre">T1059.001  T1059.006</text>

  <!-- Stage 6 -->
  <rect x="60" y="698" width="500" height="90" rx="6" class="bg-stage"/>
  <circle cx="82" cy="720" r="13" class="stagebg"/>
  <text x="82" y="724" text-anchor="middle" class="stagenum">6</text>
  <text x="106" y="724" class="label">Privilege Escalation — workload identity</text>
  <text x="106" y="743" class="sub">Token from IMDS / local MSI inherits agent SP scopes</text>
  <text x="106" y="761" class="ioc">169.254.169.254/metadata/identity/oauth2/token</text>
  <text x="106" y="779" class="mitre">T1552.005</text>

  <!-- Stage 7 -->
  <rect x="60" y="804" width="500" height="90" rx="6" class="bg-stage"/>
  <circle cx="82" cy="826" r="13" class="stagebg"/>
  <text x="82" y="830" text-anchor="middle" class="stagenum">7</text>
  <text x="106" y="830" class="label">Persistence — Startup folder + token replay</text>
  <text x="106" y="849" class="sub">Logon-triggered loader; refresh tokens hoarded off-host</text>
  <text x="106" y="867" class="ioc">%APPDATA%\...\Start Menu\Programs\Startup\</text>
  <text x="106" y="885" class="mitre">T1547.001  T1078</text>

  <!-- Stage 8 -->
  <rect x="60" y="910" width="500" height="90" rx="6" class="bg-stage"/>
  <circle cx="82" cy="932" r="13" class="stagebg"/>
  <text x="82" y="936" text-anchor="middle" class="stagenum">8</text>
  <text x="106" y="936" class="label">Impact — corporate data via agent identity</text>
  <text x="106" y="955" class="sub">Graph, Mail.ReadWrite, Files.ReadWrite.All, KeyVault</text>
  <text x="106" y="973" class="ioc">Egress via agent HTTPS — looks like tool traffic</text>
  <text x="106" y="991" class="mitre">T1213  T1567  T1078.004</text>

  <!-- Attacker / sandbox panel (right lane) -->
  <rect x="580" y="80" width="260" height="290" rx="6" class="bg-c2"/>
  <text x="710" y="106" text-anchor="middle" class="label">Prompt source + sandbox</text>
  <text x="710" y="125" text-anchor="middle" class="sub">attacker-controlled content</text>

  <text x="596" y="155" class="ioc">Direct chat: malicious user</text>
  <text x="596" y="172" class="ioc">Indirect: poisoned RAG /</text>
  <text x="596" y="187" class="ioc">  email / Jira ticket /</text>
  <text x="596" y="202" class="ioc">  web search / HTML comment</text>

  <text x="596" y="235" class="label">Azure Container Apps</text>
  <text x="596" y="252" class="sub">dynamic Python session</text>
  <text x="596" y="274" class="ioc">SessionsPythonPlugin:</text>
  <text x="596" y="290" class="ioc">  ExecuteCode → /tmp/payload</text>
  <text x="596" y="307" class="ioc">  DownloadFileAsync → host</text>
  <text x="596" y="323" class="ioc">  [KernelFunction] exposed</text>
  <text x="596" y="343" class="ioc">  UploadFileAsync = read-any</text>
  <text x="596" y="360" class="ioc">  (host → sandbox primitive)</text>

  <!-- Patch panel -->
  <rect x="580" y="386" width="260" height="186" rx="6" class="bg-c2"/>
  <text x="710" y="412" text-anchor="middle" class="label">Patch baseline</text>
  <text x="596" y="438" class="ioc">PyPI semantic-kernel</text>
  <text x="596" y="454" class="ioc">  &gt;= 1.39.4</text>
  <text x="596" y="472" class="ioc">NuGet Microsoft.SemanticKernel</text>
  <text x="596" y="488" class="ioc">  &gt;= 1.71.0</text>
  <text x="596" y="510" class="ioc">Defence in depth (1.39.4):</text>
  <text x="596" y="526" class="ioc">  AST node-type allowlist</text>
  <text x="596" y="542" class="ioc">  function-call allowlist</text>
  <text x="596" y="558" class="ioc">  __class__/__subclasses__ deny</text>

  <!-- Arrows from victim stages to attacker panel -->
  <path d="M 560 125 L 580 125" class="arrow" marker-end="url(#arr)"/>
  <path d="M 560 232 L 580 232" class="arrow" marker-end="url(#arr)"/>
  <path d="M 560 510 L 580 300" class="arrow" marker-end="url(#arr)"/>

  <!-- Detection anchors box -->
  <rect x="60" y="1020" width="780" height="140" rx="6" class="bg-det"/>
  <text x="82" y="1045" class="label">Detection anchors</text>
  <text x="82" y="1068" class="ioc">sigma/sk_agent_host_spawns_shell_lolbin.yml — agent runtime spawns cmd/powershell/whoami</text>
  <text x="82" y="1085" class="ioc">sigma/sk_agent_writes_startup_folder.yml — file_event: Startup folder write (T1547.001)</text>
  <text x="82" y="1102" class="ioc">sigma/sk_prompt_injection_ast_traversal_payload.yml — AST traversal anchors in agent logs</text>
  <text x="82" y="1119" class="ioc">kql/ — host LOLBin spawn + Startup write + AST traversal heuristic (Defender XDR / Sentinel)</text>
  <text x="82" y="1136" class="ioc">yara/sk_prompt2rce_heuristic.yar — AST band + SessionsPython sandbox-escape band</text>
  <text x="82" y="1153" class="ioc">suricata/sk_prompt2rce_anchors.rules — sids 8140001-3: body AST / DL→Startup / UL exfil</text>
  <rect class="acc-supply-chain" x="0" y="0" width="880" height="8"/>
</svg>
