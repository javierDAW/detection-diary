title: UAT-8302 Open-Source Recon and Credential-Extraction Tooling
id: bda14009-60ae-4f77-8216-083c2c25d68b
status: experimental
description: |
  UAT-8302 favors open-source reconnaissance and credential extraction
  tools instead of bringing custom LPE. Filename or command-line anchors
  observed by Cisco Talos include gogo, httpx, naabu, dddd, nbtscan,
  Sysinternals ADExplorer snapshot (ae.exe -snapshot), Stowaway,
  anyproxy, MobaXtermDecryptor, adconnectdump.py and
  SharpGetUserLoginIPRP.
references:
  - https://blog.talosintelligence.com/uat-8302/
author: Jarmi
date: 2026/05/11
tags:
  - attack.discovery
  - attack.credential-access
  - attack.t1018
  - attack.t1046
  - attack.t1003.001
  - attack.t1555.003
logsource:
  category: process_creation
  product: windows
detection:
  selection_cmd:
    CommandLine|contains:
      - 'adconnectdump.py'
      - 'SharpGetUserLogin'
      - 'MobaXtermDecryptor'
      - 'ae.exe -snapshot'
      - 'nbtscan.exe'
  selection_img:
    Image|endswith:
      - '\gogo.exe'
      - '\go.exe'
      - '\httpx.exe'
      - '\naabu.exe'
      - '\dddd.exe'
      - '\stowaway.exe'
      - '\anyproxy.exe'
      - '\any.exe'
  condition: 1 of selection_*
falsepositives:
  - Sanctioned red-team or pentest engagement (correlate against scheduled engagements)
  - Sysadmin using gogo or httpx for inventory work (uncommon in government endpoints; alert and verify)
level: high
