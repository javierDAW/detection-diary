<title id="t">AI-assisted IT-to-OT targeting at SADM water utility - kill chain</title>
<desc id="d">Two-lane diagram. Left lane is the victim Monterrey water utility enterprise IT, progressing from initial access in January 2026, to foothold with proxied tunnels, AI-directed internal discovery, identification of an internal vNode SCADA/IIoT gateway (critical node), AI-built credential lists, two failed rounds of password spraying against the gateway single-password login, and a pivot to data exfiltration. Right lane is the AI-assisted operator: Claude Code as primary technical executor, OpenAI GPT for data processing, the 17000-line BACKUPOSINT framework with 49 modules, cloud-metadata and Active Directory interrogation, guardrail bypass via an authorized-pentest frame, and a C2 that matured in two days. Detection anchors are East-West contact to the gateway, the password spray, cloud-metadata plus AD-interrogation co-occurrence, and proxied tunnels.</desc>
