  <text class="stage-mitre" x="80" y="705" font-size="11">T1562.001 · T1106</text>
  <text class="stage-ioc" x="80" y="723" font-size="11">MsMpEng / SentinelAgent / ekrn / CylanceSvc / WRSA</text>

