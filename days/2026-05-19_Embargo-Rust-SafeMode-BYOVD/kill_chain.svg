  <!-- Stage 4: Safe Mode Boot + irnagentd -->
  <rect class="stage" x="30" y="420" width="410" height="100" rx="4"/>
  <circle class="badge" cx="55" cy="445" r="14"/>
  <text class="badge-text" x="55" y="450" font-size="14" text-anchor="middle">4</text>
