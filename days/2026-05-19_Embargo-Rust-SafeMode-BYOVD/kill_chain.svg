  <text class="stage-sub" x="80" y="457" font-size="11">bcdedit safeboot Minimal + service irnagentd under Safeboot\Network</text>
  <text class="stage-mitre" x="80" y="475" font-size="11">T1562.009 · T1547.001 · T1112</text>
