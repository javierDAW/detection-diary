  <text class="stage-sub" x="80" y="892" font-size="11">Random 6-hex extension (e.g., .b58eeb / .3d828a)</text>
  <text class="stage-sub" x="80" y="909" font-size="11">HOW_TO_RECOVER_FILES.txt per encrypted directory</text>
