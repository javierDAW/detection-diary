title: Suspicious Exchange Online Inbox Rule with Invisible / One-Char Name
id: 5c9e0e5e-f21f-4678-80bf-e83119fd3f22
status: experimental
description: |
  T1564.008 / T1114.003 — creation or modification of inbox rules with
  one-character names, symbol-only names typical of "hide rule from UI"
  (".", " ", ",", "_", "`"), rules that move mail to rarely-opened
  folders (RSS Subscriptions, Conversation History, Archive), or rules
  that add external forwarding (ForwardTo / RedirectTo).

  Classic post-AiTM-to-BEC pattern: after waiting hours to dodge
  temporal correlation with the anomalous sign-in, the operator installs
  a rule that hides vendor replies and the wire-fraud thread becomes
  invisible to the user.
references:
  - https://www.microsoft.com/en-us/security/blog/2026/05/04/breaking-the-code-multi-stage-code-of-conduct-phishing-campaign-leads-to-aitm-token-compromise/
  - https://attack.mitre.org/techniques/T1564/008/
  - https://attack.mitre.org/techniques/T1114/003/
author: Jarmi
date: 2026/05/06
tags:
  - attack.defense-evasion
  - attack.t1564.008
  - attack.collection
  - attack.t1114.003
logsource:
  product: m365
  service: exchange
detection:
  selection_op:
    Operation:
      - 'New-InboxRule'
      - 'Set-InboxRule'
      - 'UpdateInboxRules'
  selection_invisible_name:
    Parameters|contains:
      - 'Name=.'
      - 'Name= '
      - 'Name=,'
      - 'Name=_'
      - 'Name=-'
      - 'Name=`'
      - 'Name=:'
  selection_hide_to_folder:
    Parameters|contains:
      - 'MoveToFolder=RSS Subscriptions'
      - 'MoveToFolder=Conversation History'
      - 'MoveToFolder=Archive'
      - 'MoveToFolder=Junk Email'
      - 'MoveToFolder=Deleted Items'
  selection_external_forward:
    Parameters|contains:
      - 'ForwardTo='
      - 'RedirectTo='
      - 'ForwardAsAttachmentTo='
  condition: selection_op and (selection_invisible_name or selection_hide_to_folder or selection_external_forward)
fields:
  - UserId
  - ClientIP
  - UserAgent
  - Parameters
falsepositives:
  - Legitimate short-name rules on operational mailboxes (rare; correlate
    with a 90-day per-user baseline of FirstSeenRuleName).
  - User-approved Move-to-Archive rules for Inbox tidy-up.
level: high
