title: Entra ID Device Registration in 60-min Window After Suspicious Sign-In
id: 980a29b8-f9da-4726-b8b7-36075d8a46b5
status: experimental
description: |
  T1098.005 — suspicious device registration in a short window after a
  sign-in with riskLevel >= medium or from an IP/ASN never seen for the
  user. Typical Tycoon2FA post-AiTM pattern: the reverse-proxy captures
  tokens and the operator calls enrollment + DRS within the first 10
  minutes to forge a Primary Refresh Token (PRT) and gain persistence
  that survives password rotation.

  This rule triggers ONLY on AuditLogs (Add device / Register device /
  Update device). Temporal correlation with SigninLogs is performed in
  the companion KQL query (kql/aitm_chain_correlation.kql). The SIEM must
  route both data sources to the same workspace.
references:
  - https://www.microsoft.com/en-us/security/blog/2026/05/04/breaking-the-code-multi-stage-code-of-conduct-phishing-campaign-leads-to-aitm-token-compromise/
  - https://attack.mitre.org/techniques/T1098/005/
  - https://learn.microsoft.com/en-us/entra/identity/devices/protecting-tokens-microsoft-entra-id
author: Jarmi
date: 2026/05/06
tags:
  - attack.persistence
  - attack.t1098.005
  - attack.credential-access
  - attack.t1557
logsource:
  product: azure
  service: auditlogs
detection:
  selection_op:
    OperationName:
      - 'Add device'
      - 'Add registered owner to device'
      - 'Register device'
      - 'Update device'
    Result: 'success'
  filter_legit_intune:
    InitiatedBy.app.displayName|contains:
      - 'Microsoft Intune'
      - 'Microsoft Endpoint Manager'
      - 'Microsoft Autopilot'
  condition: selection_op and not filter_legit_intune
fields:
  - TargetResources
  - InitiatedBy.user.userPrincipalName
  - InitiatedBy.user.ipAddress
  - InitiatedBy.app.displayName
  - CorrelationId
falsepositives:
  - Legitimate registration of a personal device (BYOD) — correlate with
    Intune enrollment, helpdesk ticket and user baseline.
  - Bulk onboarding during device migration (exclude the window via
    approved change-management ticket).
level: high
