title: Code of Conduct AiTM PDF Lure (Storm-1747 / Tycoon2FA pattern)
id: 17d6231b-0213-4958-b9e2-f71732243401
status: experimental
description: |
  Detects emails with subjects / attachment names themed around "code of
  conduct", "disciplinary action" or "case log" combined with a PDF
  attachment and an external URL that matches a known attacker domain or
  the cheap-TLD + theme-keyword pattern. Tune the domain denylist with the
  IOCs of the day.
references:
  - https://www.microsoft.com/en-us/security/blog/2026/05/04/breaking-the-code-multi-stage-code-of-conduct-phishing-campaign-leads-to-aitm-token-compromise/
  - https://www.microsoft.com/en-us/security/blog/2026/03/04/inside-tycoon2fa-how-a-leading-aitm-phishing-kit-operated-at-scale/
  - https://attack.mitre.org/techniques/T1566/001/
  - https://attack.mitre.org/techniques/T1566/002/
author: Jarmi
date: 2026/05/06
tags:
  - attack.initial-access
  - attack.t1566.001
  - attack.t1566.002
  - attack.credential-access
  - attack.t1557
logsource:
  product: m365
  service: threat_management
  category: email
detection:
  selection_subject:
    Subject|contains:
      - 'code of conduct'
      - 'disciplinary action'
      - 'awareness case'
      - 'employee device handling'
      - 'conduct review'
      - 'compliance review case'
  selection_attachment:
    AttachmentName|endswith: '.pdf'
    AttachmentName|contains:
      - 'case log'
      - 'disciplinary'
      - 'awareness case'
      - 'review case'
  selection_url:
    Url|contains:
      - 'acceptable-use-policy'
      - 'compliance-protection'
      - 'employee-conduct'
      - 'hr-review'
  condition: (selection_subject or selection_attachment) and selection_url
falsepositives:
  - Legitimate HR emails linking to a SaaS compliance vendor (uncommon;
    such vendors typically use the corporate domain or a whitelisted SaaS).
  - Internal audit communications mentioning "compliance review case" in
    the subject without linking to external domains.
level: high
